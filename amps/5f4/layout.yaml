# Board layout — redrawn from the published Fender 'Super-Amp' 5F4 layout
# drawing (C-EG), page 1 of the same PDF as the schematic. Part refs are the
# shared key into bom.yaml; the renderer reads each value and part type from
# there. A legible, schematic-style redraw of the board's principal components
# in the order the drawing shows them, with a lead-by-lead wiring layer — never
# a trace or a dimensioned reproduction.
#
# The 5F4 is the guitar-voiced sibling of the 5F6-A Bassman and shares its big
# board almost part-for-part: the diagram reads left->right — bias/power supply
# and the fixed-bias 6L6G output support at the left, the long-tailed-pair phase
# inverter and cathode-follower treble/bass tone stack in the centre, the 12AX7
# gain stage and 12AY7 input pair at the right — matching the tube row on the
# drawing (5U4G · 6L6G · 6L6G · 12AX7 · 12AX7 · 12AY7).
# Machine-checked equivalence: the point-to-point wiring drawn below has been
# verified electrically equivalent to the simulated netlist (netlist.cir) by
# pipeline/verify_layout_nets.py — see the net_map block at the foot of this
# file and docs/layout-schema.md. Heaters, the pilot lamp, the PT/rectifier AC
# side, the bias-supply selenium network, and the OT-secondary / NFB / presence
# network (all ~0 V DC) are an excluded annotation layer (not modelled in
# netlist.cir).
# Re-earned 2026-07-19 under the HARDENED equivalence gate: all six 12AY7/12AX7
# preamp+PI sections and both 6L6G outputs anchor by basing (0 UNANCHORED), the
# PI-plate→output-grid couplers (C9/C10) and grid stoppers (R5s/R6s) are checked
# as real parts, and the twisted heater runs are validated onto heater pins.
wiring_claim: verified

board:
  rows: 2
  cols: 49
  title: "5F4 · eyelet board layout"
caption: "Redrawn from the published Fender 5F4 'Super-Amp' layout drawing (C-EG), page 1 — principal board components and their hookup, in the order the drawing shows them. The chassis has four input jacks (two per channel); the drawing's four 68 kΩ grid stoppers collapse to the two the schematic/BOM model (R1s, R2s), and the two 1 MΩ input grid leaks (RG1, RG2) mount at the channel jacks as the sheet shows. The treble/bass tone-stack capacitors (C5 250 pF, C6 0.01 µF, C7 0.005 µF) mount at the pots; the presence pot, the 56 kΩ negative-feedback resistor, the 100 pF bright cap, and the two AC-line caps are chassis wiring drawn schematically or off the board. The power-transformer primary (black) lands on chassis switches, off the board; the 6.3 V heater chain (green twisted pair, PT → pilot lamp → the two 6L6G output tubes → 12AX7 phase inverter → 12AX7 → 12AY7) is routed as the published sheet shows it, and the directly-heated 5U4G rectifier runs off the 5 V winding, not the 6.3 V chain. Not a trace or a dimensioned reproduction."
source:
  desc: "Fender 'Super-Amp' Model 5F4 layout drawing (C-EG), page 1"
  url: "https://el34world.com/charts/Schematics/files/Fender/Fender_super_5f4.pdf"

# Board-mounted parts. a / b are eyelet endpoints [row, col]; the body is drawn
# between them (same row = axial part; shared column across the rows = a vertical
# leg — a cathode resistor or bypass can to the ground bus).
parts:
  # --- bias supply + main filter cans + rail droppers (power end, left) -------
  - { ref: C15,  a: [0, 0],  b: [0, 2] }    # 8 µF bias-supply filter (drawn "100/25" on the sheet)
  - { ref: RB1,  a: [1, 0],  b: [1, 1], value_nudge: [-2, 11] }    # 6.8k bias series (from selenium rect)
  - { ref: RB2,  a: [1, 2],  b: [1, 3] }    # 56k bias bleeder
  - { ref: C11,  a: [0, 3],  b: [0, 5], value_nudge: [26, 3] }    # 16 µF filter, B+1 (+415, output plates / OT CT)
  - { ref: C12,  a: [0, 6],  b: [0, 8] }    # 16 µF filter, B+2 (+410, screens)
  - { ref: C13,  a: [0, 9],  b: [0, 11] }   # 16 µF filter, B+3 (+332, PI)
  - { ref: RD1,  a: [1, 4],  b: [1, 5] }    # 10k dropper B+2->B+3
  - { ref: RD2,  a: [1, 6],  b: [1, 7] }    # 10k dropper B+3->B+4
  # --- 6L6G output support: grid leaks (from -40 V) + 1.5k grid stoppers ------
  - { ref: RGL1, a: [1, 8],  b: [1, 9] }    # 220k V4 grid leak
  - { ref: R5s,  a: [1, 10], b: [1, 11] }   # 1.5k V4 grid stopper
  - { ref: RGL2, a: [1, 12], b: [1, 13] }   # 220k V5 grid leak
  - { ref: R6s,  a: [1, 14], b: [1, 15] }   # 1.5k V5 grid stopper
  # --- PI -> 6L6G grid couplers ----------------------------------------------
  - { ref: C9,   a: [0, 16], b: [0, 18] }   # 0.1 µF PI plate (V3A) -> V4 grid
  - { ref: C10,  a: [0, 19], b: [0, 21] }   # 0.1 µF PI plate (V3B) -> V5 grid
  # --- long-tailed-pair phase inverter (56k / 100k plates, 1.5k + 56k tail) ---
  - { ref: RLA,  a: [1, 16], b: [1, 17] }   # 56k PI plate load (V3A)
  - { ref: RLB,  a: [1, 18], b: [1, 19] }   # 100k PI plate load (V3B)
  - { ref: RGA,  a: [1, 20], b: [1, 21] }   # 1M PI grid leak (V3A) -> tail junction
  - { ref: RGB,  a: [1, 22], b: [1, 23] }   # 1M PI grid leak (V3B) -> tail junction
  - { ref: RTAIL, a: [0, 24], b: [1, 24], nudge: [46, -8] }  # 1.5k PI tail (vertical, cathodes -> junction)
  - { ref: RT2,  a: [1, 25], b: [1, 26] }   # 56k tail junction -> ground
  # --- cathode-follower treble/bass tone stack (caps mount at the pots) -------
  - { ref: C8,   a: [0, 25], b: [0, 27] }   # 0.02 µF tone stack -> PI grid
  - { ref: RSL,  a: [1, 27], b: [1, 28] }   # 100k tone-stack slope
  - { ref: RKCF, a: [0, 29], b: [1, 29] }   # 100k cathode-follower load (vertical)
  - { ref: RF1,  a: [1, 30], b: [1, 31] }   # 4.7M V2A grid reference / feedback from tone output
  # --- channel mixers + V2 gain stage / cathode follower ---------------------
  - { ref: C4,   a: [0, 31], b: [0, 32] }   # 25 µF V2A cathode bypass
  - { ref: RM1,  a: [1, 32], b: [1, 33] }   # 270k channel-1 mixer
  - { ref: RK2,  a: [0, 34], b: [1, 34] }   # 1.5k V2A cathode (vertical)
  - { ref: C14,  a: [0, 35], b: [0, 37] }   # 8 µF filter, B+4 (+280, preamp)
  - { ref: RM2,  a: [1, 35], b: [1, 36] }   # 270k channel-2 mixer
  - { ref: RL3,  a: [1, 37], b: [1, 38] }   # 100k V2A plate load
  # --- 12AY7 input pair (right end) ------------------------------------------
  - { ref: C1,   a: [0, 38], b: [0, 40] }   # 0.02 µF V1A -> channel-1 volume
  - { ref: RL1,  a: [1, 39], b: [1, 40] }   # 100k V1A plate load
  - { ref: C2,   a: [0, 41], b: [0, 43] }   # 0.02 µF V1B -> channel-2 volume
  - { ref: RL2,  a: [1, 41], b: [1, 42] }   # 100k V1B plate load
  - { ref: R1s,  a: [1, 44], b: [1, 45] }   # 68k channel-1 grid stopper
  - { ref: RK1,  a: [0, 46], b: [1, 46] }   # 820 Ω shared 12AY7 cathode (vertical)
  - { ref: C3,   a: [0, 47], b: [0, 48] }   # 25 µF 12AY7 cathode bypass
  - { ref: R2s,  a: [1, 47], b: [1, 48] }   # 68k channel-2 grid stopper

# Off-board items drawn as labelled stubs around the board, in the drawing's
# positions: tubes along the bottom, the pots and input jacks up top,
# transformers and choke to either side.
offboard:
  - { id: PT,  kind: xfmr,  edge: left,   at: 0.2, label: "Power trans" }
  - { id: L1,  ref: L1, kind: choke, edge: left, at: 1.5, label: "Choke" }
  - { id: PL1, kind: part, glyph: lamp, edge: left, at: 2.7, label: "Pilot lamp" }
  - { id: V6,  ref: V6, kind: tube, edge: bottom, at: 2.5,  label: "V6 · 5U4G" }
  - { id: V4,  ref: V4, kind: tube, edge: bottom, at: 6.5,  label: "V4 · 6L6G" }
  - { id: V5,  ref: V5, kind: tube, edge: bottom, at: 10.5, label: "V5 · 6L6G" }
  - { id: SPK, kind: jack, edge: bottom, at: 15, label: "Spkr jacks" }
  - { id: V3,  ref: V3, kind: tube, edge: bottom, at: 20,   label: "V3 · 12AX7 (PI)" }
  - { id: V2,  ref: V2, kind: tube, edge: bottom, at: 33,   label: "V2 · 12AX7" }
  - { id: V1,  ref: V1, kind: tube, edge: bottom, at: 44,   label: "V1 · 12AY7" }
  - { id: VRP, kind: pot, edge: top, at: 4,  label: "Presence" }
  - { id: VR4, ref: VR4, kind: pot, edge: top, at: 24, label: "Bass", value_nudge: [-28, 2] }
  - { id: VR3, ref: VR3, kind: pot, edge: top, at: 28, label: "Treble", value_nudge: [-28, 2] }
  - { id: VR1, ref: VR1, kind: pot, edge: top, at: 39, label: "Volume · 1", value_nudge: [-30, 2] }
  - { id: VR2, ref: VR2, kind: pot, edge: top, at: 43, label: "Volume · 2", value_nudge: [-30, 2] }
  - { id: JI,  kind: jack, edge: top, at: 46, label: "Ch 1 in" }
  - { id: JM,  kind: jack, edge: top, at: 48, label: "Ch 2 in" }
  # RG1 / RG2 (1 MΩ input grid leaks) mount at the channel jacks per the drawing —
  # generic 2-lead off-board parts (kind: part): RGn.a → the channel input node,
  # RGn.b → ground, using the renderer's 2-terminal support.
  - { id: RG1, ref: RG1, kind: part, edge: top, at: 45.2, label: "RG1" }
  - { id: RG2, ref: RG2, kind: part, edge: top, at: 48.9, label: "RG2" }
  - { id: T3,  ref: T3, kind: xfmr, edge: right, at: 0.5, label: "Output trans" }

# Ground bus — the bare tinned rail running the length of the board just below
# the bottom eyelet row; the filter, cathode, bias-bleeder, and pot grounds all
# tie to it.
bus:
  - { from: [1.45, -0.4], to: [1.45, 48.4] }

# Wiring — read lead-by-lead from the published 5F4 layout drawing (C-EG). The
# transformer leads carry the colours marked on that drawing: the PT secondary
# (RED/RED HT plates, YELLOW/YELLOW 5 V filament, RED-YELLOW HT centre tap) to
# the 5U4G, and the output-transformer primary (V4 plate BROWN, V5 plate BLUE,
# centre tap RED to B+1). The PT primary (BLACK) lands on the chassis switches,
# off the board, so it is not drawn. The 6.3 V heater winding is the GREEN pair
# (the sheet shows plain green/green — no centre tap on this transformer); it
# feeds the pilot lamp and then daisy-chains socket to socket in physical order
# (rendered as a green twisted pair, style: twisted). The directly-heated 5U4G
# runs off the 5 V winding and is not on the 6.3 V chain. The two 1 MΩ input
# grid leaks (RG1, RG2) mount at the channel jacks as generic 2-lead off-board
# parts (kind: part). The bias-supply selenium rectifier is a chassis part
# feeding RB1 off the board. Endpoints reference board eyelets (REF.a/REF.b),
# tube socket pins (Vn.pinN, validated against reference/tubes basing — heater
# pins on the twisted runs), pot lugs (VRn.lugN), jacks, off-board 2-lead parts
# (RG1.a/RG1.b, PL1.a/PL1.b), choke/transformer leads (by colour). `via`
# waypoints are [col, row]; row<0 routes above the board, row>1 below it.
runs:
  # --- power transformer secondary -> 5U4G rectifier (marked colours) --------
  - { from: PT.red1, to: V6.pin4, via: [[2.1, 0.5], [2.5, 1.7]] }                 # HT plate 1
  - { from: PT.red2, to: V6.pin6, via: [[2.0, 0.85], [3.6, 2.0]] }                 # HT plate 2
  - { from: PT.red-yellow, to: [1.45, 2], via: [[1.2, 1.15]] }         # HT centre tap -> ground bus
  - { from: PT.yellow1, to: V6.pin2, via: [[0.9, 0.7], [0.5, 2.5], [1.8, 2.75]] }              # 5 V rectifier filament (steeper dive, clear of yellow2)
  - { from: PT.yellow2, to: V6.pin8, via: [[2.7, 0.55], [2.7, 2.3]] }              # 5 V filament / cathode (B+ out) (clear of RB2.b)
  - { from: V6.pin8, to: C11.a, color: red, via: [[4.35, 2.68], [4.35, 0.4]] }   # B+ -> first filter (climbs col4.35, clear of bias eyelets)

  # --- filtered B+ rail: choke, then two 10k droppers ------------------------
  - { from: C11.a, to: L1.hi }                     # B+1 (+415) -> choke
  - { from: L1.lo, to: C12.a }                     # choke -> B+2 (+410, screens)
  - { from: C12.a, to: RD1.a }                     # B+2 -> 10k dropper
  - { from: RD1.b, to: C13.a, via: [[7.2, 0.42]] }                     # -> B+3 (+332, PI)
  - { from: C13.a, to: RD2.a, via: [[7.6, 0.78]] }                     # B+3 -> 10k dropper
  - { from: RD2.b, to: C14.a, via: [[7, 0.5], [34.5, 0.5]] }   # -> B+4 (+280, preamp)
  - { from: C11.b, to: [1.45, 4.7], via: [[4.75, 1.1]] }   # filter negatives -> ground bus (landing offset off RD1.b col)
  - { from: C12.b, to: [1.45, 7.7], via: [[7.6, 1.1]] }    # landing offset off RGL1.a col
  - { from: C13.b, to: [1.45, 10.7], via: [[10.6, 1.0]] }  # landing offset off R5s.b col
  - { from: C14.b, to: [1.45, 36.7], via: [[36.7, 1.1]] }   # landing offset off RL3.a col

  # --- bias supply: selenium rect (off-board) -> RB1 -> -40 V ----------------
  - { from: RB1.a, to: C15.a }                     # 6.8k series -> -40 V filter node
  - { from: C15.b, to: [1.45, 0.5], via: [[0.7, 1.1]] }   # bias filter -> ground bus (clear of RGL1.b return approach)
  - { from: RB2.a, to: RB1.a }                     # 56k bleeder across -40 V
  - { from: RB2.b, to: [1.45, 3.0] }
  - { from: RGL1.b, to: RB1.a, via: [[9, 1.62], [1.2, 1.62]] }   # grid leaks return to -40 V
  - { from: RGL2.b, to: RB1.a, via: [[13, 1.5], [-0.4, 1.5], [-0.4, 1.0]] }

  # --- 6L6G output: grids, screens, plates, cathodes, OT ---------------------
  # OT primary / B+ / plate leads run in a harness band below the sockets.
  - { from: C9.b, to: R5s.a, via: [[18, 0.42], [11, 0.42]] }   # PI coupler -> V4 grid stopper
  - { from: R5s.b, to: V4.pin5, via: [[10.35, 1.18], [6.4, 1.18]] }  # -> V4 grid (breaks left above the pin row, clear of V5.pin5)
  - { from: RGL1.a, to: V4.pin5, via: [[8, 2.1], [5.4, 2.1]] }    # grid leak -> V4 grid
  - { from: C10.b, to: R6s.a, via: [[21, 0.62], [15, 0.62]] }  # PI coupler -> V5 grid stopper
  - { from: R6s.b, to: V5.pin5, via: [[14.5, 2.28], [11.6, 2.28]] } # -> V5 grid (drops left of the Spkr jack at col15)
  - { from: RGL2.a, to: V5.pin5, via: [[12, 2.1], [9.4, 2.1]] }  # grid leak -> V5 grid
  - { from: V4.pin4, to: C12.a, via: [[5.7, 1.5]] } # V4 screen -> +410 (B+2) (rises clear of V4.pin3, approaches C12.a from the left)
  - { from: V5.pin4, to: C12.a, via: [[7.4, 1.75], [6.3, 0.5]] } # V5 screen -> +410 (B+2) (breaks left above the plate pin, clear of V4 cathode drop)
  - { from: V4.pin3, to: T3.brown, via: [[4.5, 2.68], [49.1, 2.68], [49.1, 0.31]] }  # V4 plate -> OT primary (brown), rises at the right margin clear of R2s/RG2
  - { from: V5.pin3, to: T3.blue, via: [[9.0, 2.85], [49.4, 2.85], [49.4, 0.41]] }    # V5 plate -> OT primary (blue), rises right of brown
  - { from: T3.red, to: C11.a, color: red, via: [[49.7, 0.52], [49.7, 2.5], [3.4, 2.5], [3.4, 0.4]] } # OT centre tap -> B+1 (rises at the far right margin, climbs col3.4 at the left)
  - { from: V4.pin8, to: [1.45, 6.9], via: [[6.9, 2.75]] }             # V4 cathode -> ground (fixed bias)
  - { from: V5.pin8, to: [1.45, 10.9], via: [[10.9, 2.75]] }            # V5 cathode -> ground
  - { from: T3.sec1, to: SPK, via: [[48.5, 0.63], [48.5, 3.05], [15.0, 3.05], [15.0, 1.9]] }   # OT secondary -> speaker (vertical approach from directly above)
  - { from: T3.sec2, to: SPK, via: [[48.8, 0.74], [48.8, 3.2], [17.3, 3.2], [17.3, 1.8]] }     # OT secondary -> speaker (diagonal approach from the right, clear of sec1)
  - { from: SPK, to: RT2.a, via: [[17.5, 1.94], [17.5, 3.35], [25, 3.35]] }      # 56k NFB (off-board) -> tail junction (exits jack upper-right, clear of label)

  # --- long-tailed-pair phase inverter (V3) ---------------------------------
  - { from: RLA.a, to: C13.a, via: [[16, 0.55], [9, 0.55]] }    # 56k plate load -> B+3
  - { from: RLA.b, to: V3.pin1, via: [[17, 1.6], [20, 1.6]] }    # -> V3A plate
  - { from: RLB.a, to: C13.a, via: [[18, 0.8], [9.6, 0.8]] } # 100k plate load -> B+3
  - { from: RLB.b, to: V3.pin6, via: [[19, 1.72], [20.4, 1.72]] }  # -> V3B plate
  - { from: V3.pin1, to: C9.a, via: [[19.5, 1.75], [16.2, 1.75], [16.2, 0.55]] }     # V3A plate -> coupler to V4 (rises clear of V3.pin2/pin3, climbs clear of RLA.a)
  - { from: V3.pin6, to: C10.a, via: [[20.8, 1.85], [19.25, 1.85], [19.25, 0.5]] } # V3B plate -> coupler to V5 (climbs clear of RLB.b)
  - { from: C8.b, to: V3.pin2, via: [[26.6, 1.55], [20, 1.55]] }   # tone-stack out -> V3A grid (drop clear of RSL.a eyelet)
  - { from: RGA.a, to: V3.pin2, via: [[20, 1.85]] }             # 1M grid leak -> V3A grid
  - { from: RGB.a, to: V3.pin7, via: [[22, 1.9], [20, 1.9]] }   # 1M grid leak -> V3B grid (AC-grounded)
  - { from: V3.pin3, to: RTAIL.a, via: [[20, 1.68], [23.5, 1.68], [23.5, 0.0]] } # V3A cathode -> tail (rises then lands RTAIL.a from the left, clear of RTAIL.b)
  - { from: V3.pin8, to: RTAIL.a, via: [[21, 2.35], [24.3, 2.35], [24.3, 0.55]] } # V3B cathode -> tail
  - { from: RTAIL.b, to: RT2.a }                   # tail -> junction
  - { from: RGA.b, to: RT2.a, via: [[24.6, 1.3], [25.6, 1.3]] }                     # grid-leak return -> junction (approach from lower-right)
  - { from: RGB.b, to: RT2.a, via: [[23, 1.62], [24.3, 1.62]] }     # grid-leak return -> junction (approach from lower-left)
  - { from: RT2.b, to: [1.45, 26] }                # 56k tail -> ground bus

  # --- V2A gain stage + V2B cathode follower ---------------------------------
  - { from: RL3.a, to: C14.a }                     # V2A plate load -> B+4
  - { from: RL3.b, to: V2.pin6, via: [[37, 1.5], [34.2, 1.5]] }    # -> V2A plate
  - { from: V2.pin6, to: V2.pin2, via: [[33.2, 2.4], [32.4, 2.4]] }           # V2A plate -> V2B grid (DC-coupled, dips down-left clear of pin8)
  - { from: V2.pin1, to: C14.a, via: [[33, 1.65], [35.5, 1.65]] }   # V2B (CF) plate -> B+4 (own lane below RL3.b feed)
  - { from: V2.pin8, to: RK2.a, via: [[34.5, 2.3], [34.2, 2.3], [34.2, 0.35]] } # V2A cathode -> 1.5k (riser clear of RK2.b, lands from lower-right)
  - { from: RK2.b, to: [1.45, 33.6] }                # 1.5k -> ground bus
  - { from: C4.a, to: RK2.a, via: [[32.5, 0.45], [33.6, 0.45]] }      # 25 µF bypass across the 1.5k (lands RK2.a from upper-left)
  - { from: C4.b, to: [1.45, 31.5] }
  - { from: RF1.b, to: V2.pin7, via: [[31.5, 2.0], [33.0, 2.0]] }   # 4.7M grid reference -> V2A grid (approaches pin7 from below, clear of pin3)

  # --- cathode-follower treble/bass tone stack (caps mount at the pots) -------
  - { from: V2.pin3, to: RKCF.a, via: [[32, 1.6], [29.4, 1.5]] } # CF cathode -> 100k load (leaves pin3 steeply up-left)
  - { from: RKCF.b, to: [1.45, 28.6] }               # CF load -> ground bus
  - { from: V2.pin3, to: VR3.lug3, via: [[33, -0.7], [28, -0.7]] } # CF output -> treble (250 pF at pot)
  - { from: V2.pin3, to: RSL.a, via: [[32.2, 1.88], [28, 1.88]] }  # CF output -> 100k slope (own lane, flat-left above pin row)
  - { from: RSL.b, to: VR4.lug3, via: [[26, 0.9], [24, -0.3]] } # slope -> bass (leaves RSL.b flat-left, clear of the VR3-return riser)
  - { from: VR3.lug1, to: RSL.b, via: [[28, -0.68], [27.3, -0.68]] } # treble low -> slope node
  - { from: VR3.lug2, to: C8.a, via: [[28, -0.45], [25.6, -0.45]] } # treble wiper -> PI-grid coupler
  - { from: VR4.lug2, to: C8.a, via: [[24, -0.4], [24.6, -0.62]] } # bass wiper -> coupler
  - { from: VR4.lug1, to: [1.45, 23.7] }           # bass -> ground bus (clear of RTAIL.b eyelet)
  - { from: RF1.a, to: C8.a, via: [[30, 1.4], [25.5, 1.4]] }    # 4.7M feedback tap at tone output

  # --- channel volumes + mixers -> V2A grid ----------------------------------
  - { from: VR1.lug2, to: RM1.a, via: [[39, -0.45], [31.3, -0.45], [31.3, 0.85]] } # ch1 wiper -> mixer (drops clear of C4.b eyelet/ground)
  - { from: RM1.b, to: V2.pin7, via: [[33.9, 2.0], [34.2, 1.95]] }    # mixer -> V2A grid (approaches pin7 from the right, clear of pin6/pin8)
  - { from: VR1.lug1, to: [1.45, 38.7] }           # ch1 volume ground (clear of RL1.a eyelet)
  - { from: VR2.lug2, to: RM2.a, via: [[43, -0.5], [35.6, -0.5]] } # ch2 wiper -> mixer
  - { from: RM2.b, to: V2.pin7, via: [[36, 1.9], [34.4, 1.9]] } # mixer -> V2A grid (approaches pin7 from the right, clear of pin6)
  - { from: VR2.lug1, to: [1.45, 43] }             # ch2 volume ground

  # --- 12AY7 input pair (V1): channel 1 + channel 2 --------------------------
  # (four chassis jacks per the drawing; the 1 MΩ leaks RG1/RG2 mount at the jacks)
  - { from: JI, to: R1s.b, via: [[46, -0.45], [45, -0.4]] }     # ch1 jack -> 68k stopper
  - { from: RG1.a, to: R1s.b, via: [[44.8, 1.85]] }            # ch1 1 MΩ grid leak -> input node (parallel lane left of the jack drop)
  - { from: RG1.b, to: [1.45, 45.5] }                          # grid leak -> ground bus (clear of R1s.b input node)
  - { from: R1s.a, to: V1.pin7, via: [[44, 1.95], [44.8, 1.95]] }   # stopper -> V1A grid (approaches pin7 from below-right, clear of pin6)
  - { from: V1.pin6, to: RL1.b, via: [[43.5, 1.7], [40, 1.7]] }   # V1A plate -> 100k load
  - { from: RL1.a, to: C14.a, via: [[39, 0.55], [37, 0.55]] }   # B+4 rail -> V1A plate load
  - { from: V1.pin6, to: C1.a, via: [[44.2, 1.85], [38.3, 1.85], [38.3, 0.4]] }    # V1A plate -> coupler (dips below pin6, clear of pin3, climbs clear of RL3.b eyelet)
  - { from: C1.b, to: VR1.lug3, via: [[40, -0.4], [39, -0.4]] } # coupler -> ch1 volume
  - { from: JM, to: R2s.b, via: [[47.6, 0.45], [47.6, 1.0]] }      # ch2 jack -> 68k stopper (diverges left of C3.b, into R2s.b from the left)
  - { from: RG2.a, to: R2s.b, via: [[48.9, -0.2], [48.6, 0.65]] }  # ch2 1 MΩ grid leak -> input node
  - { from: RG2.b, to: [1.45, 46.6], via: [[46.7, 0.5]] }      # grid leak -> ground bus (clear of R2s.a drop)
  - { from: R2s.a, to: V1.pin2, via: [[47, 1.7], [44, 1.7]] }   # stopper -> V1B grid
  - { from: V1.pin1, to: RL2.b, via: [[42.5, 1.95], [42, 1.6]] } # V1B plate -> 100k load (leaves pin1 up-left, clear of pin8)
  - { from: RL2.a, to: C14.a, via: [[41, 0.34], [37.3, 0.34]] }     # B+4 rail -> V1B plate load
  - { from: V1.pin1, to: C2.a, via: [[45.3, 2.18], [41.3, 2.18], [41.3, 0.4]] }  # V1B plate -> coupler (low lane clear of pin2, climbs clear of RL2.a)
  - { from: C2.b, to: VR2.lug3, via: [[43, -0.42], [43, -0.42]] } # coupler -> ch2 volume
  - { from: V1.pin8, to: RK1.a, via: [[44.6, 2.35], [45.8, 2.35], [45.8, 0.55]] }   # V1A cathode -> shared 820 Ω
  - { from: V1.pin3, to: RK1.a, via: [[45.5, 2.3], [46.4, 2.3], [46.4, 0.6]] } # V1B cathode -> shared 820 Ω (dip clear of the red B+ bus)
  - { from: RK1.b, to: [1.45, 46] }                # 820 Ω -> ground bus
  - { from: C3.a, to: RK1.a }                      # cathode bypass across 820 Ω
  - { from: C3.b, to: [1.45, 48.25], via: [[48.25, 0.9]] }   # cathode-bypass negative -> ground (right of R2s.b, clear of the sec1 rise)

  # --- presence control (5k), at the phase-inverter tail foot -----------------
  - { from: VRP.lug3, to: RT2.a, via: [[4, -0.8], [25.5, -0.8]] } # presence -> tail junction
  - { from: VRP.lug1, to: [1.45, 3.6], via: [[3.6, 0.5]] }   # presence ground (landing between the red-bus climb and RD1.a col)

  # --- 6.3 V heater chain (green twisted pair) ------------------------------
  # PT green pair -> pilot lamp -> V4 6L6 -> V5 6L6 -> V3 12AX7 (PI) -> V2 12AX7
  # -> V1 12AY7, in the drawing's physical daisy order. The 5U4G rectifier is
  # directly heated off the 5 V winding, so it is not on this chain. Twisted
  # runs land only on heater pins (6L6 octal 2/7, noval 4/5); routed in a deep
  # lane below the output harness.
  - { from: PT.green, to: PL1.a, style: twisted }                                    # 6.3 V -> pilot lamp
  - { from: PL1.b, to: V4.pin7, style: twisted, via: [[-1.2, 3.7], [6.5, 3.7]] }     # lamp -> V4 6L6 heater
  - { from: V4.pin2, to: V5.pin7, style: twisted, via: [[6.5, 3.72], [10.5, 3.72]] } # V4 -> V5 heater
  - { from: V5.pin2, to: V3.pin4, style: twisted, via: [[10.5, 3.74], [20, 3.74]] }  # V5 -> V3 (PI) heater
  - { from: V3.pin5, to: V2.pin4, style: twisted, via: [[20, 3.72], [33, 3.72]] }    # V3 -> V2 heater
  - { from: V2.pin5, to: V1.pin4, style: twisted, via: [[33, 3.7], [44, 3.7]] }      # V2 -> V1 heater
  - { from: V1.pin4, to: V1.pin5, style: twisted } # close the pair at the last socket

# net_map — the reviewable data layer reconciling the drawn wiring with the
# DC-operating-point netlist (netlist.cir) for pipeline/verify_layout_nets.py.
# See docs/layout-schema.md. Every entry records a documented abstraction the
# netlist makes so the equivalence check never guesses in code.
net_map:
  # Terminals the netlist gives no discrete node to reach on their own — anchored
  # to the netlist node they belong to. Co-anchoring the three OT-primary leads
  # to BP1 declares the DC bridge the netlist collapses (OT primary DCR omitted,
  # so both 6L6G plates and the centre tap read as B+1). The OT secondary /
  # speaker and the off-board 56 k NFB + 5 k presence sit at ~0 V DC and are the
  # netlist's excluded annotation layer (RT2 already carries the tail-to-ground
  # 56 k), so they are deliberately NOT anchored — folding them to ground would
  # wrongly short the phase-inverter tail junction (JPI) to ground.
  anchors:
    T3.brown: BP1    # OT primary, V4 plate lead — netlist omits OT primary DCR (plate node = B+1)
    T3.blue:  BP1    # OT primary, V5 plate lead
    T3.red:   BP1    # OT primary centre tap → first filter (B+1)
  # DC-transparent series parts the netlist omits (no DC grid current → zero
  # drop): their two leads are shorted so the netlist node runs through them.
  # The 12AY7 grids draw no DC current, so each 68 k stopper == its input node.
  series_bridge:
    R1s: "68 k channel-1 grid stopper — omitted from netlist (12AY7 V1A grid == input node at DC)"
    R2s: "68 k channel-2 grid stopper — omitted from netlist (12AY7 V1B grid == input node at DC)"
  # Netlist elements with no discrete board 2-lead part — reported in coverage,
  # never a failure (their nodes still have to check out).
  netlist_unplaced:
    RCHOKE: "filter choke DCR (130 Ω BP1→BP2) — realised as the off-board chassis choke L1 (leads hi/lo, kind: choke), not a board 2-lead part; its two rails are anchored independently (BP1 by the 6L6G plates, BP2 by the screens/RD1)"
    RG3:    "V2A grid reference — the netlist's single 4.7 M leak-to-ground abstraction of the real grid network (RF1 4.7 M returned to the tone-stack output ≈0 V DC, plus the 270 k mixers RM1/RM2 reaching ground through the volume pots); no single board part corresponds"
