# Board layout — redrawn from the published Fender 'Super-Amp' 5F4 layout
# drawing (C-EG), page 1 of the same PDF as the schematic. Part refs are the
# shared key into bom.yaml; the renderer reads each value and part type from
# there. A legible, schematic-style redraw of the board's principal components
# in the order the drawing shows them, with a lead-by-lead wiring layer — never
# a trace or a dimensioned reproduction.
#
# The 5F4 is the guitar-voiced sibling of the 5F6-A Bassman and shares its big
# board almost part-for-part: the diagram reads left->right — bias/power supply
# and the fixed-bias 6L6G output support at the left, the long-tailed-pair phase
# inverter and cathode-follower treble/bass tone stack in the centre, the 12AX7
# gain stage and 12AY7 input pair at the right — matching the tube row on the
# drawing (5U4G · 6L6G · 6L6G · 12AX7 · 12AX7 · 12AY7).
board:
  rows: 2
  cols: 49
  title: "5F4 · eyelet board layout"
caption: "Redrawn from the published Fender 5F4 'Super-Amp' layout drawing (C-EG), page 1 — principal board components and their hookup, in the order the drawing shows them. The chassis has four input jacks (two per channel); the drawing's four 68 kΩ grid stoppers collapse to the two the schematic/BOM model (R1s, R2s), and the two 1 MΩ input grid leaks (RG1, RG2) mount at the channel jacks as the sheet shows. The treble/bass tone-stack capacitors (C5 250 pF, C6 0.01 µF, C7 0.005 µF) mount at the pots; the presence pot, the 56 kΩ negative-feedback resistor, the 100 pF bright cap, and the two AC-line caps are chassis wiring drawn schematically or off the board. The power-transformer primary (black) lands on chassis switches, off the board; the 6.3 V heater chain (green twisted pair, PT → pilot lamp → the two 6L6G output tubes → 12AX7 phase inverter → 12AX7 → 12AY7) is routed as the published sheet shows it, and the directly-heated 5U4G rectifier runs off the 5 V winding, not the 6.3 V chain. Not a trace or a dimensioned reproduction."
source:
  desc: "Fender 'Super-Amp' Model 5F4 layout drawing (C-EG), page 1"
  url: "https://el34world.com/charts/Schematics/files/Fender/Fender_super_5f4.pdf"

# Board-mounted parts. a / b are eyelet endpoints [row, col]; the body is drawn
# between them (same row = axial part; shared column across the rows = a vertical
# leg — a cathode resistor or bypass can to the ground bus).
parts:
  # --- bias supply + main filter cans + rail droppers (power end, left) -------
  - { ref: C15,  a: [0, 0],  b: [0, 2] }    # 8 µF bias-supply filter (drawn "100/25" on the sheet)
  - { ref: RB1,  a: [1, 0],  b: [1, 1] }    # 6.8k bias series (from selenium rect)
  - { ref: RB2,  a: [1, 2],  b: [1, 3] }    # 56k bias bleeder
  - { ref: C11,  a: [0, 3],  b: [0, 5] }    # 16 µF filter, B+1 (+415, output plates / OT CT)
  - { ref: C12,  a: [0, 6],  b: [0, 8] }    # 16 µF filter, B+2 (+410, screens)
  - { ref: C13,  a: [0, 9],  b: [0, 11] }   # 16 µF filter, B+3 (+332, PI)
  - { ref: RD1,  a: [1, 4],  b: [1, 5] }    # 10k dropper B+2->B+3
  - { ref: RD2,  a: [1, 6],  b: [1, 7] }    # 10k dropper B+3->B+4
  # --- 6L6G output support: grid leaks (from -40 V) + 1.5k grid stoppers ------
  - { ref: RGL1, a: [1, 8],  b: [1, 9] }    # 220k V4 grid leak
  - { ref: R5s,  a: [1, 10], b: [1, 11] }   # 1.5k V4 grid stopper
  - { ref: RGL2, a: [1, 12], b: [1, 13] }   # 220k V5 grid leak
  - { ref: R6s,  a: [1, 14], b: [1, 15] }   # 1.5k V5 grid stopper
  # --- PI -> 6L6G grid couplers ----------------------------------------------
  - { ref: C9,   a: [0, 16], b: [0, 18] }   # 0.1 µF PI plate (V3A) -> V4 grid
  - { ref: C10,  a: [0, 19], b: [0, 21] }   # 0.1 µF PI plate (V3B) -> V5 grid
  # --- long-tailed-pair phase inverter (56k / 100k plates, 1.5k + 56k tail) ---
  - { ref: RLA,  a: [1, 16], b: [1, 17] }   # 56k PI plate load (V3A)
  - { ref: RLB,  a: [1, 18], b: [1, 19] }   # 100k PI plate load (V3B)
  - { ref: RGA,  a: [1, 20], b: [1, 21] }   # 1M PI grid leak (V3A) -> tail junction
  - { ref: RGB,  a: [1, 22], b: [1, 23] }   # 1M PI grid leak (V3B) -> tail junction
  - { ref: RTAIL, a: [0, 24], b: [1, 24] }  # 1.5k PI tail (vertical, cathodes -> junction)
  - { ref: RT2,  a: [1, 25], b: [1, 26] }   # 56k tail junction -> ground
  # --- cathode-follower treble/bass tone stack (caps mount at the pots) -------
  - { ref: C8,   a: [0, 25], b: [0, 27] }   # 0.02 µF tone stack -> PI grid
  - { ref: RSL,  a: [1, 27], b: [1, 28] }   # 100k tone-stack slope
  - { ref: RKCF, a: [0, 29], b: [1, 29] }   # 100k cathode-follower load (vertical)
  - { ref: RF1,  a: [1, 30], b: [1, 31] }   # 4.7M V2A grid reference / feedback from tone output
  # --- channel mixers + V2 gain stage / cathode follower ---------------------
  - { ref: C4,   a: [0, 31], b: [0, 32] }   # 25 µF V2A cathode bypass
  - { ref: RM1,  a: [1, 32], b: [1, 33] }   # 270k channel-1 mixer
  - { ref: RK2,  a: [0, 34], b: [1, 34] }   # 1.5k V2A cathode (vertical)
  - { ref: C14,  a: [0, 35], b: [0, 37] }   # 8 µF filter, B+4 (+280, preamp)
  - { ref: RM2,  a: [1, 35], b: [1, 36] }   # 270k channel-2 mixer
  - { ref: RL3,  a: [1, 37], b: [1, 38] }   # 100k V2A plate load
  # --- 12AY7 input pair (right end) ------------------------------------------
  - { ref: C1,   a: [0, 38], b: [0, 40] }   # 0.02 µF V1A -> channel-1 volume
  - { ref: RL1,  a: [1, 39], b: [1, 40] }   # 100k V1A plate load
  - { ref: C2,   a: [0, 41], b: [0, 43] }   # 0.02 µF V1B -> channel-2 volume
  - { ref: RL2,  a: [1, 41], b: [1, 42] }   # 100k V1B plate load
  - { ref: R1s,  a: [1, 44], b: [1, 45] }   # 68k channel-1 grid stopper
  - { ref: RK1,  a: [0, 46], b: [1, 46] }   # 820 Ω shared 12AY7 cathode (vertical)
  - { ref: C3,   a: [0, 47], b: [0, 48] }   # 25 µF 12AY7 cathode bypass
  - { ref: R2s,  a: [1, 47], b: [1, 48] }   # 68k channel-2 grid stopper

# Off-board items drawn as labelled stubs around the board, in the drawing's
# positions: tubes along the bottom, the pots and input jacks up top,
# transformers and choke to either side.
offboard:
  - { id: PT,  kind: xfmr,  edge: left,   at: 0.2, label: "Power trans" }
  - { id: L1,  ref: L1, kind: choke, edge: left, at: 1.5, label: "Choke" }
  - { id: PL1, kind: part, glyph: lamp, edge: left, at: 2.7, label: "Pilot lamp" }
  - { id: V6,  ref: V6, kind: tube, edge: bottom, at: 2.5,  label: "V6 · 5U4G" }
  - { id: V4,  ref: V4, kind: tube, edge: bottom, at: 6.5,  label: "V4 · 6L6G" }
  - { id: V5,  ref: V5, kind: tube, edge: bottom, at: 10.5, label: "V5 · 6L6G" }
  - { id: SPK, kind: jack, edge: bottom, at: 15, label: "Spkr jacks" }
  - { id: V3,  ref: V3, kind: tube, edge: bottom, at: 20,   label: "V3 · 12AX7 (PI)" }
  - { id: V2,  ref: V2, kind: tube, edge: bottom, at: 33,   label: "V2 · 12AX7" }
  - { id: V1,  ref: V1, kind: tube, edge: bottom, at: 44,   label: "V1 · 12AY7" }
  - { id: VRP, kind: pot, edge: top, at: 4,  label: "Presence" }
  - { id: VR4, ref: VR4, kind: pot, edge: top, at: 24, label: "Bass" }
  - { id: VR3, ref: VR3, kind: pot, edge: top, at: 28, label: "Treble" }
  - { id: VR1, ref: VR1, kind: pot, edge: top, at: 39, label: "Volume · 1" }
  - { id: VR2, ref: VR2, kind: pot, edge: top, at: 43, label: "Volume · 2" }
  - { id: JI,  kind: jack, edge: top, at: 46, label: "Ch 1 in" }
  - { id: JM,  kind: jack, edge: top, at: 48, label: "Ch 2 in" }
  # RG1 / RG2 (1 MΩ input grid leaks) mount at the channel jacks per the drawing —
  # generic 2-lead off-board parts (kind: part): RGn.a → the channel input node,
  # RGn.b → ground, using the renderer's 2-terminal support.
  - { id: RG1, ref: RG1, kind: part, edge: top, at: 45.2, label: "RG1" }
  - { id: RG2, ref: RG2, kind: part, edge: top, at: 48.9, label: "RG2" }
  - { id: T3,  ref: T3, kind: xfmr, edge: right, at: 0.5, label: "Output trans" }

# Ground bus — the bare tinned rail running the length of the board just below
# the bottom eyelet row; the filter, cathode, bias-bleeder, and pot grounds all
# tie to it.
bus:
  - { from: [1.45, -0.4], to: [1.45, 48.4] }

# Wiring — read lead-by-lead from the published 5F4 layout drawing (C-EG). The
# transformer leads carry the colours marked on that drawing: the PT secondary
# (RED/RED HT plates, YELLOW/YELLOW 5 V filament, RED-YELLOW HT centre tap) to
# the 5U4G, and the output-transformer primary (V4 plate BROWN, V5 plate BLUE,
# centre tap RED to B+1). The PT primary (BLACK) lands on the chassis switches,
# off the board, so it is not drawn. The 6.3 V heater winding is the GREEN pair
# (the sheet shows plain green/green — no centre tap on this transformer); it
# feeds the pilot lamp and then daisy-chains socket to socket in physical order
# (rendered as a green twisted pair, style: twisted). The directly-heated 5U4G
# runs off the 5 V winding and is not on the 6.3 V chain. The two 1 MΩ input
# grid leaks (RG1, RG2) mount at the channel jacks as generic 2-lead off-board
# parts (kind: part). The bias-supply selenium rectifier is a chassis part
# feeding RB1 off the board. Endpoints reference board eyelets (REF.a/REF.b),
# tube socket pins (Vn.pinN, validated against reference/tubes basing — heater
# pins on the twisted runs), pot lugs (VRn.lugN), jacks, off-board 2-lead parts
# (RG1.a/RG1.b, PL1.a/PL1.b), choke/transformer leads (by colour). `via`
# waypoints are [col, row]; row<0 routes above the board, row>1 below it.
runs:
  # --- power transformer secondary -> 5U4G rectifier (marked colours) --------
  - { from: PT.red1, to: V6.pin4 }                 # HT plate 1
  - { from: PT.red2, to: V6.pin6 }                 # HT plate 2
  - { from: PT.red-yellow, to: [1.45, 2] }         # HT centre tap -> ground bus
  - { from: PT.yellow1, to: V6.pin2 }              # 5 V rectifier filament
  - { from: PT.yellow2, to: V6.pin8 }              # 5 V filament / cathode (B+ out)
  - { from: V6.pin8, to: C11.a, color: red, via: [[2.5, 2.5], [3, 2.5]] }   # B+ -> first filter

  # --- filtered B+ rail: choke, then two 10k droppers ------------------------
  - { from: C11.a, to: L1.hi }                     # B+1 (+415) -> choke
  - { from: L1.lo, to: C12.a }                     # choke -> B+2 (+410, screens)
  - { from: C12.a, to: RD1.a }                     # B+2 -> 10k dropper
  - { from: RD1.b, to: C13.a }                     # -> B+3 (+332, PI)
  - { from: C13.a, to: RD2.a }                     # B+3 -> 10k dropper
  - { from: RD2.b, to: C14.a, via: [[7, 0.5], [35, 0.5]] }   # -> B+4 (+280, preamp)
  - { from: C11.b, to: [1.45, 5] }                 # filter negatives -> ground bus
  - { from: C12.b, to: [1.45, 8] }
  - { from: C13.b, to: [1.45, 11] }
  - { from: C14.b, to: [1.45, 37] }

  # --- bias supply: selenium rect (off-board) -> RB1 -> -40 V ----------------
  - { from: RB1.a, to: C15.a }                     # 6.8k series -> -40 V filter node
  - { from: C15.b, to: [1.45, 1] }                 # bias filter -> ground bus
  - { from: RB2.a, to: RB1.a }                     # 56k bleeder across -40 V
  - { from: RB2.b, to: [1.45, 3] }
  - { from: RGL1.b, to: RB1.a, via: [[9, 1.8], [1.2, 1.8]] }   # grid leaks return to -40 V
  - { from: RGL2.b, to: RB1.a, via: [[13, 1.9], [1.4, 1.9]] }

  # --- 6L6G output: grids, screens, plates, cathodes, OT ---------------------
  # OT primary / B+ / plate leads run in a harness band below the sockets.
  - { from: C9.b, to: R5s.a, via: [[18, 0.55], [11, 0.55]] }   # PI coupler -> V4 grid stopper
  - { from: R5s.b, to: V4.pin5, via: [[10, 2.35], [6.5, 2.35]] }  # -> V4 grid
  - { from: RGL1.a, to: V4.pin5, via: [[8, 2.2], [6.5, 2.2]] }    # grid leak -> V4 grid
  - { from: C10.b, to: R6s.a, via: [[21, 0.62], [15, 0.62]] }  # PI coupler -> V5 grid stopper
  - { from: R6s.b, to: V5.pin5, via: [[14, 2.45], [10.5, 2.45]] } # -> V5 grid
  - { from: RGL2.a, to: V5.pin5, via: [[12, 2.2], [10.5, 2.2]] }  # grid leak -> V5 grid
  - { from: V4.pin4, to: C12.a, via: [[4.8, 2.55], [6, 0.45]] } # V4 screen -> +410 (B+2) (dip left of the V4 label)
  - { from: V5.pin4, to: C12.a, via: [[8.2, 2.6], [6.3, 0.42]] } # V5 screen -> +410 (B+2) (dip left of the V5 label)
  - { from: V4.pin3, to: T3.brown, via: [[4.3, 2.75], [49, 2.75]] }  # V4 plate -> OT primary (brown) (drop left of the V4 label)
  - { from: V5.pin3, to: T3.blue, via: [[7.7, 2.9], [49, 2.9]] }    # V5 plate -> OT primary (blue) (drop left of the V5 label)
  - { from: T3.red, to: C11.a, color: red, via: [[49, 2.6], [3.2, 2.6]] } # OT centre tap -> B+1
  - { from: V4.pin8, to: [1.45, 6.5] }             # V4 cathode -> ground (fixed bias)
  - { from: V5.pin8, to: [1.45, 10.5] }            # V5 cathode -> ground
  - { from: T3.sec1, to: SPK, via: [[49, 3.05], [16.5, 3.05], [16.5, 1.86]] }   # OT secondary -> speaker (up the right of the Spkr label)
  - { from: T3.sec2, to: SPK, via: [[49, 3.2], [17.0, 3.2], [17.0, 1.78]] }     # OT secondary -> speaker (staggered right of label)
  - { from: SPK, to: RT2.a, via: [[17.5, 1.94], [17.5, 3.35], [25, 3.35]] }      # 56k NFB (off-board) -> tail junction (exits jack upper-right, clear of label)

  # --- long-tailed-pair phase inverter (V3) ---------------------------------
  - { from: RLA.a, to: C13.a, via: [[16, 0.7], [9, 0.7]] }    # 56k plate load -> B+3
  - { from: RLA.b, to: V3.pin1, via: [[17, 1.6], [20, 1.6]] }    # -> V3A plate
  - { from: RLB.a, to: C13.a, via: [[18, 0.78], [9.3, 0.78]] } # 100k plate load -> B+3
  - { from: RLB.b, to: V3.pin6, via: [[19, 1.65], [20, 1.65]] }  # -> V3B plate
  - { from: V3.pin1, to: C9.a, via: [[20, 1.7], [16, 1.7]] }     # V3A plate -> coupler to V4
  - { from: V3.pin6, to: C10.a, via: [[20.4, 1.75], [19, 1.75]] } # V3B plate -> coupler to V5
  - { from: C8.b, to: V3.pin2, via: [[27, 1.55], [20, 1.55]] }   # tone-stack out -> V3A grid
  - { from: RGA.a, to: V3.pin2, via: [[20, 1.85]] }             # 1M grid leak -> V3A grid
  - { from: RGB.a, to: V3.pin7, via: [[22, 1.9], [20, 1.9]] }   # 1M grid leak -> V3B grid (AC-grounded)
  - { from: V3.pin3, to: RTAIL.a, via: [[20, 1.6], [24, 1.6]] } # V3A cathode -> tail
  - { from: V3.pin8, to: RTAIL.a, via: [[20.4, 1.5], [24, 1.5]] } # V3B cathode -> tail
  - { from: RTAIL.b, to: RT2.a }                   # tail -> junction
  - { from: RGA.b, to: RT2.a }                     # grid-leak return -> junction
  - { from: RGB.b, to: RT2.a, via: [[23, 1.4], [25, 1.4]] }     # grid-leak return -> junction
  - { from: RT2.b, to: [1.45, 26] }                # 56k tail -> ground bus

  # --- V2A gain stage + V2B cathode follower ---------------------------------
  - { from: RL3.a, to: C14.a }                     # V2A plate load -> B+4
  - { from: RL3.b, to: V2.pin6, via: [[38, 1.6], [33, 1.6]] }    # -> V2A plate
  - { from: V2.pin6, to: V2.pin2, via: [[33, 1.55]] }           # V2A plate -> V2B grid (DC-coupled)
  - { from: V2.pin1, to: C14.a, via: [[33, 1.5], [35, 1.5]] }   # V2B (CF) plate -> B+4
  - { from: V2.pin8, to: RK2.a, via: [[33, 1.65], [34, 1.65]] } # V2A cathode -> 1.5k
  - { from: RK2.b, to: [1.45, 34] }                # 1.5k -> ground bus
  - { from: C4.a, to: RK2.a, via: [[32, 1.4], [34, 1.4]] }      # 25 µF bypass across the 1.5k
  - { from: C4.b, to: [1.45, 31.5] }
  - { from: RF1.b, to: V2.pin7, via: [[31, 1.7], [33, 1.7]] }   # 4.7M grid reference -> V2A grid

  # --- cathode-follower treble/bass tone stack (caps mount at the pots) -------
  - { from: V2.pin3, to: RKCF.a, via: [[33, 1.75], [29, 1.75]] } # CF cathode -> 100k load
  - { from: RKCF.b, to: [1.45, 29] }               # CF load -> ground bus
  - { from: V2.pin3, to: VR3.lug3, via: [[33, -0.7], [28, -0.7]] } # CF output -> treble (250 pF at pot)
  - { from: V2.pin3, to: RSL.a, via: [[33, 1.85], [28, 1.85]] }  # CF output -> 100k slope
  - { from: RSL.b, to: VR4.lug3, via: [[27, -0.5], [24, -0.5]] } # slope -> bass
  - { from: VR3.lug1, to: RSL.b, via: [[28, -0.55], [27, -0.55]] } # treble low -> slope node
  - { from: VR3.lug2, to: C8.a, via: [[28, -0.45], [25, -0.45]] } # treble wiper -> PI-grid coupler
  - { from: VR4.lug2, to: C8.a, via: [[24, -0.4], [25, -0.62]] } # bass wiper -> coupler
  - { from: VR4.lug1, to: [1.45, 24] }             # bass -> ground bus
  - { from: RF1.a, to: C8.a, via: [[30, 1.4], [25.5, 1.4]] }    # 4.7M feedback tap at tone output

  # --- channel volumes + mixers -> V2A grid ----------------------------------
  - { from: VR1.lug2, to: RM1.a, via: [[39, -0.45], [32, -0.45]] } # ch1 wiper -> mixer
  - { from: RM1.b, to: V2.pin7, via: [[33, 1.6], [33, 1.6]] }    # mixer -> V2A grid
  - { from: VR1.lug1, to: [1.45, 39] }             # ch1 volume ground
  - { from: VR2.lug2, to: RM2.a, via: [[43, -0.5], [35, -0.5]] } # ch2 wiper -> mixer
  - { from: RM2.b, to: V2.pin7, via: [[36, 1.65], [33, 1.65]] } # mixer -> V2A grid
  - { from: VR2.lug1, to: [1.45, 43] }             # ch2 volume ground

  # --- 12AY7 input pair (V1): channel 1 + channel 2 --------------------------
  # (four chassis jacks per the drawing; the 1 MΩ leaks RG1/RG2 mount at the jacks)
  - { from: JI, to: R1s.b, via: [[46, -0.45], [45, -0.4]] }     # ch1 jack -> 68k stopper
  - { from: RG1.a, to: R1s.b, via: [[45.2, -0.2]] }            # ch1 1 MΩ grid leak -> input node
  - { from: RG1.b, to: [1.45, 45] }                            # grid leak -> ground bus
  - { from: R1s.a, to: V1.pin7, via: [[44, 1.6], [44, 1.6]] }   # stopper -> V1A grid
  - { from: V1.pin6, to: RL1.b, via: [[44, 1.7], [40, 1.7]] }   # V1A plate -> 100k load
  - { from: RL1.a, to: C14.a, via: [[39, 0.45], [37, 0.45]] }   # B+4 rail -> V1A plate load
  - { from: V1.pin6, to: C1.a, via: [[44, 1.8], [38, 1.8]] }    # V1A plate -> coupler
  - { from: C1.b, to: VR1.lug3, via: [[40, -0.4], [39, -0.4]] } # coupler -> ch1 volume
  - { from: JM, to: R2s.b, via: [[48, -0.45], [48, 1.5]] }      # ch2 jack -> 68k stopper
  - { from: RG2.a, to: R2s.b, via: [[48.9, -0.2], [48.2, 0.6]] }  # ch2 1 MΩ grid leak -> input node
  - { from: RG2.b, to: [1.45, 47] }                            # grid leak -> ground bus
  - { from: R2s.a, to: V1.pin2, via: [[47, 1.7], [44, 1.7]] }   # stopper -> V1B grid
  - { from: V1.pin1, to: RL2.b, via: [[44, 1.85], [42, 1.85]] } # V1B plate -> 100k load
  - { from: RL2.a, to: C14.a, via: [[41, 0.4], [37, 0.4]] }     # B+4 rail -> V1B plate load
  - { from: V1.pin1, to: C2.a, via: [[44, 1.95], [41, 1.95]] }  # V1B plate -> coupler
  - { from: C2.b, to: VR2.lug3, via: [[43, -0.42], [43, -0.42]] } # coupler -> ch2 volume
  - { from: V1.pin8, to: RK1.a, via: [[44, 1.6], [46, 1.6]] }   # V1A cathode -> shared 820 Ω
  - { from: V1.pin3, to: RK1.a, via: [[44.4, 1.5], [46, 1.5]] } # V1B cathode -> shared 820 Ω
  - { from: RK1.b, to: [1.45, 46] }                # 820 Ω -> ground bus
  - { from: C3.a, to: RK1.a }                      # cathode bypass across 820 Ω
  - { from: C3.b, to: [1.45, 48] }

  # --- presence control (5k), at the phase-inverter tail foot -----------------
  - { from: VRP.lug3, to: RT2.a, via: [[4, -0.8], [25.5, -0.8]] } # presence -> tail junction
  - { from: VRP.lug1, to: [1.45, 4] }              # presence ground

  # --- 6.3 V heater chain (green twisted pair) ------------------------------
  # PT green pair -> pilot lamp -> V4 6L6 -> V5 6L6 -> V3 12AX7 (PI) -> V2 12AX7
  # -> V1 12AY7, in the drawing's physical daisy order. The 5U4G rectifier is
  # directly heated off the 5 V winding, so it is not on this chain. Twisted
  # runs land only on heater pins (6L6 octal 2/7, noval 4/5); routed in a deep
  # lane below the output harness.
  - { from: PT.green, to: PL1.a, style: twisted }                                    # 6.3 V -> pilot lamp
  - { from: PL1.b, to: V4.pin7, style: twisted, via: [[-1.2, 3.7], [6.5, 3.7]] }     # lamp -> V4 6L6 heater
  - { from: V4.pin2, to: V5.pin7, style: twisted, via: [[6.5, 3.72], [10.5, 3.72]] } # V4 -> V5 heater
  - { from: V5.pin2, to: V3.pin4, style: twisted, via: [[10.5, 3.74], [20, 3.74]] }  # V5 -> V3 (PI) heater
  - { from: V3.pin5, to: V2.pin4, style: twisted, via: [[20, 3.72], [33, 3.72]] }    # V3 -> V2 heater
  - { from: V2.pin5, to: V1.pin4, style: twisted, via: [[33, 3.7], [44, 3.7]] }      # V2 -> V1 heater
