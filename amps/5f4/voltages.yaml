# Printed voltage chart read directly from the published 5F4 (C-EG) drawing
# (2026-07-18). Fender's printed convention: values ±20%, electronic voltmeter.
# Rails get 8% tolerance; tube pins 20%.
#
# The rails, 12AY7 front end, PI 56k-side plate, and 6L6 fixed-bias supply all
# reproduce within tolerance. Six printed values are disputed: the 2026-07-18
# 12AX7 calibration study (reference/studies/12ax7-calibration) showed the
# chart's V2A pair is physically impossible and its PI figures are mutually
# inconsistent — no valid 12AX7 model can reproduce them as printed.
source: "Fender 5F4 (C-EG) drawing, printed voltages: rails +415/+410/+332/+280, bias -40; 12AY7 plates +140, cathode +2.2; V2A plate +140, cathode +2.2, cathode-follower +140; PI plates +270/+213, cathodes +55, tail junction +53.3"
nodes:
  BP2:  { chart: 410, tol_pct: 8, note: "screens node after the choke (DCR estimated at 130 Ω)" }
  BP3:  { chart: 332, tol_pct: 8, note: "PI supply node after the first 10 kΩ dropper" }
  BP4:  { chart: 280, tol_pct: 8, note: "preamp node after the second 10 kΩ dropper" }
  PAY1: { chart: 140, tol_pct: 20, note: "12AY7 plate (channel 1)" }
  PAY2: { chart: 140, tol_pct: 20, note: "12AY7 plate (channel 2)" }
  KAY:  { chart: 2.2, tol_pct: 20, note: "shared 12AY7 cathode, 820 Ω" }
  P2A:
    chart: 140
    tol_pct: 20
    disputed: true
    dispute_note: "The printed pair (140 V plate, 2.2 V cathode) is physically impossible for a 12AX7: 2.2 V across 1.5 kΩ implies 1.47 mA, which at Vg ≈ −2.2 V requires roughly 280 V plate-to-cathode — twice the printed value. Philips' measured resistance-coupled tables and simulation both put the self-consistent point near 190 V."
  K2A:
    chart: 2.2
    tol_pct: 20
    disputed: true
    dispute_note: "Half of the physically-impossible printed pair on V2A — see P2A."
  KCF:
    chart: 140
    tol_pct: 20
    disputed: true
    dispute_note: "Direct-coupled to V2A's plate, so it inherits the disputed printed 140 V; simulation follows the self-consistent operating point near 190 V."
  PPIA: { chart: 270, tol_pct: 20, note: "PI plate, 56 kΩ side" }
  PPIB:
    chart: 213
    tol_pct: 20
    disputed: true
    dispute_note: "Mutually inconsistent with the printed 270 V opposite plate and the tail arithmetic; simulation reproduces the 270 V side within tolerance."
  KPI:
    chart: 55
    tol_pct: 20
    disputed: true
    dispute_note: "The printed 55 V cathodes and 53.3 V junction contradict the printed plate pair and the 1.5 kΩ/56 kΩ tail arithmetic; simulation settles where the same stage family measures in the 5F6-A."
  JPI:
    chart: 53.3
    tol_pct: 20
    disputed: true
    dispute_note: "See KPI — the printed tail values contradict the printed plates."
  G51:  { chart: -40, tol_pct: 8, note: "6L6G fixed bias via 220k from the -40 V supply" }
