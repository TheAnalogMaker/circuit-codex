# Board layout — DERIVED FROM THE SCHEMATIC. No factory JTM45 layout drawing was
# located: the Marshall factory documentation for this circuit is the schematic
# (Dr. Tube 'jtm45tr.gif', cited in meta.yaml), and the JTM45 was built on a
# turret board with no Fender-style published layout sheet. Dr. Tube's schematic
# archive was probed (2026-07-18) and serves no layout; a general web search and
# the browser were both blocked (HTTP 403). The board order and lead-by-lead
# wiring below are therefore reconstructed from schematic.kicad_sch / netlist.cir
# (the electrical authority) and follow the published Fender 5F6-A 'Bassman'
# layout the JTM45 copies part-for-part. Part refs are the shared key into
# bom.yaml; the renderer reads each value and part type from there. This is a
# legible, schematic-style redraw — never a trace or a dimensioned reproduction.
#
# Board reads left->right, matching the tube row (GZ34 · KT66 · KT66 · ECC83 PI ·
# ECC83 · ECC83): bias + power supply and the KT66 output support at the left,
# the long-tailed-pair phase inverter in the centre, the cathode-follower TMB
# tone stack and 12AX7 driver in the centre-right, the ECC83 input pair at the
# right.
board:
  rows: 2
  cols: 64
  title: "JTM45 · turret board layout (derived)"
caption: "Layout derived from the schematic — no factory layout sheet located. The Marshall JTM45 was a turret-board amp with no Fender-style published layout drawing; Dr. Tube (the schematic source) and a web/browser probe were checked on 2026-07-18 and served none. Board order and point-to-point wiring are reconstructed from schematic.kicad_sch / netlist.cir and follow the Fender 5F6-A layout this circuit copies. All hookup and transformer leads are drawn in the neutral tone: with no layout sheet, no lead colours are asserted (Marshall/Drake colour codes cannot be sourced here). The TMB tone-stack caps (C4/C5/C6) mount at the tone pots; the input grid stoppers (R1s/R2s 68k) and grid leaks (RG1/RG2 1M) sit at the input jacks; the 27k negative-feedback resistor and 5k presence control (with its 0.01µF cap) join the phase-inverter tail foot off-board. The 6.3 V heater chain (green twisted pair, PT → pilot lamp → the two KT66 outputs → the ECC83 phase inverter → the ECC83 driver → the ECC83 input, skipping the directly-heated GZ34) is likewise derived: with no layout sheet its daisy order is the physical socket order and the twisted-pair green is the house heater idiom, not a sourced wire colour (no winding centre-tap arrangement is asserted). Not a trace or a dimensioned reproduction."
source:
  desc: "Marshall JTM45 factory schematic ('Basic schematic for Marshall trem amps, types 1961, 1962, 1987/T') — layout derived from this schematic; no factory layout sheet located"
  url: "https://www.drtube.com/schematics/marshall/jtm45tr.gif"

# Wiring proven electrically equivalent to the verified netlist by
# pipeline/verify_layout_nets.py (see the net_map block at the foot of this file).
# Re-earned 2026-07-19 under the HARDENED gate: the ECC83 valve-alias now
# resolves, so all three ECC83 dual-triodes (input, driver+CF, phase inverter)
# anchor by basing alongside the two KT66 outputs (0 UNANCHORED — the whole
# preamp+PI is checked, not silently skipped). The output grids are un-collapsed
# to distinct nodes and their PI-plate couplers (C9/C10), grid stoppers (R5s/R6s)
# and 220k grid leaks (RGL1/RGL2) are checked as real parts.
wiring_claim: verified

# Board-mounted parts. a / b are eyelet endpoints [row, col]; the body is drawn
# between them (same row = axial part; shared column across rows = vertical leg).
parts:
  # --- bias supply (silicon HT-tap diode -> 150k -> .05u/25u -> -50V) ----------
  - { ref: RB1,  a: [1, 3],  b: [1, 4] }    # 150k bias series
  - { ref: D1,   a: [1, 6],  b: [1, 7] }    # 1N4007 bias rectifier (roomy col — long value label)
  - { ref: C16,  a: [0, 0],  b: [0, 1] }    # 25 µF bias reservoir
  - { ref: C15,  a: [0, 3],  b: [0, 4] }    # 0.05 µF bias filter
  # --- main filter cans + rail droppers (power end, left) ---------------------
  - { ref: C11,  a: [0, 6],  b: [0, 8] }    # 32 µF reservoir, B+1
  - { ref: C12,  a: [0, 9],  b: [0, 11] }   # 16 µF filter, B+2 (screens)
  - { ref: C13,  a: [0, 12], b: [0, 14] }   # 16 µF filter, B+3 (PI)
  - { ref: C14,  a: [0, 15], b: [0, 17] }   # 16 µF filter, B+4 (preamp)
  - { ref: RD1,  a: [1, 9],  b: [1, 10] }   # 8.2k dropper B+2->B+3
  - { ref: RD2,  a: [1, 12], b: [1, 13] }   # 10k dropper B+3->B+4
  # --- KT66 output support: grid stoppers, grid leaks, screen stoppers ---------
  - { ref: C9,   a: [0, 18], b: [0, 20] }   # 0.1 µF PI(V4A) -> V5 grid coupler
  - { ref: C10,  a: [0, 22], b: [0, 24] }   # 0.1 µF PI(V4B) -> V6 grid coupler
  - { ref: R5s,  a: [1, 17], b: [1, 18] }   # 33k V5 grid stopper
  - { ref: RGL1, a: [1, 19], b: [1, 20] }   # 220k V5 grid leak -> -50V
  - { ref: RS1,  a: [1, 21], b: [1, 22] }   # 1k 2W V5 screen
  - { ref: R6s,  a: [1, 24], b: [1, 25] }   # 33k V6 grid stopper
  - { ref: RGL2, a: [1, 26], b: [1, 27] }   # 220k V6 grid leak -> -50V
  - { ref: RS2,  a: [1, 28], b: [1, 29] }   # 1k 2W V6 screen
  # --- long-tailed-pair phase inverter (V4) -----------------------------------
  - { ref: RLA,  a: [1, 31], b: [1, 32] }   # 82k V4A plate load
  - { ref: RLB,  a: [1, 33], b: [1, 34] }   # 100k V4B plate load
  - { ref: C7,   a: [0, 32], b: [0, 33] }   # 0.02 µF tone stack -> V4A grid coupler
  - { ref: C8,   a: [0, 35], b: [0, 36] }   # 0.1 µF V4B grid AC-ground to tail jct
  - { ref: RGA,  a: [1, 36], b: [1, 37] }   # 1M V4A grid leak -> tail junction
  - { ref: RGB,  a: [1, 38], b: [1, 39] }   # 1M V4B grid leak -> tail junction
  - { ref: RTAIL, a: [0, 41], b: [1, 41] }  # 470 PI tail (vertical)
  - { ref: RT2,  a: [1, 42], b: [1, 43] }   # 10k tail junction -> ground
  # --- cathode-follower TMB tone stack (slope + CF load; caps at the pots) -----
  - { ref: RSL,  a: [1, 45], b: [1, 46] }   # 56k tone-stack slope
  - { ref: RKCF, a: [0, 47], b: [1, 47] }   # 100k cathode-follower load (vertical)
  # --- channel mixers + V3A second stage --------------------------------------
  - { ref: RM1,  a: [1, 48], b: [1, 49] }   # 270k bright-channel mixer
  - { ref: RM2,  a: [1, 50], b: [1, 51] }   # 270k normal-channel mixer
  - { ref: RK2,  a: [0, 52], b: [1, 52] }   # 820 V3A cathode (vertical)
  - { ref: RL3,  a: [1, 53], b: [1, 54] }   # 100k V3A plate load
  # --- ECC83 input pair (V1): bright + normal channels (right end) -------------
  - { ref: C1,   a: [0, 54], b: [0, 56] }   # 0.02 µF V1A -> bright volume
  - { ref: RL1,  a: [1, 55], b: [1, 56] }   # 100k V1A plate load
  - { ref: C2,   a: [0, 57], b: [0, 59] }   # 0.02 µF V1B -> normal volume
  - { ref: RL2,  a: [1, 58], b: [1, 59] }   # 100k V1B plate load
  - { ref: RK1,  a: [0, 61], b: [1, 61] }   # 820 shared ECC83 cathode (vertical)
  - { ref: C3,   a: [0, 62], b: [0, 63] }   # 250 µF shared cathode bypass

# Off-board items as labelled stubs: tubes along the bottom (in the drawing's
# GZ34 · KT66 · KT66 · ECC83 · ECC83 · ECC83 row order), pots + input jacks up
# top, transformers + choke to the sides.
offboard:
  - { id: PT,  kind: xfmr,  edge: left,   at: 0.3, label: "Power trans" }
  - { id: L1,  ref: L1, kind: choke, edge: left, at: 1.5, label: "Choke" }
  - { id: PL1, kind: part, glyph: lamp, edge: left, at: 2.6, label: "Pilot lamp" }
  - { id: V7,  ref: V7, kind: tube, edge: bottom, at: 3,    label: "V7 · GZ34" }
  - { id: V5,  ref: V5, kind: tube, edge: bottom, at: 20,   label: "V5 · KT66" }
  - { id: V6,  ref: V6, kind: tube, edge: bottom, at: 27,   label: "V6 · KT66" }
  - { id: SPK, kind: jack, edge: bottom, at: 33, label: "Spkr jacks" }
  # 27 kΩ negative-feedback resistor (annotation only — no board designator):
  # taps the speaker/OT-secondary node and returns to the phase-inverter tail
  # foot. Drawn as a discrete 2-lead off-board part so the wiring reads true — a
  # bare wire here would falsely short the speaker node to the tail junction.
  - { id: RNFB, kind: part, edge: bottom, at: 35, label: "27k NFB" }
  - { id: V4,  ref: V4, kind: tube, edge: bottom, at: 37,   label: "V4 · ECC83 (PI)" }
  - { id: V3,  ref: V3, kind: tube, edge: bottom, at: 50,   label: "V3 · ECC83" }
  - { id: V1,  ref: V1, kind: tube, edge: bottom, at: 59,   label: "V1 · ECC83" }
  - { id: VRP, kind: pot, edge: top, at: 40,   label: "Presence" }
  - { id: VR3, ref: VR3, kind: pot, edge: top, at: 43,   label: "Treble" }
  - { id: VR4, ref: VR4, kind: pot, edge: top, at: 45,   label: "Bass" }
  - { id: VR5, ref: VR5, kind: pot, edge: top, at: 47.5, label: "Middle" }
  - { id: VR1, ref: VR1, kind: pot, edge: top, at: 54,   label: "Vol · bright" }
  - { id: VR2, ref: VR2, kind: pot, edge: top, at: 59,   label: "Vol · normal" }
  - { id: JB,  kind: jack, edge: top, at: 56, label: "Bright in" }
  - { id: JN,  kind: jack, edge: top, at: 62, label: "Normal in" }
  - { id: T3,  ref: T3, kind: xfmr, edge: right, at: 0.5, label: "Output trans" }

# Ground bus — the bare tinned rail running the length of the board just below
# the bottom eyelet row; the filter, cathode, bias, grid-leak, and pot grounds
# all tie to it.
bus:
  - { from: [1.45, -0.4], to: [1.45, 63.4] }

# Wiring — reconstructed lead-by-lead from schematic.kicad_sch / netlist.cir
# (the electrical authority). No factory layout sheet was located, so every lead
# is drawn in the neutral hookup tone: no wire colours are asserted. The one
# exception is the 6.3 V heater chain, drawn as the house green twisted-pair idiom
# (style: twisted) with its daisy order taken from the physical socket order — a
# standard-practice reconstruction, not a sourced routing or wire colour. `via`
# waypoints are [col, row]; row<0 routes above the board, row>1 below it. Tube
# socket pins (Vn.pinN) are validated against reference/tubes basing (heater pins
# on the twisted runs).
runs:
  # --- power-transformer secondary -> GZ34 rectifier --------------------------
  - { from: PT.ht1,  to: V7.pin4, via: [[2.75, 0.11]] }                 # HT plate 1 (360 V) — comb to pin-4 column then straight down
  - { from: PT.ht2,  to: V7.pin6, via: [[3.64, 0.19]] }                 # HT plate 2 (360 V) — comb to pin-6 column then straight down
  - { from: PT.htct, to: [1.45, 3], via: [[3.0, 0.26], [3.4, 0.9]] }               # HT centre tap -> ground bus (comb to col 3, bows right of RB1.a into the bus, clear of the pin-4 drop)
  - { from: PT.rect1, to: V7.pin2, via: [[2.28, 0.34]] }                # 5 V rectifier filament (comb to pin-2 column then straight down)
  - { from: PT.rect2, to: V7.pin8, via: [[3.47, 0.41]] }                # 5 V filament / cathode (B+ out) — comb to pin-8 column then straight down
  - { from: V7.pin8, to: C11.a, via: [[4, 2.4]] }  # B+ out -> reservoir C11 (approaches C11.a steeply from lower-left, clear of D1.a on col 6)

  # --- filtered B+ rail: choke, then 8.2k and 10k droppers -------------------
  - { from: C11.a, to: L1.hi }                     # B+1 -> 20H choke
  - { from: L1.lo, to: C12.a }                     # choke -> B+2 (screens)
  - { from: C12.a, to: RD1.a, via: [[9.35, 0.7]] } # B+2 -> 8.2k dropper (bows right, clear of the C12.a lower-left feeds)
  - { from: RD1.b, to: C13.a }                     # -> B+3 (PI)
  - { from: C13.a, to: RD2.a, via: [[13, 0.6]] }   # B+3 -> 10k dropper (bows right, clear of the RLA-load approach)
  - { from: RD2.b, to: C14.a }                     # -> B+4 (preamp)
  - { from: C11.b, to: [1.45, 8] }                 # filter negatives -> ground bus
  - { from: C12.b, to: [1.45, 11] }
  - { from: C13.b, to: [1.45, 14] }
  - { from: C14.b, to: [1.45, 17], via: [[17.4, 0.7]] }   # bowed clear of R5s.a at col 17 row 1

  # --- bias supply: HT tap -> 1N4007 -> 150k -> -50V (.05u + 25u filter) ------
  - { from: V7.pin6, to: D1.a, via: [[5, 1.7]] }  # HT tap -> bias diode (approaches D1.a from lower-left, off col 6)
  - { from: D1.b,  to: RB1.a, via: [[5.5, 1.28]] }  # diode -> 150k series
  - { from: RB1.b, to: C15.a }                     # 150k -> -50V node
  - { from: C15.a, to: C16.a, via: [[1.5, -0.2]] }                     # -50V: .05u || 25u (bows above C16.b at col 1)
  - { from: C15.b, to: [1.45, 4], via: [[4.3, 0.7]] }                 # bias filter -> ground bus (bows right of RB1.b at col 4)
  - { from: C16.b, to: [1.45, 1] }                 # bias reservoir -> ground bus

  # --- KT66 output stage: screens, grids, plates, cathodes, OT ---------------
  - { from: RS1.a, to: C12.a, via: [[21, 2.32], [8, 2.32]] }  # V5 screen R -> B+2 (drops straight down at col 21 clear of the V5 pins, then deep lane 2.32)
  - { from: RS2.a, to: RS1.a, via: [[28, 1.24], [21.6, 1.24]] }   # B+2 screen backbone (shallow bow above the KT66 pins; approaches RS1.a from the right)
  - { from: RS1.b, to: V5.pin4, via: [[22.7, 2.55]] }          # -> V5 screen (excursion pulled right, clear of the V5 label)
  - { from: RS2.b, to: V6.pin4, via: [[29.7, 2.55]] }          # -> V6 screen (excursion pulled right, clear of the V6 label)
  - { from: C9.b,  to: R5s.a, via: [[19, 1.5]] }               # PI coupler -> V5 grid stopper
  - { from: R5s.b, to: V5.pin5, via: [[18.5, 1.62]] }          # grid stopper -> V5 grid
  - { from: RGL1.a, to: V5.pin5, via: [[20, 1.72]] }           # grid leak -> V5 grid
  - { from: C10.b, to: R6s.a, via: [[24, 1.5]] }               # PI coupler -> V6 grid stopper
  - { from: R6s.b, to: V6.pin5, via: [[25.5, 1.62]] }          # grid stopper -> V6 grid
  - { from: RGL2.a, to: V6.pin5, via: [[27, 1.72]] }           # grid leak -> V6 grid
  - { from: RGL1.b, to: RGL2.b, via: [[20.3, 1.12], [27.3, 1.12]] }  # -50V ties both leaks (shallow bow above the KT66 grid pins; approaches RGL2.b from the right)
  - { from: RGL2.b, to: C16.a, via: [[24, 2.24], [1, 2.24]] }      # -50V backbone -> bias node (leaves RGL2.b steeply down-left to lane 2.24; clears V7 pins)
  - { from: V5.pin3, to: T3.pa, via: [[17.3, 2.9], [62.5, 2.9], [62.5, 0.31]] }    # V5 plate -> OT primary (own drop col 62.5, up to the pa pigtail)
  - { from: V6.pin3, to: T3.pb, via: [[24.0, 3.05], [62.7, 3.05], [62.7, 0.405]] }  # V6 plate -> OT primary (own drop col 62.7)
  - { from: T3.ct,  to: C11.a, via: [[62.3, 0.5], [62.3, 2.72], [7, 2.72]] }  # OT centre tap -> B+1 (own drop col 62.3; approaches C11.a from lower-right)
  - { from: V5.pin8, to: [1.45, 20], via: [[20.8, 1.5]] }              # V5 cathode -> ground (bows right of V5.pin5)
  - { from: V6.pin8, to: [1.45, 27], via: [[27.8, 1.5]] }              # V6 cathode -> ground (bows right of V6.pin5)
  - { from: T3.sa,  to: SPK, via: [[63.4, 0.595], [63.4, 3.2], [31, 3.2], [31, 1.86]] }    # OT secondary -> speaker (own drop col 63.4, right of C3.b ground; up the left of the Spkr label)
  - { from: T3.sb,  to: SPK, via: [[63.6, 0.69], [63.6, 3.34], [33, 3.34]] }  # OT secondary -> speaker (own drop col 63.6; rises straight up to SPK from directly below)
  - { from: SPK, to: RNFB.a, via: [[34, 1.9], [34, 2.6]] }                 # speaker/OT-secondary node -> 27k NFB
  - { from: RNFB.b, to: RT2.a, via: [[36, 2.6], [36, 3.08], [43, 3.08]] }  # 27k NFB -> tail junction (routed in the deep band)

  # --- long-tailed-pair phase inverter (V4) ----------------------------------
  - { from: RLA.a, to: C13.a, via: [[30.3, 2.40], [11.5, 2.40]] } # 82k plate load -> B+3 (deep lane 2.40; threads up to C13.a between the col-11 ground drop and RD2.a)
  - { from: RLB.a, to: RLA.a, via: [[32.7, 1.15], [31.3, 1.15]] }     # B+3 backbone (shallow bow above the SPK terminal, clear of the OT-secondary leads)
  - { from: RLA.b, to: V4.pin6, via: [[32, 1.6]] }             # -> V4A plate
  - { from: RLB.b, to: V4.pin1, via: [[35, 1.5], [37, 1.9]] }             # -> V4B plate (passes right of the RNFB terminal; lands V4.pin1 from the right, clear of pin2)
  - { from: V4.pin6, to: C9.a, via: [[40, 1.85], [40, 2.68], [18.5, 2.68]] }   # V4A plate -> coupler to V5 (exit right of the PI label, then run under it)
  - { from: V4.pin1, to: C10.a, via: [[35.5, 2.0], [35.5, 2.82], [21, 2.82]] }    # V4B plate -> coupler to V6 (own col 35.5 clear of the SPK-NFB lead on col 34; rises to C10.a from lower-left)
  - { from: C7.b, to: V4.pin7, via: [[34, 1.5]] }              # tone coupler -> V4A grid
  - { from: RGA.a, to: V4.pin7, via: [[38.5, 1.5]] }            # 1M grid leak -> V4A grid (lands pin7 from the right, clear of pin6)
  - { from: RGA.b, to: RT2.a, via: [[37, 1.4], [40.3, 1.4]] }   # 1M grid leak -> tail junction (own lane; approaches RT2.a shallowly from the lower-left)
  - { from: RGB.a, to: V4.pin2, via: [[38.5, 1.7]] }         # 1M grid leak -> V4B grid
  - { from: RGB.b, to: RT2.a, via: [[39, 1.7], [41.3, 1.7]] }   # 1M grid leak -> tail junction (own lane; approaches RT2.a from lower-left, clear of the NFB return)
  - { from: C8.a, to: RT2.a }                      # V4B grid AC-ground cap -> tail jct
  - { from: C8.b, to: V4.pin2, via: [[35.6, 2.07]] }             # -> V4B grid (drops left of RGA.a, lands V4.pin2 horizontally from the far/left side, clear of pin3)
  - { from: V4.pin8, to: RTAIL.a, via: [[40.3, 1.2]] }         # V4A cathode -> tail top (higher lane, clear of the presence-ground drop; approaches RTAIL.a from lower-left)
  - { from: V4.pin3, to: RTAIL.a, via: [[38, 0.7], [41.5, 0.9]] }       # V4B cathode -> tail top (rises steeply left of V4.pin6, high lane clear of RGB.b, then approaches RTAIL.a from the right)
  - { from: RTAIL.b, to: RT2.a }                   # tail -> junction
  - { from: RT2.b, to: [1.45, 43] }                # 10k tail -> ground bus

  # --- cathode-follower TMB tone stack (C4/C5/C6 mount at the pots) -----------
  - { from: V3.pin3, to: RKCF.a, via: [[46.6, 1.5]] }           # CF cathode -> 100k load (approaches RKCF.a from lower-left, clear of RKCF.b / its ground drop)
  - { from: RKCF.b, to: [1.45, 47] }               # CF load -> ground bus
  - { from: V3.pin3, to: RSL.a, via: [[46, 1.72]] }          # CF cathode -> 56k slope
  - { from: RSL.b, to: VR3.lug3, via: [[43.5, 0.4], [43.3, -0.5]] }   # slope node -> treble top (peels up-left immediately, own lane at col 43.3)
  - { from: RSL.b, to: VR4.lug3, via: [[46, 0.3], [45.3, -0.5]] } # slope node -> bass top (rises straight up at col 46 then steps to VR4)
  - { from: VR3.lug1, to: VR4.lug3, via: [[43, -0.72], [45, -0.72]] } # treble bottom -> bass-top node
  - { from: VR3.lug2, to: C7.a, via: [[43, -0.55], [33, -0.55]] }  # treble wiper -> PI coupler
  - { from: VR4.lug2, to: C7.a, via: [[45, -0.66], [32, -0.66]] }  # bass wiper -> PI coupler (drops to C7.a from directly above, clear of the treble-wiper feed)
  - { from: VR4.lug1, to: VR5.lug3, via: [[44.9, -0.55], [47.6, -0.55]] }   # bass bottom -> middle top (dips below the lug row, clear of the intervening lugs)
  - { from: VR5.lug2, to: VR5.lug3 }               # middle wired as rheostat
  - { from: VR5.lug1, to: [1.45, 48] }             # middle bottom -> ground (C6 at pot)

  # --- V3A second stage + V3B cathode follower + mixers ----------------------
  - { from: RL3.a, to: C14.a, via: [[52.3, 2.56], [15.5, 2.56]] }  # V3A plate load -> B+4 (own deep lane 2.56; exit col 52.3, clear of the col-53 ground drop)
  - { from: RL3.b, to: V3.pin6, via: [[53.5, 1.6]] }           # -> V3A plate
  - { from: V3.pin6, to: V3.pin2, via: [[50, 1.48]] }          # V3A plate -> V3B grid (DC-coupled)
  - { from: V3.pin1, to: RL3.a, via: [[50, 1.30], [52.2, 1.30]] } # V3B (CF) plate -> B+4 (shallow approach along the socket-top lane, ~55 deg off the steep RL3.a exit)
  - { from: V3.pin8, to: RK2.a, via: [[52.4, 1.52]] }             # V3A cathode -> 820 (steep exit, clear of the V3.pin1 feed)
  - { from: RK2.b, to: [1.45, 52] }                # 820 -> ground bus
  - { from: RM1.b, to: V3.pin7, via: [[49.5, 1.7]] }          # bright mixer -> V3A grid
  - { from: RM2.b, to: V3.pin7, via: [[51, 1.66]] }           # normal mixer -> V3A grid

  # --- volume controls -> channel mixers -------------------------------------
  - { from: VR1.lug2, to: RM1.a, via: [[54, -0.5], [48, -0.5]] }   # bright vol wiper -> mixer
  - { from: VR2.lug2, to: RM2.a, via: [[59, -0.56], [50, -0.56]] } # normal vol wiper -> mixer
  - { from: VR1.lug1, to: [1.45, 53], via: [[53.5, 1.5]] }   # bright volume ground (drop col 53.5, threads between RL3.a and RL3.b)
  - { from: VR2.lug1, to: [1.45, 57] }             # normal volume ground
  - { from: C1.b, to: VR1.lug3, via: [[55, -0.45], [54, -0.45]] }  # V1A coupler -> bright vol top
  - { from: C2.b, to: VR2.lug3, via: [[59, -0.48]] }               # V1B coupler -> normal vol top

  # --- ECC83 input pair (V1): bright + normal (68k stopper + 1M leak at jacks) -
  - { from: JB, to: V1.pin7, via: [[56, -0.5], [59.5, -0.5]] }   # bright jack -> V1A grid (descends near pin7 column, clear of RL2.b)
  - { from: JN, to: V1.pin2, via: [[62, -0.7], [57.25, -0.7], [57.25, 1.7]] } # normal jack -> V1B grid (own top lane; descends between the VR2 ground and C2.a, lands V1.pin2 from the upper-left, clear of pin3)
  - { from: V1.pin6, to: RL1.b, via: [[57.5, 1.4]] }          # V1A plate -> 100k load (shallower dip, clear of VR2.lug1 ground at row ~2)
  - { from: RL1.a, to: RL3.a, via: [[54.7, 2.14], [54, 2.14]] } # V1A plate load -> B+4 backbone (leaves RL1.a down-left, clear of the RL2.a arrival)
  - { from: V1.pin6, to: C1.a, via: [[56.5, 1.72]] }          # V1A plate -> coupler
  - { from: V1.pin1, to: RL2.b, via: [[59, 1.62]] }           # V1B plate -> 100k load
  - { from: RL2.a, to: RL1.a, via: [[57.8, 2.22], [55.5, 2.22]] } # V1B plate load -> B+4 backbone (descends left of V1.pin2, deep lane 2.22)
  - { from: V1.pin1, to: C2.a, via: [[58.6, 0.6], [57, 0.6]] }          # V1B plate -> coupler (rises straight up from pin1, over the top clear of RL2.a, down to C2.a)
  - { from: V1.pin8, to: RK1.a, via: [[60.5, 1.6]] }          # V1A cathode -> shared 820
  - { from: V1.pin3, to: RK1.a, via: [[62, 1.2]] }          # V1B cathode -> shared 820 (approaches RK1.a from the right, clear of pin6 and RK1.b)
  - { from: RK1.b, to: [1.45, 61] }                # 820 -> ground bus
  - { from: C3.a, to: RK1.a }                      # cathode bypass across 820
  - { from: C3.b, to: [1.45, 63] }

  # --- presence control (5k, off-board) at the phase-inverter tail foot -------
  - { from: VRP.lug3, to: RT2.a, via: [[40, -0.78], [42.5, -0.78]] } # presence -> tail junction
  - { from: VRP.lug1, to: [1.45, 40] }             # presence ground

  # --- 6.3 V heater chain (green twisted pair, standard-practice / derived) ---
  # No factory layout sheet exists, so the daisy order is the physical socket
  # order: PT heater winding -> pilot lamp -> the two KT66 outputs -> the ECC83
  # phase inverter -> the ECC83 driver -> the ECC83 input, skipping the directly-
  # heated GZ34 (5 V winding). The twisted-pair green is the house heater idiom,
  # not a sourced wire colour, and no centre-tap arrangement is asserted. Twisted
  # runs land only on heater pins (KT66 octal 2/7, ECC83 noval 4/5), routed in a
  # deep lane below the output harness.
  - { from: PT.heat, to: PL1.a, style: twisted }                                    # 6.3 V -> pilot lamp
  - { from: PL1.b, to: V5.pin7, style: twisted, via: [[-1.4, 3.7], [20, 3.7]] }     # lamp -> V5 KT66 heater
  - { from: V5.pin2, to: V6.pin7, style: twisted, via: [[20, 3.72], [27, 3.72]] }   # V5 -> V6 KT66 heater
  - { from: V6.pin2, to: V4.pin4, style: twisted, via: [[27, 3.74], [37, 3.74]] }   # V6 -> V4 ECC83 heater
  - { from: V4.pin5, to: V3.pin4, style: twisted, via: [[37, 3.7], [50, 3.7]] }     # V4 -> V3 ECC83 heater
  - { from: V3.pin5, to: V1.pin4, style: twisted, via: [[50, 3.7], [59, 3.7]] }     # V3 -> V1 ECC83 heater
  - { from: V1.pin4, to: V1.pin5, style: twisted } # close the pair at the last socket

# net_map — the reviewable data layer reconciling the drawn wiring with the DC
# netlist for pipeline/verify_layout_nets.py. See docs/layout-schema.md.
net_map:
  # Terminals the netlist gives no discrete node to reach on their own. The two
  # KT66 plates and the OT primary centre tap all co-anchor to B+1 — the netlist
  # omits the OT primary DCR, so both plate nodes and the CT collapse to B+1.
  anchors:
    T3.pa: BP1       # V5 KT66 plate → OT primary
    T3.pb: BP1       # V6 KT66 plate → OT primary
    T3.ct: BP1       # OT primary centre tap → B+1
    SPK: "0"         # speaker jack — OT-secondary DCR folded into ground (the NFB return reads as ground at DC)
  # (The 220k KT66 grid leaks RGL1/RGL2 are now MODELLED resistors in netlist.cir
  # — G5/G6 → NBIAS — together with the 0.1u PI-plate coupling caps C9/C10 and the
  # 33k grid stoppers R5s/R6s, so the whole push-pull output-grid drive is checked
  # natively. They are no longer series-bridged: bridging them would short both
  # grids onto the bias rail and hide a crossed-output or coupler-to-wrong-grid
  # fault, which is exactly the escape the hardened gate closes.)
  # Netlist elements with no discrete same-named board part — reported in
  # coverage, never a failure (their nodes still have to check out).
  netlist_unplaced:
    RCHOKE: "filter choke L1 sits on the board (B+1 → B+2); the netlist models its ~150 Ω DCR as RCHOKE"
    RG1: "V1A grid leak — 1 MΩ chassis-mounted at the bright input jack, off the board"
    RG2: "V1B grid leak — 1 MΩ chassis-mounted at the normal input jack, off the board"
    RG3: "V3A grid return — realised through the volume pots (VR1/VR2) and 270k channel mixers to ground, not a discrete board resistor"
