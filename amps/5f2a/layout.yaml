# Board layout — redrawn from the published Fender 'Princeton' 5F2-A layout
# drawing (K-EG), page 1. Part refs are the shared key into bom.yaml; the
# renderer reads each value and part type from there. A legible, schematic-
# style redraw of the board's principal components in the order the drawing
# shows them — never a trace or a dimensioned reproduction.
#
# Board reads left→right: rectifier/filter/output end at the left, 12AX7
# input stage at the right — matching the tube row on the drawing
# (5Y3GT · 6V6GT · Spkr jack · 12AX7).
#
# Honesty notes on a few items the K-EG sheet does not draw as terminal-strip
# bodies (kept as direct wiring runs instead, per the drawing itself):
#   - R3 (1 MΩ grid leak) is drawn standing across jack 1's own lugs, not on
#     the strip. Modelled here as J1's ground return.
#   - R7 (1.5 kΩ, V1B's deliberately-unbypassed cathode) and R12 (22 kΩ
#     speaker feedback) are not drawn as separate bodies — the sheet shows
#     their resulting hookup wires arriving together at V1 pin 3 by way of
#     the speaker-jack lug. The SPK→V1.pin3 and V1.pin3→ground runs below
#     carry R12 and R7 in-line; there is no drawn body for either.
#   - C3 (.005 µF) and C4 (500 pF) are drawn mounted at/between the tone and
#     volume pot bodies, not on the strip — modelled as pot-lug runs with no
#     board body, matching the sheet.
# The output transformer is not drawn as its own symbol on this sheet (only
# the power transformer gets one) — T2's position here (opposite the power
# transformer, at the right edge) is a reasonable placement for legibility;
# its wiring (B+1 / plate / secondary) follows the schematic exactly.
#
# 12AX7 pin numbers: the K-EG sheet draws the 12AX7 socket with plain dots,
# no printed numbers (unlike the 5Y3GT/6V6GT sockets, which print 1–8). Pin
# assignments below follow the standard Fender tweed convention used
# throughout this era (also standard in the reference literature): V1A =
# pins 6/7/8 (plate/grid/cathode), V1B = pins 1/2/3.
board:
  rows: 2
  cols: 32
  title: "5F2-A · eyelet board layout"
caption: "Redrawn from the published Fender 5F2-A layout drawing (K-EG) — principal board components, in the order the drawing shows them. R3, R7, R12 (standing resistors at a jack/socket lug) and the tone pot's C3/C4 are wired but not drawn as bodies, matching the sheet. Not a trace or a dimensioned reproduction."
source:
  desc: "Fender 'Princeton' Model 5F2-A layout drawing (K-EG), page 1"
  url: "https://el34world.com/charts/Schematics/files/Fender/Fender_princeton_5f2a.pdf"

parts:
  # power supply: 32 µF (16+16 paralleled) B+1, 10k dropper, 8µF B+2,
  # 22k dropper, 8µF B+3 (left end, matching the rectifier/filter order
  # the drawing shows)
  - { ref: C7,  a: [0, 0],  b: [0, 1], nudge: [0, 26] }    # 16 µF filter, B+1
  - { ref: C8,  a: [0, 2],  b: [0, 3], nudge: [0, 26] }    # 16 µF filter, B+1 (paralleled)
  - { ref: R10, a: [1, 4],  b: [1, 5] }    # 10k 1W dropper B+1→B+2
  - { ref: C9,  a: [0, 6],  b: [0, 7], nudge: [0, 26] }    # 8 µF filter, B+2
  - { ref: R11, a: [1, 8],  b: [1, 9] }    # 22k dropper B+2→B+3
  - { ref: C10, a: [0, 10], b: [0, 11], nudge: [0, 26] }   # 8 µF filter, B+3
  # 6V6GT output stage grid leak + cathode bias
  - { ref: R8,  a: [1, 12], b: [1, 13] }   # 220k 6V6 grid leak
  - { ref: R9,  a: [0, 14], b: [1, 14] }   # 470 Ω 1W 6V6 cathode (vertical)
  - { ref: C6,  a: [0, 15], b: [0, 16], nudge: [0, 26] }   # 25 µF 6V6 cathode bypass
  # coupling caps: V1B→6V6 grid, V1A→tone/volume network
  - { ref: C5,  a: [0, 17], b: [0, 18] }   # 0.02 µF V1B → 6V6 grid
  - { ref: C2,  a: [0, 19], b: [0, 20] }   # 0.02 µF V1A → tone/volume network
  # V1A/V1B plate loads (both land on B+3)
  - { ref: R4,  a: [1, 21], b: [1, 22] }   # 100k V1A plate load
  - { ref: R6,  a: [1, 23], b: [1, 24] }   # 100k V1B plate load
  # input grid stoppers (right end, nearest the jacks and V1)
  - { ref: R1,  a: [1, 25], b: [1, 26] }   # 68k grid stopper, jack 1 (high)
  - { ref: R2,  a: [1, 27], b: [1, 28] }   # 68k grid stopper, jack 2 (low)
  # V1A cathode bias (bypassed) — far right, nearest the 12AX7 socket
  - { ref: R5,  a: [0, 29], b: [1, 29] }   # 1.5k V1A cathode (vertical)
  - { ref: C1,  a: [0, 30], b: [0, 31], nudge: [0, 26] }   # 25 µF V1A cathode bypass

offboard:
  - { id: PT,  kind: xfmr, edge: left,   at: 0.5, label: "Power trans" }
  - { id: V3,  ref: V3, kind: tube, edge: bottom, at: 2,  label: "V3 · 5Y3GT" }
  - { id: V2,  ref: V2, kind: tube, edge: bottom, at: 15, label: "V2 · 6V6GT" }
  - { id: SPK, kind: jack, edge: bottom, at: 20, label: "Spkr jack" }
  - { id: V1,  ref: V1, kind: tube, edge: bottom, at: 27, label: "V1 · 12AX7" }
  - { id: VR2, ref: VR2, kind: pot, edge: top, at: 21, label: "Tone" }
  - { id: VR1, ref: VR1, kind: pot, edge: top, at: 24, label: "Volume" }
  - { id: J1,  kind: jack, edge: top, at: 26, label: "In 1 · hi" }
  - { id: J2,  kind: jack, edge: top, at: 28, label: "In 2 · lo" }
  - { id: T2,  ref: T2, kind: xfmr, edge: right, at: 0.5, label: "Output trans" }

# Ground bus — the bare-wire rail the drawing shows joining the filter-cap
# grounds and R8's ground end; extended the length of the board (as the
# other returns — cathode grounds, pot grounds, jack 1's grid leak — all tie
# into the same rail in this small a chassis). Drawn just below the bottom
# eyelet row (the house convention set by amps/5e3), not above — the pot/jack
# leads already own the space above the board.
bus:
  - { from: [1.45, -0.4], to: [1.45, 31.4] }

# Wiring — read lead-by-lead from the published 5F2-A layout drawing (K-EG).
# The power-transformer secondary leads carry the colours marked on that
# drawing (primary black/black and the 6.3V heater green are omitted — they
# land on chassis switches/pilot lamp/heater pins, out of this diagram's
# scope, matching the house convention set by amps/5e3). The volume-pot-
# wiper-to-V1B-grid lead is marked RED on the sheet; every other lead is bare
# hookup wire in the neutral tone.
runs:
  # --- power transformer secondary → 5Y3GT rectifier (marked colours) ------
  - { from: PT.red1,    to: V3.pin4 }                # HT plate 1
  - { from: PT.red2,    to: V3.pin6 }                # HT plate 2
  - { from: PT.yellow1, to: V3.pin2 }                # 5V rectifier filament
  - { from: PT.yellow2, to: V3.pin8 }                # 5V rectifier filament / B+ out
  - { from: V3.pin8, to: C7.a, via: [[2.5, 1.55]] }  # B+ out → first filter (B+1)

  # --- filtered B+ rail (32µF, 10k dropper, 8µF, 22k dropper, 8µF) ---------
  - { from: C7.a,  to: C8.a }                        # both 16µF caps paralleled, B+1
  - { from: C8.a,  to: R10.a }                       # B+1 → 10k dropper
  - { from: R10.b, to: C9.a }                        # → B+2
  - { from: C9.a,  to: R11.a }                       # B+2 → 22k dropper
  - { from: R11.b, to: C10.a }                       # → B+3
  - { from: C7.b,  to: [1.45, 0.5] }                 # filter negatives → ground bus
  - { from: C8.b,  to: [1.45, 2.5] }
  - { from: C9.b,  to: [1.45, 6.5] }
  - { from: C10.b, to: [1.45, 10.5] }

  # --- output stage: B+ taps, screen, plate/OT, cathode -------------------
  - { from: C9.a,  to: V2.pin4, via: [[9, 2.3]] }    # B+2 → 6V6 screen
  - { from: C10.a, to: R4.b, via: [[11, 1.65], [21.6, 1.65]] }  # B+3 → V1A plate load
  - { from: R4.b,  to: R6.b }                        # both 100k plate loads share B+3
  - { from: C7.a,  to: T2.pri_b, via: [[0.5, 2.6], [31.6, 2.6]] }   # B+1 → OT primary
  - { from: T2.pri_p, to: V2.pin3, via: [[31.8, 2.75], [15, 2.75]] }  # OT primary → 6V6 plate
  - { from: T2.sec_h, to: SPK }                      # OT secondary → speaker (+ feedback tap)
  - { from: T2.sec_c, to: [1.45, 31] }                # OT secondary common → ground bus
  - { from: SPK, to: V1.pin3, via: [[20, 2.9], [26.6, 2.9]] }  # feedback tap (R12, in-line)
  - { from: V1.pin3, to: [1.45, 26.5], via: [[26.6, 2.0]] }    # V1B cathode → ground (R7, in-line)

  # --- 6V6 grid + cathode ---------------------------------------------------
  - { from: R8.a, to: V2.pin5, via: [[12.5, 1.5]] }  # grid leak → 6V6 grid
  - { from: C5.b, to: R8.a }                          # coupler output shares the grid node
  - { from: R8.b, to: [1.45, 12.5] }                  # grid leak → ground bus
  - { from: C5.a, to: V1.pin1, via: [[17.5, 1.6]] }   # coupler input ← V1B plate
  - { from: V1.pin1, to: R6.a, via: [[27.3, 1.7]] }   # V1B plate → its 100k plate load
  - { from: V2.pin8, to: R9.a, via: [[15, 1.65]] }    # 6V6 cathode → 470Ω
  - { from: R9.b, to: [1.45, 14] }                    # 470Ω → ground bus
  - { from: C6.a, to: R9.a }                          # cathode bypass across 470Ω
  - { from: C6.b, to: [1.45, 15.5] }

  # --- V1A stage → coupler → tone/volume network ---------------------------
  - { from: V1.pin6, to: C2.a, via: [[27, 1.6]] }     # V1A plate → coupler
  - { from: V1.pin6, to: R4.a, via: [[27, 1.65]] }    # V1A plate → 100k load
  - { from: C2.b, to: VR1.lug1, via: [[20, -0.45], [24, -0.5]] }   # coupler → node X

  # tone network: VR2 wired as a variable resistor (wiper shorted to lug1),
  # C3 (.005µF, mounted at the pot per the drawing) in series from node X —
  # no board body for C3; this run stands in for it.
  - { from: VR1.lug1, to: VR2.lug1, via: [[24, -0.6], [21, -0.6]] }  # node X → tone (C3 in-line)
  - { from: VR2.lug1, to: VR2.lug2 }                  # wiper shorted to lug1 (rheostat)
  - { from: VR2.lug3, to: [1.45, 21], via: [[21, -0.3]] }   # tone ground

  # C4 (500pF, mounted between the pots per the drawing) bypasses the volume
  # pot, node X → node Y — no board body for C4; this run stands in for it.
  - { from: VR1.lug1, to: V1.pin2, via: [[24, -0.7], [27, -0.5]] }
  - { from: VR1.lug2, to: V1.pin2, color: red, via: [[24, -0.4]] }  # wiper → V1B grid (marked RED)
  - { from: VR1.lug3, to: [1.45, 24.5], via: [[24, -0.3]] }  # volume ground

  # --- input stage: two jacks, shared 1MEG leak (standing at jack 1) -------
  - { from: J1, to: R1.a, via: [[26, -0.45]] }
  - { from: R1.b, to: V1.pin7, via: [[25.6, 1.6]] }   # stopper → V1A grid
  - { from: J2, to: R2.a, via: [[28, -0.45]] }
  - { from: R2.b, to: V1.pin7, via: [[27.6, 1.55]] }  # stopper → V1A grid
  - { from: J1, to: [1.45, 25.5], via: [[26, -0.3]] }  # 1MEG grid leak (R3, in-line) → ground

  # --- V1A cathode bias (bypassed) ------------------------------------------
  - { from: V1.pin8, to: R5.a, via: [[29, 1.6]] }
  - { from: R5.b, to: [1.45, 29] }
  - { from: C1.a, to: R5.a }
  - { from: C1.b, to: [1.45, 30.5] }
