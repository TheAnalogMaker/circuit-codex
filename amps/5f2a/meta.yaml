sources:
  - desc: "Fender 'Princeton' Model 5F2-A drawing (K-EG), layout + schematic sheets: every component value read directly from the published drawing (2026-07-18) — two-jack input (68k stoppers, 1M leak), V1A 100k/1.5k-bypassed, the single tone/volume network (1M lin pots, 0.02/0.005/500 pF caps), V1B 100k with an UNbypassed 1.5k cathode carrying the 22k speaker feedback, 6V6GT 470 Ω · 1 W / 220 kΩ, and the 32 µF/8 µF/8 µF supply split by a 10 kΩ · 1 W and a 22k dropper (PT 66079, OT 265). The drawing prints no voltage chart. Not reproduced here; archived at EL34World"
    url: "https://el34world.com/charts/Schematics/files/Fender/Fender_princeton_5f2a.pdf"
  - desc: "Rob Robinette, 'How Amps Work' (tweed 5F1/6V6 single-ended walkthrough) — published DC measurements used as the verification reference in lieu of a factory chart: B+ 360/325/250, 6V6 ~19 V cathode drop across 470R, 12AX7 plates ~170 V, cathodes ~1.5 V. The 5F2-A shares this circuit's DC signal path exactly (the tone control is capacitor-coupled)"
    url: "https://robrobinette.com/How_Amps_Work.htm"
