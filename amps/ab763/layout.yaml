# Board layout — redrawn from the published Fender AB763 Deluxe Reverb-Amp layout
# drawing. Part refs are the shared key into bom.yaml; the renderer reads each
# value and part type from there. A legible, schematic-style redraw of the board's
# principal components in the order the drawing shows them — never a trace or a
# dimensioned reproduction.
#
# The board reads left→right: power / rectifier / output at the left end, the
# phase inverter and reverb/tremolo tubes in the middle, the vibrato and normal
# preamp stages at the right — matching the tube row on the drawing
# (GZ34 · 6V6 · 6V6 · 12AT7 PI · 12AT7 reverb · 12AX7 trem · 12AX7 · 12AX7 · 12AX7).
#
# Machine-checked equivalence: the point-to-point wiring drawn below has been
# verified electrically equivalent to the simulated netlist (netlist.cir) by
# pipeline/verify_layout_nets.py — see the net_map block at the foot of this file
# and docs/layout-schema.md. Heaters, the pilot lamp, the tremolo oscillator, and
# the PT/rectifier AC side are an excluded annotation layer (not in netlist.cir).
wiring_claim: verified

board:
  rows: 2
  cols: 62
  title: "AB763 · eyelet board layout"
caption: "Redrawn from the published Fender AB763 Deluxe Reverb-Amp layout drawing — principal board components, in the order the drawing shows them. The tone, reverb-mix, tremolo-oscillator and bias-supply networks mount largely at the pots and are drawn minimally for legibility; small grid stoppers are omitted. The 6.3 V heater chain (green twisted pair, PT → pilot lamp → the two 6V6 output tubes → 12AT7 PI → 12AT7 reverb driver → 12AX7 tremolo → the three 12AX7 preamp tubes) is routed as the published sheet shows it; the GZ34 rectifier is indirectly heated from the 5 V winding and off the 6.3 V chain. Not a trace or a dimensioned reproduction."
source:
  desc: "Fender 'Deluxe Reverb-Amp AB763' layout drawing (C-FD), page 1"
  url: "https://el34world.com/charts/Schematics/files/Fender/Fender_deluxe_reverb_ab763.pdf"

parts:
  # --- power supply (left end): filter cans + droppers ---
  - { ref: C10, a: [0, 0], b: [1, 0] }     # 16 µF reservoir (B+1, 6V6 plates)
  - { ref: C11, a: [0, 1], b: [1, 1] }     # 16 µF post-choke screen node (B+1 at DC)
  - { ref: C12, a: [0, 2], b: [1, 2] }     # 16 µF B+3 (+325, PI/820-cathode stages)
  - { ref: C13, a: [0, 3], b: [1, 3] }     # 16 µF B+4 (+180, channel-input rail)
  - { ref: RD1, a: [0, 5], b: [0, 6] }     # 10k dropper B+1→B+3 (not modelled; BC is driven)
  - { ref: RD2, a: [0, 7], b: [0, 8] }     # 10k dropper B+3→B+4 (BC→BD)
  # --- output stage (6V6 pair V7/V8) ---
  - { ref: RS1, a: [0, 10], b: [0, 11] }   # 470Ω-1W V7 screen stopper (B+1→S61)
  - { ref: C1,  a: [0, 12], b: [0, 13] }   # 0.1µF PI hot plate → V7 grid (PPIA→G61)
  - { ref: RGL1, a: [0, 13], b: [1, 13] }  # 220k V7 grid leak (G61→ -35V), shares G61 eyelet
  - { ref: RS2, a: [0, 14], b: [0, 15] }   # 470Ω-1W V8 screen stopper (B+1→S62)
  - { ref: C2,  a: [0, 16], b: [0, 17] }   # 0.1µF PI cold plate → V8 grid (PPIB→G62)
  - { ref: RGL2, a: [0, 17], b: [1, 17] }  # 220k V8 grid leak (G62→ -35V), shares G62 eyelet
  # --- long-tailed-pair phase inverter (V6 12AT7) ---
  - { ref: RLPA, a: [0, 18], b: [0, 19] }  # 82k hot plate load (BC→PPIA)
  - { ref: RLPB, a: [0, 20], b: [0, 21] }  # 100k cold plate load (BC→PPIB)
  - { ref: RGPA, a: [0, 22], b: [1, 22] }  # 1M hot grid leak (GPIA→JPI)
  - { ref: RGPB, a: [0, 23], b: [1, 23] }  # 1M cold grid leak (GPIB→JPI)
  - { ref: RTAIL, a: [1, 19], b: [1, 20] } # 470Ω tail (KPI→JPI)
  - { ref: RT2,  a: [0, 24], b: [1, 24] }  # 22k tail junction → ground (JPI→0)
  # --- reverb driver (V4 12AT7, both sections paralleled) ---
  - { ref: RGRD, a: [0, 25], b: [1, 25] }  # 1M grid leak (GRD→0)
  - { ref: CKRD, a: [0, 26], b: [0, 27] }  # 25µF cathode bypass (shares KRD eyelet)
  - { ref: RKRD, a: [0, 27], b: [1, 27] }  # 2.2k shared cathode (KRD→0)
  # --- reverb recovery (V3b half) ---
  - { ref: RLR1, a: [0, 39], b: [0, 40] }  # 100k plate load (BC→PR1)
  - { ref: CKR1, a: [0, 41], b: [0, 42] }  # 25µF cathode bypass (shares KR1)
  - { ref: RKR1, a: [0, 42], b: [1, 42] }  # 820Ω cathode (KR1→0)
  # --- vibrato/reverb mix driver (V3a half) ---
  - { ref: RGD1, a: [1, 43], b: [1, 44] }  # 3.3M grid leak (GD1→0)
  - { ref: RLD1, a: [0, 44], b: [0, 45] }  # 100k plate load (BC→PD1)
  - { ref: CKD1, a: [0, 46], b: [0, 47] }  # 25µF cathode bypass (shares KD1)
  - { ref: RKD1, a: [0, 47], b: [1, 47] }  # 820Ω cathode (KD1→0)
  # --- vibrato channel input (V2a half) ---
  - { ref: RLV1, a: [0, 49], b: [0, 50] }  # 100k plate load (BD→PV1)
  - { ref: CKV1, a: [0, 51], b: [0, 52] }  # 25µF cathode bypass (shares KV1)
  - { ref: RKV1, a: [0, 52], b: [1, 52] }  # 1.5k cathode (KV1→0)
  # --- vibrato channel 2nd stage (V2b half) ---
  - { ref: RLV2, a: [0, 53], b: [0, 54] }  # 100k plate load (BC→PV2)
  - { ref: CKV2, a: [0, 55], b: [0, 56] }  # 25µF cathode bypass (shares KV2)
  - { ref: RKV2, a: [0, 56], b: [1, 56] }  # 820Ω cathode (KV2→0)
  # --- normal channel input (V1a half) ---
  - { ref: RLN1, a: [0, 58], b: [0, 59] }  # 100k plate load (BD→PN1)
  - { ref: CKN1, a: [0, 60], b: [0, 61] }  # 25µF cathode bypass (shares KN1)
  - { ref: RKN1, a: [0, 61], b: [1, 61] }  # 1.5k cathode (KN1→0)

