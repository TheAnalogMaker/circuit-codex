# Ground bus — the bare rail just below the bottom eyelet row; cathode, filter,
# grid-leak, and pot grounds tie to it.
bus:
  - { from: [1.45, -0.5], to: [1.45, 61.5] }

# Wiring — read lead-by-lead from the published AB763 layout drawing. Transformer
# leads carry the drawing's colours. The 6.3 V heater winding is the green pair;
# it feeds the pilot lamp then daisy-chains socket to socket (style: twisted),
# skipping the indirectly-5V-heated GZ34. Endpoints reference board eyelets
# (REF.a/REF.b), tube socket pins (Vn.pinN, validated against the basing data —
# heater pins on the twisted runs), pot lugs, jacks, off-board 2-lead parts
# (PL1.a/PL1.b), and transformer leads.
runs:
  # === power transformer HT → GZ34 rectifier → reservoir (annotation layer) ====
  - { from: T1.red1, to: V9.pin4, via: [[1.5, 0.32]] }
  - { from: T1.red2, to: V9.pin6, via: [[2.7, 0.58]] }
  - { from: T1.red-yellow, to: [1.45, 1.4], via: [[0.5, 1.25]] }   # HT centre tap → ground (clear of the C10.b drop)
  - { from: V9.pin8, to: C10.a, color: red, via: [[1.6, 1.2]] }    # B+ out → reservoir

  # === B+1 net: spread across the reservoir (C10.a) and screen (C11.a) eyelets,
  # tied by the choke. The feeds to C11.a approach the shared eyelet from four
  # fanned bearings (≥18° apart) — from the left (choke), flat from the right
  # (screen node), and two risers in the clear corridor right of the GZ34 and the
  # far-left lane — so no two read as one wire and none grazes a ground drop or a
  # rectifier lead (choke DCR ~0 at DC). ========================================
  - { from: C10.a, to: C11.a }                                      # reservoir ↔ screen node (choke)
  - { from: T3.red, to: C10.a, color: red, via: [[11.4, 0.4], [9.4, 2.55], [-0.4, 2.55]] } # OT centre tap → B+1 (peel left of the blue plate lead, drop left of V7)
  - { from: RS2.a, to: RS1.a, color: red, via: [[14, 0.5], [10.4, 0.5]] }     # screen backbone (flat, above the 6V6 pins)
  - { from: RS1.a, to: C11.a, color: red, via: [[10, 2.5], [4.7, 2.5], [4.7, 0.15], [2.3, 0.15]] } # screen node → B+1 (flat approach from the right)
  - { from: T4.red, to: C11.a, color: red, via: [[29.6, 2.82], [3.6, 2.82], [3.6, 1.0]] } # reverb-trans primary → B+1 (rise col 3.6, clear corridor)
  - { from: RD1.a, to: C11.a, color: red, via: [[5, 2.86], [0.4, 2.86], [0.4, 1.0]] }     # B+1 → dropper feed (rise col 0.4, from lower-left)
  - { from: T3.blue, to: V7.pin3, via: [[12.8, 3.0], [10.5, 3.0]] }  # OT primary → V7 plate (straight down, then deep-left under the tube)
  - { from: T3.brown, to: V8.pin3, via: [[13.4, 3.08], [15, 3.08]] } # OT primary → V8 plate
  - { from: T3.green, to: SPK.tip, via: [[13.4, 1.05]] }             # OT secondary → speaker
  - { from: SPK.sleeve, to: [1.45, 17.4] }                          # (NFB return reads as ground at DC)

  # === B+3 net: backbone chain along the board. Each long span rides the deep
  # cap-feed band; each short inter-tap hop rides a flat on-board lane (row ~0.4),
  # so at every shared plate-load eyelet the deep (steep) arrival and the flat
  # (near-horizontal) departure diverge well past 18° — no two read as one wire.
  # Feeds the PI plates and the four 820Ω-cathode stages. =========================
  - { from: C12.a, to: RLPA.a, via: [[2.4, 0.4], [5.2, 0.4], [5.2, 2.4], [17.6, 2.4]] }  # B+3 filter → PI hot plate load (jog off C12.a, dive below the 6V6 pins)
  - { from: RLPA.a, to: RLPB.a, via: [[18.5, 0.4], [19.5, 0.4]] }        # backbone hop (flat, on-board)
  - { from: RLPB.a, to: RLR1.a, via: [[21.0, 0.5], [21.0, 2.24], [38.6, 2.24]] }  # → recovery plate load (dive right of V6.pin7)
  - { from: RLR1.a, to: RLD1.a, via: [[39.5, 0.4], [43.5, 0.4]] }        # backbone hop (flat, on-board)
  - { from: RLD1.a, to: RLV2.a, via: [[44.4, 2.28], [53.3, 2.28]] }      # → vibrato 2nd-stage plate load (ascend right of V2.pin7)
  - { from: C12.a, to: RD2.a, via: [[1.7, 0.75], [6.6, 0.75]] }          # B+3 filter → dropper node (jog off C12.a, own lane)
  - { from: RD1.b, to: RD2.a }                                       # B+1→B+3 dropper meets B+3 node (adjacent)

  # === B+4 net: dropper output → the two channel-input plate loads (deep band) ===
  - { from: C13.a, to: RLV1.a, via: [[3.5, 1.2], [6.0, 2.44], [48.6, 2.44]] }  # B+4 → vibrato input plate load (steep dive right of the drops)
  - { from: RLV1.a, to: RLN1.a, via: [[49.5, 0.4], [57.5, 0.4]] }        # backbone hop (flat, on-board)
  - { from: C13.a, to: RD2.b, via: [[3.8, 0.35], [7.6, 0.7]] }           # B+4 filter → dropper output (flat right, clears the GZ34 lead)

  # === -35V bias rail: the two 6V6 grid leaks tie together (shallow bow) =========
  - { from: RGL1.b, to: RGL2.b, via: [[13.4, 1.15], [16.6, 1.15]] }

  # === filter-can negatives → ground bus =======================================
  - { from: C10.b, to: [1.45, 0] }
  - { from: C11.b, to: [1.45, 1] }
  - { from: C12.b, to: [1.45, 2] }
  - { from: C13.b, to: [1.45, 3] }

  # === output stage: 6V6 screens, grids (G61/G62), cathodes ====================
  - { from: RS1.b, to: V7.pin4, via: [[10.9, 1.62]] }               # screen stopper → V7 screen (approach pin4 from the left)
  - { from: RS2.b, to: V8.pin4, via: [[15.3, 1.62]] }               # screen stopper → V8 screen
  - { from: C1.b, to: V7.pin5, via: [[11.9, 1.5]] }                 # coupler → V7 grid (G61), approach pin5 from upper-right
  - { from: C2.b, to: V8.pin5, via: [[16.7, 1.55]] }                # coupler → V8 grid (G62)
  - { from: V7.pin8, to: [1.45, 11.5], via: [[11.4, 1.7]] }         # V7 cathode → ground (land clear of the screen lead)
  - { from: V8.pin8, to: [1.45, 14.5], via: [[14.7, 1.5]] }         # V8 cathode → ground (land clear of the green SPK lead)

  # === phase inverter: plates→couplers, cathodes→tail, grid leaks→junction =====
  - { from: RLPA.b, to: V6.pin6, via: [[19.7, 1.5]] }               # hot plate load → V6 plate (PPIA), jog off RTAIL.a
  - { from: V6.pin6, to: C1.a, via: [[20.0, 2.55], [12, 2.55]] }    # PPIA → hot coupler (deep sub-lane below the SPK jack + 6V6 pins)
  - { from: RLPB.b, to: V6.pin1, via: [[20.3, 1.7]] }              # cold plate load → V6 plate (PPIB), leave down-left off col21
  - { from: V6.pin1, to: C2.a, via: [[18.6, 2.65], [16, 2.65]] }    # PPIB → cold coupler (deep sub-lane below the SPK jack + 6V6 pins)
  - { from: RGPA.a, to: V6.pin7, via: [[21.3, 1.55]] }             # hot grid leak → V6 grid (GPIA), jog off RGPA.b
  - { from: RGPB.a, to: V6.pin2, via: [[22.4, 1.55]] }             # cold grid leak → V6 grid (GPIB), jog off RGPB.b
  - { from: V6.pin8, to: RTAIL.a, via: [[20.4, 2.35], [18.5, 2.35], [18.5, 1.5]] } # V6 cathode(u1) → tail (KPI), below the ring, up the left
  - { from: V6.pin3, to: RTAIL.a, via: [[19.3, 1.85]] }           # V6 cathode(u2) → tail top (KPI), from below
  - { from: RTAIL.b, to: RT2.a, via: [[20.4, 1.4], [21.5, 1.1]] }  # tail → junction (JPI), flat from the left (clear of RGPA.b)
  - { from: RGPA.b, to: RT2.a, via: [[23.0, 1.55]] }               # hot grid leak → junction, from lower-left
  - { from: RGPB.b, to: RT2.a, via: [[24.5, 2.0], [24.9, 1.5]] }    # cold grid leak → junction, from lower-right (clear of RGRD.b)
  - { from: RT2.b, to: [1.45, 24] }                                 # tail 22k → ground

  # === reverb driver V4 (paralleled): plates, grids, cathodes ==================
  - { from: V4.pin6, to: V4.pin1, via: [[26.3, 2.7]] }              # tie the two plates (PRD), shallow loop
  - { from: V4.pin1, to: T4.blue, via: [[27.6, 2.36], [30.0, 2.36]] } # plates → reverb-trans primary (PRD)
  - { from: V4.pin7, to: V4.pin2, via: [[26.8, 2.5], [26.5, 3.2]] }   # tie the two grids (GRD), deep loop clear of pin8
  - { from: V4.pin7, to: RGRD.a, via: [[27.0, 2.0], [25.7, 1.4]] } # grids → 1M leak (leave pin7 below pin6, approach RGRD.a off col25)
  - { from: RGRD.b, to: [1.45, 25.2] }                            # grid leak → ground (land between the junction + leak leads)
  - { from: V4.pin8, to: RKRD.a, via: [[28.2, 2.0]] }              # cathode(u1) → 2.2k (KRD), leave pin8 rightward off pin7
  - { from: V4.pin3, to: RKRD.a, via: [[26.2, 1.4]] }           # cathode(u2) → 2.2k (KRD), from lower-left
  - { from: CKRD.a, to: [1.45, 26] }                             # bypass → ground
  - { from: RKRD.b, to: [1.45, 27.4], via: [[27.2, 1.5]] }         # 2.2k → ground
  - { from: T4.green, to: [1.45, 30.4] }                         # reverb-trans secondary → tank (annotation)

  # === reverb recovery V3b (unit1 of V3): plate, grid, cathode =================
  - { from: RLR1.b, to: V3.pin6, via: [[40, 1.62]] }             # plate load → V3 plate (PR1)
  - { from: V3.pin7, to: VRREV.lug2, via: [[42.0, 0.3], [41, -0.5]] } # recovery grid ← reverb pot wiper (ascend left of RGD1)
  - { from: V3.pin8, to: RKR1.a, via: [[42.6, 1.62]] }          # cathode → 820Ω (KR1)
  - { from: CKR1.a, to: [1.45, 41] }                            # bypass → ground
  - { from: RKR1.b, to: [1.45, 42], via: [[42.3, 1.5]] }        # 820Ω → ground

  # === mix driver V3a (unit2 of V3): plate, grid, cathode ======================
  - { from: RLD1.b, to: V3.pin1, via: [[45, 1.8]] }             # plate load → V3 plate (PD1)
  - { from: RGD1.a, to: V3.pin2, via: [[43.6, 1.62]] }         # 3.3M grid leak → V3 grid (GD1)
  - { from: RGD1.b, to: [1.45, 44] }                           # grid leak → ground (straight down off RGD1.b, clear of the grid lead)
  - { from: V3.pin3, to: RKD1.a, via: [[43.3, 2.35], [46.6, 1.8]] }  # cathode → 820Ω (KD1), dip below the pin ring off pin1/pin2
  - { from: CKD1.a, to: [1.45, 46] }                            # bypass → ground
  - { from: RKD1.b, to: [1.45, 47.5], via: [[47.4, 1.4]] }      # 820Ω → ground (drop right, clear of the cathode ascent)

  # === vibrato input V2a (unit1 of V2): plate, grid, cathode ===================
  - { from: RLV1.b, to: V2.pin6, via: [[50, 1.62]] }           # plate load → V2 plate (PV1)
  - { from: JV.tip, to: V2.pin7, via: [[47, -0.45], [51.5, -0.45]] } # jack → V2a grid (GV1)
  - { from: V2.pin8, to: RKV1.a, via: [[51.8, 2.3], [51.6, 0.5]] } # cathode → 1.5k (KV1), up the corridor between V2.pin2/3 and RKV1
  - { from: CKV1.a, to: [1.45, 51] }
  - { from: RKV1.b, to: [1.45, 52] }                           # 1.5k → ground (straight down, between the cathode riser and the jack lead)

  # === vibrato 2nd stage V2b (unit2 of V2): plate, grid, cathode ===============
  - { from: RLV2.b, to: V2.pin1, via: [[54, 1.8]] }           # plate load → V2 plate (PV2)
  - { from: VRVV.lug2, to: V2.pin2, via: [[50, -0.55], [50.5, -0.55], [50.3, 1.9]] } # vibrato-vol wiper → V2b grid (GV2), approach pin2 from lower-left off pin3/CKV1.a
  - { from: V2.pin3, to: RKV2.a, via: [[52.5, 2.35], [55.6, 1.8]] }  # cathode → 820Ω (KV2), dip below the pin ring
  - { from: CKV2.a, to: [1.45, 55] }
  - { from: RKV2.b, to: [1.45, 56.5], via: [[56.3, 1.4]] }      # 820Ω → ground (drop right, clear of the cathode ascent)

  # === normal input V1a (unit1 of V1): plate, grid, cathode ====================
  - { from: RLN1.b, to: V1.pin6, via: [[59, 1.62]] }         # plate load → V1 plate (PN1)
  - { from: JN.tip, to: V1.pin7, via: [[61, -0.45], [59.5, -0.45]] } # jack → V1a grid (GN1)
  - { from: V1.pin8, to: RKN1.a, via: [[61.5, 1.62]] }        # cathode → 1.5k (KN1)
  - { from: CKN1.a, to: [1.45, 59.5] }                       # bypass → ground (angle left, diverge from the jack lead)
  - { from: RKN1.b, to: [1.45, 61.7], via: [[61.5, 1.4]] }    # 1.5k → ground (drop right, clear of the cathode ascent)

  # === pot grounds (island controls) ==========================================
  - { from: VRVN.lug1, to: [1.45, 58] }
  - { from: VRVV.lug1, to: [1.45, 49.6] }
  - { from: VRREV.lug1, to: [1.45, 40.6] }

  # === 6.3 V heater chain (green twisted pair) =================================
  # PT green pair → pilot lamp → V7 → V8 → V6 → V4 → V5 → V3 → V2 → V1, in the
  # drawing's daisy order (the GZ34 is indirectly 5V-heated, off this chain).
  # Twisted runs land only on heater pins (6V6 octal 2/7; noval 4/5) — validated.
  - { from: T1.green, to: PL1.a, style: twisted }
  - { from: PL1.b, to: V7.pin7, style: twisted, via: [[-1.2, 3.6], [11, 3.6]] }
  - { from: V7.pin2, to: V8.pin7, style: twisted, via: [[11, 3.6], [15, 3.6]] }
  - { from: V8.pin2, to: V6.pin4, style: twisted, via: [[15, 3.62], [20, 3.62]] }
  - { from: V6.pin5, to: V4.pin4, style: twisted, via: [[20, 3.62], [27, 3.62]] }
  - { from: V4.pin5, to: V5.pin4, style: twisted, via: [[27, 3.64], [33, 3.64]] }
  - { from: V5.pin5, to: V3.pin4, style: twisted, via: [[33, 3.64], [43, 3.64]] }
  - { from: V3.pin5, to: V2.pin4, style: twisted, via: [[43, 3.64], [52, 3.64]] }
  - { from: V2.pin5, to: V1.pin4, style: twisted, via: [[52, 3.64], [60, 3.64]] }
  - { from: V1.pin4, to: V1.pin5, style: twisted }

# net_map — reviewable reconciliation of the drawn wiring with the DC netlist
# (netlist.cir) for pipeline/verify_layout_nets.py. See docs/layout-schema.md.
net_map:
  # The push-pull OT primary and the reverb-transformer primary: the netlist omits
  # winding DCR, so each transformer's B+ side sits at its rail node. The OT primary
  # (both 6V6 plate leads + centre tap) collapses to B+1; the reverb-driver plates
  # (PRD) reach B+1 through the reverb transformer's RTR4 primary DCR (declared
  # unplaced below), so its B+ lead is anchored to B+1.
  # The tremolo oscillator tube is a running phase-shift oscillator with no static
  # DC operating point (excluded from netlist.cir — see notes.md), so it cannot be
  # a quiescent stage the equivalence check verifies. Declared here so its socket is
  # an annotation-layer exclusion (printed loudly, like the rectifier), never a
  # silently-dropped tube: an UNdeclared unmodelled signal tube still hard-fails.
  excluded_tubes:
    V5: "12AX7 tremolo oscillator — a phase-shift oscillator with no static DC operating point (excluded from netlist.cir; its oscillator network mounts at the Speed/Intensity pots). Its 6.3 V heater is on the twisted chain; no signal pin is DC-checked."
  anchors:
    T3.red:   BP1    # OT primary centre tap → B+1
    T3.blue:  BP1    # OT primary, V7 plate lead → B+1
    T3.brown: BP1    # OT primary, V8 plate lead → B+1
    T4.red:   BP1    # reverb-transformer primary, B+ side → B+1
    SPK: "0"         # speaker jack — OT-secondary DCR folded into ground (NFB return reads as ground at DC)
  # DC-transparent parts the netlist omits (no DC grid current) — none placed on
  # the board here (the 68k input grid stoppers mount at the jacks, off the board).
  # Netlist elements with no discrete same-named board part — reported in coverage,
  # never a failure (their nodes still have to check out):
  netlist_unplaced:
    RTR4: "reverb transformer T4 primary DCR (~200Ω) — the winding, not a discrete board resistor; its B+ lead anchors to B+1 and its plate lead lands on the paralleled V4 plates (PRD)"
    RGN1: "1M normal-channel input grid leak — mounted at the input jacks, not on the eyelet board"
    RGV1: "1M vibrato-channel input grid leak — mounted at the input jacks, not on the eyelet board"
    RGV2: "vibrato volume pot VRVV — the netlist models its DC grid return as one grid-leak (GV2→0)"
    RGRV: "reverb-recovery grid return — realised through the reverb-level pot and the tank network to ground, not a discrete board resistor (GR1→0)"
