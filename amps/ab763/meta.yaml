  - desc: "Fender 'Deluxe Reverb-Amp AB763' drawing (C-FD), schematic + layout: every component value AND the printed voltage chart read directly from the published sheet (+415 plates/screens, +420 OT centre tap, +410 reverb-driver plate, +325 PI/preamp node, +180/+170 preamp plates, PI +170/+180 plates with +77/+75.5 tail, +8.7 reverb-driver cathode, +1.3 preamp cathodes, -35 V fixed bias; LTP PI = 82k/100k 5% plates + 470 Ohm/22k tail with 1M leaks to the junction; 6V6 220k grid leaks + 470 Ohm-1W screens; reverb driver 12AT7 both sections paralleled into the 125A20B transformer). Notice: values +/-20%, read to ground with an electronic voltmeter. The preamp bottles are labelled 7025 (a 12AX7 alias). Not reproduced here; archived at EL34World"
    url: "https://el34world.com/charts/Schematics/files/Fender/Fender_deluxe_reverb_ab763.pdf"
  - desc: "RCA 12AT7 data sheet (March 1, 1954) — tabulated Class-A1 characteristics read for the clean-room CC0 12AT7 tube model (Va=250 V, 200 Ohm cathode bias -> Ia=10 mA, gm=5500 umho, mu=60; second point Va=100 V/270 Ohm -> 3.7 mA, 4000 umho). Basing 9A. Used by the reverb driver and the phase inverter"
