# Board layout — redrawn from the published Fender 'Deluxe' 5E3 layout drawing
# (F-EE). Part refs are the shared key into bom.yaml; the renderer reads each
# value and part type from there. A legible, schematic-style redraw of the
# board's principal components in the order the drawing shows them — never a
# trace or a dimensioned reproduction.
#
# Board reads left→right: rectifier / filter / output end at the left, 12AY7
# input stage at the right — matching the tube row on the drawing
# (5Y3GT · 6V6GT · 6V6GT · 12AX7 · 12AY7).
# Machine-checked equivalence: the point-to-point wiring drawn below has been
# verified electrically equivalent to the simulated netlist (netlist.cir) by
# pipeline/verify_layout_nets.py — see the net_map block at the foot of this file
# and docs/layout-schema.md. Heaters, the pilot lamp, and the PT/rectifier AC
# side are an excluded annotation layer (not modelled in netlist.cir).
wiring_claim: verified

board:
  rows: 2
  cols: 30
  title: "5E3 · eyelet board layout"
caption: "Redrawn from the published Fender 5E3 layout drawing (F-EE) — principal board components, in the order the drawing shows them. A few small grid stoppers are omitted for legibility; the tone capacitors mount at the tone pot. The 6.3 V heater chain (green twisted pair, PT → pilot lamp → the two 6V6 output tubes → 12AX7 → 12AY7) is routed as the published sheet shows it; the 5Y3GT rectifier is directly heated from the 5 V winding and off the 6.3 V chain. Not a trace or a dimensioned reproduction."
source:
  desc: "Fender 'Deluxe' Model 5E3 layout drawing (F-EE), page 1"
  url: "https://el34world.com/charts/Schematics/files/Fender/Fender_deluxe_5e3.pdf"

parts:
  # power supply + push-pull output cathode (left end)
  - { ref: RK66, a: [0, 0],  b: [1, 0] }    # 250 Ω 5W shared 6V6 cathode (vertical)
  - { ref: C9,   a: [0, 1],  b: [0, 2] }    # 25 µF 6V6 cathode bypass
  - { ref: C11,  a: [0, 3],  b: [0, 5] }    # 16 µF filter, B+1
  - { ref: C12,  a: [0, 6],  b: [0, 8] }    # 16 µF filter, B+2
  - { ref: C13,  a: [0, 9],  b: [0, 11] }   # 16 µF filter, B+3
  - { ref: RD1,  a: [1, 4],  b: [1, 5] }    # 5k dropper B+1→B+2
  - { ref: RD2,  a: [1, 7],  b: [1, 8] }    # 22k dropper B+2→B+3
  - { ref: RG6A, a: [1, 9],  b: [1, 10] }   # 220k V3 grid leak
  - { ref: RG6B, a: [1, 11], b: [1, 12] }   # 220k V4 grid leak
  # cathodyne phase inverter (its self-bias stack is the amp's signature)
  - { ref: RKA,  a: [0, 12.5], b: [1, 12.5], nudge: [2, -26] }   # 1.5k cathode → junction (vertical; own eyelet, clear of RG6B's ground tie)
  - { ref: RL4,  a: [1, 13], b: [1, 14] }   # 56k cathodyne plate load
  - { ref: RKB,  a: [1, 15], b: [1, 16] }   # 56k junction → ground
  - { ref: C8,   a: [0, 13], b: [0, 15] }   # 0.1 µF cathode-side coupler → V4
  - { ref: C7,   a: [0, 16], b: [0, 18] }   # 0.1 µF plate-side coupler → V3
  - { ref: RGPI, a: [1, 17], b: [1, 18] }   # 1M grid leak, returned to junction
  # second stage V2A + interactive volume/tone couplers
  - { ref: RK2,  a: [0, 20], b: [1, 20], nudge: [2, -26] }   # 1.5k V2A cathode (vertical)
  - { ref: C4,   a: [0, 19], b: [0, 20] }   # 25 µF V2A cathode bypass
  - { ref: RL3,  a: [1, 18.7], b: [1, 19.6] }   # 100k V2A plate load (own eyelets, clear of RK2 ground tie [1,20] and C4 ground tie under [0,19])
  - { ref: C1,   a: [0, 21], b: [0, 23] }   # 0.1 µF V1A → instrument volume
  - { ref: C2,   a: [0, 24], b: [0, 26] }   # 0.1 µF V1B → mic volume
  - { ref: RL1,  a: [1, 21], b: [1, 22] }   # 100k V1A plate load
  - { ref: RL2,  a: [1, 23], b: [1, 24] }   # 100k V1B plate load
  # 12AY7 input stage (right end)
  - { ref: R1s,  a: [1, 25], b: [1, 26] }   # 68k instrument grid stopper
  - { ref: R2s,  a: [1, 27], b: [1, 28] }   # 68k mic grid stopper
  - { ref: RK1,  a: [0, 26.5], b: [1, 26.5] }   # 820 Ω shared 12AY7 cathode (vertical; own eyelet, clear of R2s's grid tie at [1,27])
  - { ref: C10,  a: [0, 28], b: [0, 29] }   # 25 µF 12AY7 cathode bypass

offboard:
  - { id: PT,  kind: xfmr, edge: left,   at: 0.5, label: "Power trans" }
  - { id: PL1, kind: part, glyph: lamp, edge: left, at: 1.5, label: "Pilot lamp" }
  - { id: V5,  ref: V5, kind: tube, edge: bottom, at: 1.5,  label: "V5 · 5Y3GT" }
  - { id: V3,  ref: V3, kind: tube, edge: bottom, at: 5,    label: "V3 · 6V6GT" }
  - { id: V4,  ref: V4, kind: tube, edge: bottom, at: 8.5,  label: "V4 · 6V6GT" }
  - { id: SPK, kind: jack, edge: bottom, at: 12.5, label: "Spkr jacks" }
  - { id: V2,  ref: V2, kind: tube, edge: bottom, at: 18,   label: "V2 · 12AX7" }
  - { id: V1,  ref: V1, kind: tube, edge: bottom, at: 25,   label: "V1 · 12AY7" }
  - { id: VR3, ref: VR3, kind: pot, edge: top, at: 8,  label: "Tone" }
  - { id: VR1, ref: VR1, kind: pot, edge: top, at: 14, label: "Volume" }
  - { id: VR2, ref: VR2, kind: pot, edge: top, at: 18, label: "Volume" }
  - { id: JI,  kind: jack, edge: top, at: 22, label: "Inst in" }
  - { id: JM,  kind: jack, edge: top, at: 25, label: "Mic in" }
  - { id: T2,  ref: T2, kind: xfmr, edge: right, at: 0.5, label: "Output trans" }

# Ground bus — the bare-wire rail that runs the length of the board just below
# the bottom eyelet row; the cathode, filter, and pot grounds all tie to it.
bus:
  - { from: [1.45, -0.4], to: [1.45, 29.4] }

# Wiring — read lead-by-lead from the published 5E3 layout drawing (F-EE). The
# transformer leads carry the colours marked on that drawing (black/green MAINS
# primary omitted — they land on chassis switches, not the board). The 6.3 V
# heater winding is the green pair; it feeds the pilot lamp and then daisy-chains
# socket to socket (rendered as a green twisted pair, style: twisted), skipping
# the directly-heated 5Y3GT. Every other lead is bare hookup wire in the neutral
# tone. Endpoints reference board eyelets (REF.a/REF.b), tube socket pins
# (Vn.pinN, validated against the reference basing data — heater pins on the
# twisted runs), pot lugs (VRn.lugN), jacks, off-board 2-lead parts (PL1.a/
# PL1.b), and transformer leads.
runs:
  # --- power transformer secondary → 5Y3GT rectifier (marked colours) --------
  # The five secondary leads are fanned into distinct lanes leaving the PT.
  - { from: PT.red1, to: V5.pin4, via: [[1.4, 0.3]] }        # HT plate 1
  - { from: PT.red2, to: V5.pin6, via: [[2.3, 0.62]] }       # HT plate 2
  - { from: PT.red-yellow, to: [1.45, 3.5], via: [[1.2, 1.15]] }  # HT centre tap → ground bus
  - { from: PT.yellow1, to: V5.pin2, via: [[0.7, 1.25]] }    # 5 V rectifier filament
  - { from: PT.yellow2, to: V5.pin8, via: [[1.4, 1.75]] }    # 5 V rectifier filament / B+
  - { from: V5.pin8, to: C11.a, color: red, via: [[1.6, 1.2]] }   # B+ out → first filter (from lower-left)

  # --- filtered B+ rail (three 16 µF cans, 5k then 22k droppers) -------------
  # Feeds to a shared filter node approach at distinct bearings; ground-bus
  # ties are offset off the eyelet columns they would otherwise sit on.
  - { from: C11.a, to: RD1.a }                     # B+1 → 5k dropper
  - { from: RD1.b, to: C12.a }                     # → B+2 (from lower-left)
  - { from: C12.a, to: RD2.a }                     # B+2 → 22k dropper
  - { from: RD2.b, to: C13.a }                     # → B+3 (from lower-left)
  - { from: C11.b, to: [1.45, 5.4] }               # filter negatives → ground bus
  - { from: C12.b, to: [1.45, 8.4] }
  - { from: C13.b, to: [1.45, 11.4] }

  # --- push-pull output: OT primary, screens, cathodes -----------------------
  # The output-transformer, B+/screen, and cathode "hero" leads run in a stacked
  # harness band below the sockets (as they do under a real chassis), springing
  # up to each socket from the side that keeps its label clear.
  - { from: V4.pin8, to: RK66.a, via: [[13.4, 2.4], [0.6, 2.4], [0.6, 0.5]] }   # V4 cathode → shared 250 Ω (from right)
  - { from: V3.pin8, to: RK66.a, via: [[9.7, 2.5], [-0.3, 2.5], [-0.3, 0.5]] }  # V3 cathode → shared 250 Ω (from left)
  - { from: C11.a, to: T2.red, via: [[3, 2.6], [30.2, 2.6], [30.2, 0.38]] }    # B+1 → OT centre tap (drop col 30.2)
  - { from: T2.blue, to: V3.pin3, via: [[30.5, 0.5], [30.5, 2.72], [4, 2.72]] }    # OT primary → V3 plate (drop col 30.5)
  - { from: T2.brown, to: V4.pin3, via: [[30.7, 0.62], [30.7, 2.84], [7.4, 2.84]] } # OT primary → V4 plate (drop col 30.7)
  # The 6V6 screens tie to the B+2 rail (the 5 kΩ-dropper output, RD2.a = C12.a
  # node) — the screen supply per the schematic; routed in the deep harness band.
  - { from: RD1.b, to: V3.pin4, via: [[4.4, 2.55]] }   # B+2 rail (dropper output) → V3 screen (own lane, clear of the pin-5 grid feed)
  - { from: RD2.a, to: V4.pin4, via: [[7.2, 3.08], [9.8, 3.08]] }   # B+2 rail → V4 screen (down-right)
  - { from: RK66.b, to: [1.45, 0] }                    # 250 Ω → ground bus
  - { from: C9.a, to: RK66.a }                         # cathode bypass across 250 Ω
  - { from: C9.b, to: [1.45, 2] }
  - { from: RG6A.a, to: C7.b, via: [[9.5, 0.35], [18, 0.35]] }   # V3 grid leak → grid node (from directly below)
  - { from: RG6A.b, to: [1.45, 9.5] }                          # grid leak → ground bus
  - { from: RG6B.a, to: C8.b, via: [[11.5, 0.5], [14.5, 0.25]] } # V4 grid leak → grid node (from lower-left)
  - { from: RG6B.b, to: [1.45, 11.5] }                         # grid leak → ground bus

  # --- cathodyne phase inverter (V2B) ---------------------------------------
  - { from: V2.pin1, to: RL4.b, via: [[17.3, 2.35], [14, 2.35]] }  # V2B plate → 56k plate load (dip clears pin 2)
  - { from: RL4.a, to: C13.a, via: [[13, 0.5], [9.6, 0.5]] }   # cathodyne plate load → B+3 (per schematic)
  - { from: V2.pin1, to: C7.a, via: [[18, 1.5]] }    # V2B plate → plate-side coupler
  - { from: C7.b, to: V3.pin5, via: [[16, 0.5], [14, 3.2], [5, 3.2]] }    # coupler → V3 grid (down-left, clear of V2 pins)
  - { from: V2.pin3, to: RKA.a, via: [[13, 1.6]] }   # V2B cathode → 1.5k
  - { from: RKA.b, to: RKB.a, via: [[13.1, 1.55], [15.4, 1.55]] }  # junction → 56k cathode load (lane clear of RL4)
  - { from: RKB.b, to: [1.45, 16] }                  # 56k → ground bus
  - { from: RKA.b, to: C8.a, via: [[13, 0.55]] }     # junction → cathode-side coupler
  - { from: C8.b, to: V4.pin5, via: [[15.5, 3.32], [8.5, 3.32]] }  # coupler → V4 grid (approach from left of pin 8)
  - { from: RGPI.a, to: RKA.b, via: [[17, 0.6], [12.4, 0.6]] }    # PI grid leak → junction (upper lane)
  - { from: RGPI.b, to: V2.pin2, via: [[18.6, 1.7]] }  # PI grid leak → V2B grid (from right)

  # --- driver / second stage (V2A) + tone -----------------------------------
  - { from: V2.pin6, to: RL3.a, via: [[18.7, 1.55]] }  # V2A plate → 100k plate load
  - { from: RL3.b, to: C13.a, via: [[19.6, -0.72], [9.4, -0.72]] }  # V2A plate load → B+3 (over the top, per schematic)
  - { from: V2.pin6, to: VR3.lug3, via: [[18.2, -0.6], [8, -0.6]] } # V2A plate → tone (over the top)
  - { from: VR3.lug2, to: V2.pin2, via: [[8, -0.5], [14, 0.7], [16, 1.9]] } # tone wiper → PI grid (clears RL4.a)
  - { from: VR3.lug1, to: [1.45, 7.6] }              # tone ground
  - { from: V2.pin8, to: RK2.a, via: [[20.6, 1.55]] }  # V2A cathode → 1.5k (from right)
  - { from: RK2.b, to: [1.45, 20] }                  # 1.5k → ground bus
  - { from: C4.a, to: [1.45, 19.3] }                 # cathode bypass ground (lane between the V2.pin7 wiper feed and RL3.b)

  # --- volume controls → V2A grid -------------------------------------------
  - { from: VR1.lug2, to: V2.pin7, via: [[14, -0.45], [16.5, 1.0], [18.6, 1.55]] } # inst vol wiper (clears RGPI.a)
  - { from: VR2.lug2, to: V2.pin7, via: [[18.4, -0.5], [19, 1.5]] }   # mic vol wiper
  - { from: VR1.lug1, to: [1.45, 13.5] }             # volume grounds
  - { from: VR2.lug1, to: [1.45, 17.3] }

  # --- 12AY7 input stage (V1): instrument + mic channels ---------------------
  - { from: JI, to: R1s.b, via: [[22, -0.45]] }      # inst jack → grid stopper
  - { from: R1s.a, to: V1.pin7, via: [[25.7, 1.55]] }  # grid stopper → V1A grid (right of pin 6)
  - { from: V1.pin6, to: C1.a, via: [[21.4, 1.1]] }  # V1A plate → volume coupler (up-left)
  - { from: C1.b, to: VR1.lug3, via: [[23, -0.52], [14.3, -0.52]] }
  - { from: V1.pin6, to: RL1.a, via: [[20.4, 1.55]] }  # V1A plate → 100k load (from left)
  - { from: RL1.b, to: C13.a, via: [[21.6, -0.76], [9.9, -0.76]] }  # plate load → B+3 (over the top)
  - { from: JM, to: R2s.b, via: [[25, -0.55], [28.5, -0.55]] }  # mic jack → grid stopper (clears C2.b)
  - { from: R2s.a, to: V1.pin2, via: [[26.5, 1.75]] }  # grid stopper → V1B grid (from lower-right)
  - { from: V1.pin1, to: C2.a, via: [[24.4, 1.1]] }  # V1B plate → volume coupler (up-left)
  - { from: C2.b, to: VR2.lug3, via: [[26, -0.44], [18.3, -0.44]] }
  - { from: V1.pin1, to: RL2.a, via: [[24.8, 1.85], [23.6, 1.85]] }  # V1B plate → 100k load (leave pin 1 right)
  - { from: RL2.b, to: C13.a, via: [[23.5, -0.84], [8.6, -0.84]] }  # plate load → B+3 (over the top)
  - { from: V1.pin3, to: RK1.a, via: [[26, 1.45]] }  # V1 cathode → shared 820 Ω (from lower-left)
  - { from: V1.pin8, to: RK1.a, via: [[28.2, 1.45]] } # (from lower-right)
  - { from: RK1.b, to: [1.45, 27] }                  # 820 Ω → ground bus
  - { from: C10.a, to: RK1.a }                       # cathode bypass
  - { from: C10.b, to: [1.45, 29] }

  # --- 6.3 V heater chain (green twisted pair) ------------------------------
  # PT green pair → pilot lamp → V3 6V6 → V4 6V6 → V2 12AX7 → V1 12AY7, in the
  # drawing's daisy order (the 5Y3GT rectifier is directly heated off the 5 V
  # winding, so it is not on this chain). Twisted runs land only on heater pins
  # (6V6 octal 2/7, noval 4/5); routed in a deep lane below the output harness.
  - { from: PT.green, to: PL1.a, style: twisted }                              # 6.3 V → pilot lamp
  - { from: PL1.b, to: V3.pin7, style: twisted, via: [[-1.2, 3.6], [5, 3.6]] } # lamp → V3 heater
  - { from: V3.pin2, to: V4.pin7, style: twisted, via: [[5, 3.62], [8.5, 3.62]] }   # V3 → V4 heater
  - { from: V4.pin2, to: V2.pin4, style: twisted, via: [[8.5, 3.64], [18, 3.64]] }  # V4 → V2 heater
  - { from: V2.pin5, to: V1.pin4, style: twisted, via: [[18, 3.6], [25, 3.6]] }     # V2 → V1 heater
  - { from: V1.pin4, to: V1.pin5, style: twisted } # close the pair at the last socket

# net_map — reviewable reconciliation of the drawn wiring with the DC netlist
# (netlist.cir) for pipeline/verify_layout_nets.py. See docs/layout-schema.md.
net_map:
  # The push-pull OT primary: both 6V6 plate leads and the B+ centre tap sit at
  # B+1 at DC (the netlist omits the OT primary DCR and models both plates == B+1),
  # so all three primary leads are one node.
  anchors:
    T2.red:   BP1    # OT primary centre tap (B+ feed)
    T2.blue:  BP1    # OT primary, V3 plate lead
    T2.brown: BP1    # OT primary, V4 plate lead
  # DC-transparent grid stoppers the netlist omits (no DC grid current):
  series_bridge:
    R1s: "68 k instrument-channel grid stopper — omitted from netlist (grid == input node at DC)"
    R2s: "68 k mic-channel grid stopper — omitted from netlist"
  # Netlist elements realised off the board or by a control, not a discrete board
  # part — reported in coverage, never a failure (their nodes still check out):
  netlist_unplaced:
    RG1: "1 M instrument input grid leak — mounted at the input jacks, not on the eyelet board"
    RG2: "1 M mic input grid leak — mounted at the input jacks, not on the eyelet board"
    RG3: "the two 1 M volume pots (VR1/VR2) — netlist models their shared DC return as one grid-leak (G2A -> 0)"
