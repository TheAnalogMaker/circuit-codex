# Board layout — redrawn from the published Fender 'Deluxe' 5E3 layout drawing
# (F-EE). Part refs are the shared key into bom.yaml; the renderer reads each
# value and part type from there. A legible, schematic-style redraw of the
# board's principal components in the order the drawing shows them — never a
# trace or a dimensioned reproduction.
#
# Board reads left→right: rectifier / filter / output end at the left, 12AY7
# input stage at the right — matching the tube row on the drawing
# (5Y3GT · 6V6GT · 6V6GT · 12AX7 · 12AY7).
board:
  rows: 2
  cols: 30
  title: "5E3 · eyelet board layout"
caption: "Redrawn from the published Fender 5E3 layout drawing (F-EE) — principal board components, in the order the drawing shows them. A few small grid stoppers are omitted for legibility; the tone capacitors mount at the tone pot. Not a trace or a dimensioned reproduction."
source:
  desc: "Fender 'Deluxe' Model 5E3 layout drawing (F-EE), page 1"
  url: "https://el34world.com/charts/Schematics/files/Fender/Fender_deluxe_5e3.pdf"

parts:
  # power supply + push-pull output cathode (left end)
  - { ref: RK66, a: [0, 0],  b: [1, 0] }    # 250 Ω 5W shared 6V6 cathode (vertical)
  - { ref: C9,   a: [0, 1],  b: [0, 2] }    # 25 µF 6V6 cathode bypass
  - { ref: C11,  a: [0, 3],  b: [0, 5] }    # 16 µF filter, B+1
  - { ref: C12,  a: [0, 6],  b: [0, 8] }    # 16 µF filter, B+2
  - { ref: C13,  a: [0, 9],  b: [0, 11] }   # 16 µF filter, B+3
  - { ref: RD1,  a: [1, 4],  b: [1, 5] }    # 5k dropper B+1→B+2
  - { ref: RD2,  a: [1, 7],  b: [1, 8] }    # 22k dropper B+2→B+3
  - { ref: RG6A, a: [1, 9],  b: [1, 10] }   # 220k V3 grid leak
  - { ref: RG6B, a: [1, 11], b: [1, 12] }   # 220k V4 grid leak
  # cathodyne phase inverter (its self-bias stack is the amp's signature)
  - { ref: RKA,  a: [0, 12], b: [1, 12], nudge: [2, -26] }   # 1.5k cathode → junction (vertical)
  - { ref: RL4,  a: [1, 13], b: [1, 14] }   # 56k cathodyne plate load
  - { ref: RKB,  a: [1, 15], b: [1, 16] }   # 56k junction → ground
  - { ref: C8,   a: [0, 13], b: [0, 15] }   # 0.1 µF cathode-side coupler → V4
  - { ref: C7,   a: [0, 16], b: [0, 18] }   # 0.1 µF plate-side coupler → V3
  - { ref: RGPI, a: [1, 17], b: [1, 18] }   # 1M grid leak, returned to junction
  # second stage V2A + interactive volume/tone couplers
  - { ref: RK2,  a: [0, 20], b: [1, 20], nudge: [2, -26] }   # 1.5k V2A cathode (vertical)
  - { ref: C4,   a: [0, 19], b: [0, 20] }   # 25 µF V2A cathode bypass
  - { ref: RL3,  a: [1, 19], b: [1, 20] }   # 100k V2A plate load
  - { ref: C1,   a: [0, 21], b: [0, 23] }   # 0.1 µF V1A → instrument volume
  - { ref: C2,   a: [0, 24], b: [0, 26] }   # 0.1 µF V1B → mic volume
  - { ref: RL1,  a: [1, 21], b: [1, 22] }   # 100k V1A plate load
  - { ref: RL2,  a: [1, 23], b: [1, 24] }   # 100k V1B plate load
  # 12AY7 input stage (right end)
  - { ref: R1s,  a: [1, 25], b: [1, 26] }   # 68k instrument grid stopper
  - { ref: R2s,  a: [1, 27], b: [1, 28] }   # 68k mic grid stopper
  - { ref: RK1,  a: [0, 27], b: [1, 27] }   # 820 Ω shared 12AY7 cathode (vertical)
  - { ref: C10,  a: [0, 28], b: [0, 29] }   # 25 µF 12AY7 cathode bypass

offboard:
  - { id: PT,  kind: xfmr, edge: left,   at: 0.5, label: "Power trans" }
  - { id: V5,  ref: V5, kind: tube, edge: bottom, at: 1.5,  label: "V5 · 5Y3GT" }
  - { id: V3,  ref: V3, kind: tube, edge: bottom, at: 5,    label: "V3 · 6V6GT" }
  - { id: V4,  ref: V4, kind: tube, edge: bottom, at: 8.5,  label: "V4 · 6V6GT" }
  - { id: SPK, kind: jack, edge: bottom, at: 12.5, label: "Spkr jacks" }
  - { id: V2,  ref: V2, kind: tube, edge: bottom, at: 18,   label: "V2 · 12AX7" }
  - { id: V1,  ref: V1, kind: tube, edge: bottom, at: 25,   label: "V1 · 12AY7" }
  - { id: VR3, ref: VR3, kind: pot, edge: top, at: 8,  label: "Tone" }
  - { id: VR1, ref: VR1, kind: pot, edge: top, at: 14, label: "Volume" }
  - { id: VR2, ref: VR2, kind: pot, edge: top, at: 18, label: "Volume" }
  - { id: JI,  kind: jack, edge: top, at: 22, label: "Inst in" }
  - { id: JM,  kind: jack, edge: top, at: 25, label: "Mic in" }
  - { id: T2,  ref: T2, kind: xfmr, edge: right, at: 0.5, label: "Output trans" }

# Ground bus — the bare-wire rail that runs the length of the board just below
# the bottom eyelet row; the cathode, filter, and pot grounds all tie to it.
bus:
  - { from: [1.45, -0.4], to: [1.45, 29.4] }

# Wiring — read lead-by-lead from the published 5E3 layout drawing (F-EE). The
# transformer leads carry the colours marked on that drawing (black/green
# primary omitted — they land on chassis switches, not the board); every other
# lead is bare hookup wire in the neutral tone. Endpoints reference board
# eyelets (REF.a/REF.b), tube socket pins (Vn.pinN, validated against the
# reference basing data), pot lugs (VRn.lugN), jacks, and transformer leads.
runs:
  # --- power transformer secondary → 5Y3GT rectifier (marked colours) --------
  - { from: PT.red1, to: V5.pin4 }                 # HT plate 1
  - { from: PT.red2, to: V5.pin6 }                 # HT plate 2
  - { from: PT.red-yellow, to: [1.45, 1.5] }       # HT centre tap → ground bus
  - { from: PT.yellow1, to: V5.pin2 }              # 5 V rectifier filament
  - { from: PT.yellow2, to: V5.pin8 }              # 5 V rectifier filament / B+
  - { from: V5.pin8, to: C11.a, color: red, via: [[3, 1.55]] }   # B+ out → first filter

  # --- filtered B+ rail (three 16 µF cans, 5k then 22k droppers) -------------
  - { from: C11.a, to: RD1.a }                     # B+1 → 5k dropper
  - { from: RD1.b, to: C12.a }                     # → B+2
  - { from: C12.a, to: RD2.a }                     # B+2 → 22k dropper
  - { from: RD2.b, to: C13.a }                     # → B+3
  - { from: C11.b, to: [1.45, 5] }                 # filter negatives → ground bus
  - { from: C12.b, to: [1.45, 8] }
  - { from: C13.b, to: [1.45, 11] }

  # --- push-pull output: OT primary, screens, cathodes -----------------------
  # The output-transformer, B+/screen, and cathode "hero" leads run in a stacked
  # harness band below the sockets (as they do under a real chassis), springing
  # up to each socket from the side that keeps its label clear.
  - { from: V4.pin8, to: RK66.a, via: [[9, 2.4], [0.3, 2.4]] }   # V4 cathode → shared 250 Ω
  - { from: V3.pin8, to: RK66.a, via: [[5.6, 2.5], [0, 2.5]] }   # V3 cathode → shared 250 Ω
  - { from: C11.a, to: T2.red, via: [[3, 2.6], [30.4, 2.6]] }    # B+1 → OT centre tap
  - { from: T2.blue, to: V3.pin3, via: [[30.6, 2.72], [4, 2.72]] }    # OT primary → V3 plate
  - { from: T2.brown, to: V4.pin3, via: [[30.8, 2.84], [7.4, 2.84]] } # OT primary → V4 plate
  - { from: C11.a, to: V3.pin4, via: [[3.2, 2.96], [4.2, 2.96]] }   # B+1 → V3 screen
  - { from: C11.a, to: V4.pin4, via: [[3.4, 3.08], [7.6, 3.08]] }   # B+1 → V4 screen
  - { from: RK66.b, to: [1.45, 0] }                    # 250 Ω → ground bus
  - { from: C9.a, to: RK66.a }                         # cathode bypass across 250 Ω
  - { from: C9.b, to: [1.45, 2] }
  - { from: RG6A.a, to: C7.b, via: [[9.5, 0.5], [18, 0.5]] }   # V3 grid leak → grid node
  - { from: RG6A.b, to: [1.45, 9.5] }                          # grid leak → ground bus
  - { from: RG6B.a, to: C8.b, via: [[11.5, 0.42], [15, 0.42]] } # V4 grid leak → grid node
  - { from: RG6B.b, to: [1.45, 11.5] }                         # grid leak → ground bus

  # --- cathodyne phase inverter (V2B) ---------------------------------------
  - { from: V2.pin1, to: RL4.b, via: [[16, 1.6]] }   # V2B plate → 56k plate load
  - { from: RL4.a, to: C12.a }                       # plate load → B+2
  - { from: V2.pin1, to: C7.a, via: [[18, 1.5]] }    # V2B plate → plate-side coupler
  - { from: C7.b, to: V3.pin5, via: [[18.7, 3.2], [6, 3.2]] }    # coupler → V3 grid
  - { from: V2.pin3, to: RKA.a, via: [[13, 1.6]] }   # V2B cathode → 1.5k
  - { from: RKA.b, to: RKB.a }                        # junction → 56k cathode load
  - { from: RKB.b, to: [1.45, 16] }                  # 56k → ground bus
  - { from: RKA.b, to: C8.a, via: [[13, 0.55]] }     # junction → cathode-side coupler
  - { from: C8.b, to: V4.pin5, via: [[15.5, 3.32], [9.5, 3.32]] }  # coupler → V4 grid
  - { from: RGPI.a, to: RKA.b }                      # PI grid leak → junction
  - { from: RGPI.b, to: V2.pin2, via: [[17.4, 1.6]] } # PI grid leak → V2B grid

  # --- driver / second stage (V2A) + tone -----------------------------------
  - { from: V2.pin6, to: RL3.a, via: [[19, 1.6]] }   # V2A plate → 100k plate load
  - { from: RL3.b, to: C12.a }                       # plate load → B+2
  - { from: V2.pin6, to: VR3.lug3, via: [[19, 1.5], [8, -0.45]] } # V2A plate → tone
  - { from: VR3.lug2, to: V2.pin2, via: [[8, -0.5], [17.4, 1.55]] } # tone wiper → PI grid
  - { from: VR3.lug1, to: [1.45, 8] }                # tone ground
  - { from: V2.pin8, to: RK2.a, via: [[20, 1.6]] }   # V2A cathode → 1.5k
  - { from: RK2.b, to: [1.45, 20] }                  # 1.5k → ground bus
  - { from: C4.a, to: [1.45, 19] }                   # cathode bypass ground

  # --- volume controls → V2A grid -------------------------------------------
  - { from: VR1.lug2, to: V2.pin7, via: [[14, -0.45], [18.6, 1.55]] } # inst vol wiper
  - { from: VR2.lug2, to: V2.pin7, via: [[18, -0.5], [18.6, 1.5]] }   # mic vol wiper
  - { from: VR1.lug1, to: [1.45, 13.5] }             # volume grounds
  - { from: VR2.lug1, to: [1.45, 18.5] }

  # --- 12AY7 input stage (V1): instrument + mic channels ---------------------
  - { from: JI, to: R1s.b, via: [[22, -0.45]] }      # inst jack → grid stopper
  - { from: R1s.a, to: V1.pin7, via: [[25, 1.6]] }   # grid stopper → V1A grid
  - { from: V1.pin6, to: C1.a, via: [[21, 1.6]] }    # V1A plate → volume coupler
  - { from: C1.b, to: VR1.lug3, via: [[23, -0.45], [14, -0.5]] }
  - { from: V1.pin6, to: RL1.a, via: [[21, 1.65]] }  # V1A plate → 100k load
  - { from: RL1.b, to: C13.a }                       # plate load → B+3
  - { from: JM, to: R2s.b, via: [[25, -0.45]] }      # mic jack → grid stopper
  - { from: R2s.a, to: V1.pin2, via: [[27, 1.6]] }   # grid stopper → V1B grid
  - { from: V1.pin1, to: C2.a, via: [[24, 1.6]] }    # V1B plate → volume coupler
  - { from: C2.b, to: VR2.lug3, via: [[26, -0.45], [18, -0.5]] }
  - { from: V1.pin1, to: RL2.a, via: [[24, 1.65]] }  # V1B plate → 100k load
  - { from: RL2.b, to: C13.a }                       # plate load → B+3
  - { from: V1.pin3, to: RK1.a, via: [[27.4, 1.6]] } # V1 cathode → shared 820 Ω
  - { from: V1.pin8, to: RK1.a, via: [[27, 1.65]] }
  - { from: RK1.b, to: [1.45, 27] }                  # 820 Ω → ground bus
  - { from: C10.a, to: RK1.a }                       # cathode bypass
  - { from: C10.b, to: [1.45, 29] }
