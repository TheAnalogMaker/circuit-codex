# Board layout — redrawn from the published Fender 'Champ-Amp' 5F1 layout
# drawing (K-EE), page 2 of the same PDF as the schematic (no separate
# "_layout.pdf" exists on the archive; probed and confirmed 2026-07-18 — see
# meta.yaml sources). Part refs are the shared key into bom.yaml; the renderer
# reads each value and part type from there. This is a legible, schematic-style
# redraw of the board's principal components in the order the drawing shows
# them — never a trace or a dimensioned reproduction.
#
# Board reads left→right: rectifier/filter end at the left, input stage at the
# right (the tube row on the drawing runs 5Y3GT · 6V6GT · 12AX7 the same way).

# Machine-checked equivalence: the point-to-point wiring drawn below has been
# verified electrically equivalent to the simulated netlist (netlist.cir) by
# pipeline/verify_layout_nets.py — see the net_map block at the foot of this file
# and docs/layout-schema.md. Heaters, the pilot lamp, and the PT/rectifier AC
# side are an excluded annotation layer (not modelled in netlist.cir).
wiring_claim: verified

board:
  rows: 2
  cols: 20
  title: "5F1 · eyelet board layout"
caption: "Redrawn from the published Fender 5F1 layout drawing (K-EE), page 2 — principal board components and point-to-point wiring, in the order and connections the drawing shows. The drawing's two-jack \"linked input\" pad (two 68k resistors + jack-normalling contacts converging on one node) is represented through the single 68k (R3) already modeled in bom.yaml/schematic.kicad_sch, matching that simplification. The 6.3 V heater chain (green twisted pair, PT → pilot lamp → 6V6 → 12AX7) and the chassis-mounted 1 MΩ grid leak (R1) at the input jacks are routed as the published sheet shows them. Not a trace or a dimensioned reproduction."
source:
  desc: "Fender 'Champ-Amp' Model 5F1 layout drawing (K-EE), page 2"
  url: "https://el34world.com/charts/Schematics/files/Fender/Fender_champ_5f1_schem.pdf"

# Board-mounted parts. a / b are eyelet endpoints [row, col]; the body is drawn
# between them (same row = axial part; column shared across rows = vertical leg).
parts:
  # filter cans + rail droppers (power-supply end, left)
  - { ref: C5,  a: [0, 0],  b: [0, 2] }    # 16 µF filter, B+1
  - { ref: C7,  a: [0, 3],  b: [0, 5] }    # 8 µF filter, B+2
  - { ref: C8,  a: [0, 6],  b: [0, 8] }    # 8 µF filter, B+3
  - { ref: R13, a: [1, 0],  b: [1, 1] }    # 22k negative feedback
  - { ref: R10, a: [1, 3],  b: [1, 4] }    # 10k dropper B+1→B+2
  - { ref: R11, a: [1, 6],  b: [1, 7] }    # 22k dropper B+2→B+3
  # 6V6 output stage
  - { ref: R8,  a: [0, 9],  b: [1, 9] }    # 470 Ω 5W cathode (vertical leg)
  - { ref: C6,  a: [0, 10], b: [0, 11] }   # 25 µF cathode bypass
  - { ref: R9,  a: [1, 10], b: [1, 11] }   # 220k grid leak
  - { ref: C3,  a: [0, 13], b: [0, 15] }   # 0.02 µF coupler, V1B → 6V6 grid
  # preamp: two 12AX7 gain stages
  - { ref: R7,  a: [1, 13], b: [1, 14] }   # 100k V1B plate load
  - { ref: R6,  a: [0, 12], b: [1, 12] }   # 1.5k V1B cathode (vertical leg)
  - { ref: R5,  a: [1, 15], b: [1, 17] }   # 100k V1A plate load (b nudged off R4's column — see notes)
  - { ref: R4,  a: [0, 16], b: [1, 16] }   # 1.5k V1A cathode (vertical leg)
  - { ref: C1,  a: [0, 17], b: [0, 19] }   # 0.02 µF coupler, V1A → volume
  - { ref: R3,  a: [1, 18], b: [1, 19] }   # 68k input grid stopper

# Off-board items drawn as labelled stubs around the board, in the drawing's
# positions: tubes along the bottom, the volume pot and input jacks up top,
# transformers to either side.
offboard:
  - { id: PT,  kind: xfmr, edge: left,   at: 0.5, label: "Power trans" }
  - { id: PL1, kind: part, glyph: lamp, edge: left, at: 1.5, label: "Pilot lamp" }
  - { id: V3,  ref: V3, kind: tube, edge: bottom, at: 2,    label: "V3 · 5Y3GT" }
  - { id: V2,  ref: V2, kind: tube, edge: bottom, at: 8,    label: "V2 · 6V6GT" }
  - { id: SPK, kind: jack, edge: bottom, at: 12.5, label: "Spkr jack" }
  - { id: V1,  ref: V1, kind: tube, edge: bottom, at: 17,   label: "V1 · 12AX7" }
  - { id: VR1, ref: VR1, kind: pot,  edge: top, at: 10,   label: "Volume" }
  - { id: J1,  kind: jack, edge: top, at: 16,   label: "In 1" }
  - { id: J2,  kind: jack, edge: top, at: 18,   label: "In 2" }
  # R1 (1 MΩ grid leak) is chassis-mounted at the input jacks per the drawing —
  # a generic 2-lead off-board part (kind: part), wired R1.a → input node, R1.b
  # → ground, using the renderer's 2-terminal support.
  - { id: R1,  ref: R1, kind: part, edge: top, at: 19.3, label: "R1" }
  - { id: T2,  ref: T2, kind: xfmr, edge: right, at: 0.5, label: "Output trans" }

# Ground bus — the bare-wire rail running the length of the board just below
# the bottom eyelet row; cathode, filter, grid-leak, and pot grounds all tie
# to it.
bus:
  - { from: [1.45, -0.4], to: [1.45, 19.4] }

# Wiring — read lead-by-lead from the published 5F1 layout drawing (K-EE,
# page 2). The power-transformer secondary leads carry the colours marked on
# that drawing. The 6.3 V heater winding is the green pair; it feeds the pilot
# lamp and then daisy-chains socket to socket (rendered as a green twisted pair,
# style: twisted). The 5Y3GT is directly heated from the 5 V winding and so is
# not on the 6.3 V chain. The output transformer's plate lead is legibly marked
# "BLUE" on the drawing; its other primary lead and both secondary leads aren't
# legibly coloured on this scan, so they stay in the neutral hookup tone rather
# than guessing. Endpoints reference board eyelets (REF.a/REF.b), tube socket
# pins (Vn.pinN, validated against reference/tubes basing — heater pins on the
# twisted runs), pot lugs, jacks, off-board 2-lead parts (R1.a/R1.b, PL1.a/
# PL1.b), and transformer leads.
runs:
  # --- power transformer secondary → 5Y3GT rectifier (marked colours) -------
  # The five secondary leads are fanned into distinct lanes as they leave the
  # PT so no two read as one wire before they reach the rectifier pins.
  - { from: PT.red1, to: V3.pin4, via: [[1.4, 0.3]] }        # HT plate 1
  - { from: PT.red2, to: V3.pin6, via: [[2.3, 0.62]] }       # HT plate 2
  - { from: PT.red-yellow, to: [1.45, 3.0], via: [[1.2, 1.15]] }  # HT centre tap → ground bus
  - { from: PT.yellow1, to: V3.pin2, via: [[0.7, 1.25]] }    # 5 V rectifier filament
  - { from: PT.yellow2, to: V3.pin8, via: [[1.4, 1.75]] }    # 5 V rectifier filament / B+
  - { from: V3.pin8, to: C5.a, color: red, via: [[2.2, 1.5]] }   # B+ out → first filter

  # --- filtered B+ rail (16 µF / 8 µF / 8 µF, 10k then 22k droppers) --------
  # Feeds to a shared filter node approach it from distinct angles (≥ ~20°)
  # so each lands as its own wire at the solder blob, not a doubled lane.
  - { from: C5.a, to: R10.a }                     # B+1 → 10k dropper
  - { from: R10.b, to: C7.a }                     # → B+2
  - { from: C7.a, to: R11.a }                     # B+2 → 22k dropper
  - { from: R11.b, to: C8.a, via: [[7.2, 0.55]] } # → B+3 (approach from lower-right)
  # (the three feeds to B+3/C8.a below fan in at distinct bearings)
  - { from: C5.b, to: [1.45, 1.4] }               # filter negatives → ground bus
  - { from: C7.b, to: [1.45, 4] }
  - { from: C8.b, to: [1.45, 7] }

  # --- 6V6GT output stage (cathode-biased, single-ended) --------------------
  # The output-transformer plate/B+ and the speaker NFB loop run in a deep
  # harness band below the sockets (as under a real chassis); the socket
  # feeds spring up from a lane held clear of the pin ring.
  - { from: V2.pin8, to: R8.a, via: [[8.6, 1.5]] }      # 6V6 cathode → 470 Ω
  - { from: R8.b, to: [1.45, 9.4] }                     # 470 Ω → ground bus
  - { from: C6.a, to: R8.a }                            # cathode bypass across 470 Ω
  - { from: C6.b, to: [1.45, 10.6] }
  - { from: V2.pin4, to: C7.a, via: [[8.4, 1.55], [2.0, 1.55], [2.0, 0.5]] }  # screen → B+2 (from left)
  - { from: V2.pin3, to: T2.blue, via: [[8.4, 2.3], [19.6, 2.3], [19.6, 0.44]] }  # plate → OT primary (blue, from left)
  - { from: T2.bplus, to: C5.a, via: [[20, 2.44], [-0.4, 2.44], [-0.4, 0.7]] }  # OT primary → B+1
  - { from: R9.a, to: V2.pin5, via: [[10.2, 1.5]] }     # grid leak → 6V6 grid
  - { from: R9.b, to: [1.45, 11] }                       # grid leak → ground bus

  # --- V1B driver stage (12AX7, second half) --------------------------------
  - { from: V1.pin1, to: R7.a, via: [[16.8, 1.5]] }      # V1B plate → 100k load
  - { from: R7.a, to: C3.a }                             # plate node → coupler
  - { from: R7.b, to: C8.a, via: [[13, 1.58], [5.2, 1.58], [4.9, 0.62]] }  # plate load → B+3 (from lower-left)
  - { from: C3.b, to: R9.a, via: [[19.4, -0.55], [11, -0.55]] }  # coupler → grid-leak node
  - { from: V1.pin3, to: R6.a, via: [[16.4, 1.5], [12.9, 1.5]] }  # V1B cathode → 1.5k (from lower-right)
  - { from: R6.b, to: [1.45, 12] }                       # 1.5k → ground bus
  - { from: SPK, to: R13.a, via: [[12.5, 2.58], [1, 2.58]] }   # speaker → NFB resistor
  - { from: R13.b, to: R6.a, via: [[0.6, 2.72], [11.5, 2.72], [11.5, 0.5]] } # NFB resistor → V1B cathode (from lower-left)
  - { from: VR1.lug2, to: V1.pin2, via: [[10, -0.35], [17.5, -0.3], [17.6, 1.5]] }  # volume wiper → V1B grid
  - { from: VR1.lug1, to: [1.45, 9.7] }                  # volume ground

  # --- V1A input stage (12AX7, first half) ----------------------------------
  - { from: J1, to: R3.a, via: [[16.2, -0.4], [20, -0.35], [20, 1.4]] }   # In 1 → grid stopper
  - { from: J2, to: R3.a, via: [[19.2, -0.4], [18.2, 0.6]] }              # In 2 → grid stopper (from above)
  - { from: R1.a, to: R3.a, via: [[19.3, 0.55]] }            # 1 MΩ grid leak → input node
  - { from: R1.b, to: [1.45, 19.3] }                         # grid leak → ground bus
  - { from: R3.b, to: V1.pin7, via: [[19, 1.55]] }       # grid stopper → V1A grid
  - { from: V1.pin6, to: R5.a, via: [[16.6, 1.55]] }     # V1A plate → 100k load
  - { from: R5.b, to: C8.a, via: [[15.2, 1.62], [15.2, 2.5], [4, 2.5], [3.5, 0.4]] }  # plate load → B+3 (deep lane, from left)
  - { from: V1.pin6, to: C1.a, via: [[17.5, 1.2]] }      # V1A plate → volume coupler
  - { from: C1.b, to: VR1.lug3, via: [[15, -0.5]] }      # coupler → volume input
  - { from: V1.pin8, to: R4.a, via: [[18.4, 1.55]] }     # V1A cathode → 1.5k (clear of pin 7)
  - { from: R4.b, to: [1.45, 16] }                        # 1.5k → ground bus

  # --- 6.3 V heater chain (green twisted pair) ------------------------------
  # PT green pair → pilot lamp → 6V6 heater → 12AX7 heater, in the drawing's
  # daisy order. Twisted runs land only on heater pins (6V6 octal 2/7, 12AX7
  # noval 4/5); routed in the deepest lane, below the output harness.
  - { from: PT.green, to: PL1.a, style: twisted }                         # 6.3 V → pilot lamp
  - { from: PL1.b, to: V2.pin7, style: twisted, via: [[-1.2, 2.9], [8, 2.9]] }   # lamp → 6V6 heater
  - { from: V2.pin2, to: V1.pin4, style: twisted, via: [[8, 2.92], [17, 2.92]] } # 6V6 → 12AX7 heater
  - { from: V1.pin4, to: V1.pin5, style: twisted } # close the pair at the last socket

# net_map — the reviewable data layer that reconciles the drawn wiring with the
# DC-operating-point netlist (netlist.cir) for pipeline/verify_layout_nets.py.
# Every entry records a documented abstraction the netlist makes, so the
# equivalence check never has to guess in code. See docs/layout-schema.md.
net_map:
  # Terminals the netlist gives no discrete node to reach on their own — anchored
  # to the netlist node they belong to. Two leads anchored to the SAME node
  # declare a DC bridge the netlist collapses (here: the output-transformer
  # primary, whose DCR the netlist omits so the 6V6 plate node == B+1).
  anchors:
    T2.blue:  BP1    # OT primary, plate lead — netlist omits OT primary DCR (plate node = B+1)
    T2.bplus: BP1    # OT primary, B+ lead
    SPK: "0"         # speaker jack — the netlist folds the OT-secondary DCR (~0 Ω) into ground,
                     #   so the negative-feedback return (R13) reads as ground at DC
  # DC-transparent series parts the netlist omits (no DC grid current -> zero
  # drop): their two leads are shorted so the netlist node runs through them.
  series_bridge:
    R3: "68 k input grid stopper — omitted from netlist (grid == input node at DC)"
  # Netlist elements with no discrete board part — reported in coverage, never a
  # failure (their nodes still have to check out).
  netlist_unplaced:
    RVOL: "1 M volume pot VR1 — netlist models the pot as a grid-leak (G1B -> 0); its wiper->grid tie is verified at the grid net"
