# Board layout — redrawn from the published Fender "Harvard" 5F10 layout
# drawing (F-EF, page 1 of the same sheet as the schematic). Part refs are the
# shared key into bom.yaml; the renderer reads each value and part type from
# there. A legible, schematic-style redraw of the board's principal components
# in the order the drawing shows them — never a trace or a dimensioned
# reproduction.
#
# Board reads left→right: bias supply / B+ filters / output-stage grid
# networks at the left-and-centre, cathodyne + driver stages interleaved
# through the middle (matching the drawing's own component order, which does
# not mirror signal flow), input (6AT6) stage at the right — matching the
# tube row on the drawing (5Y3GT · 6V6GT · 6V6GT · 12AX7 · 6AT6).
#
# One part of the drawing is NOT reproduced here: the output transformer is
# never drawn as a discrete symbol on the F-EF layout sheet (only the speaker
# jack is shown). Its presence and its two board-side connections (plate pair
# + B+1 centre tap) are derived honestly from the schematic/netlist, and its
# leads are left in the neutral hookup tone since the sheet gives them no
# colour. Grid stoppers mounted directly at a tube socket (the 6V6 pair's
# 1.5 kΩ stoppers) are likewise omitted for legibility, as are the tone/bright
# caps that mount right at the pot lugs rather than on the board.
# Machine-checked equivalence: the point-to-point wiring drawn below has been
# verified electrically equivalent to the simulated netlist (netlist.cir) by
# pipeline/verify_layout_nets.py — see the net_map block at the foot of this
# file and docs/layout-schema.md. Heaters, the pilot lamp, and the PT/rectifier
# AC side are an excluded annotation layer (not modelled in netlist.cir).
wiring_claim: verified

board:
  rows: 2
  cols: 60
  title: "5F10 · eyelet board layout"
caption: "Redrawn from the published Fender Harvard 5F10 layout drawing (F-EF) — principal board components, in the order the drawing shows them. The output transformer is not drawn on the source sheet as a discrete symbol; its connections are derived from the schematic and left uncoloured. Grid stoppers mounted at the 6V6 sockets and the tone/bright caps at the pot lugs are omitted for legibility. The 6.3 V heater chain (green twisted pair, PT → pilot lamp → the two 6V6 output tubes → 12AX7 → 6AT6) follows the sheet's green heater pair through the pilot lamp in physical socket order (standard tweed practice — the sheet shows the pair and lamp but not a fully legible socket-to-socket daisy); the directly-heated 5Y3GT rectifier runs off the 5 V winding, not the 6.3 V chain. Not a trace or a dimensioned reproduction."
source:
  desc: "Fender 'Harvard' Model 5F10 drawing (F-EF), page 1 of 2 (layout; page 2 is the schematic reproduced in this amp's schematic.kicad_sch)"
  url: "https://el34world.com/charts/Schematics/files/Fender/Fender_harvard_5f10.pdf"

parts:
  # bias supply (selenium rectifier network, far left)
  - { ref: RB2, a: [0, 0],  b: [1, 0] }    # 56k bias bleeder
  - { ref: RB1, a: [0, 2],  b: [1, 2] }    # 6.8k bias series resistor
  - { ref: C11, a: [0, 4],  b: [1, 4] }    # 25 µF bias filter (drawing shows one legible can; BOM notes a second, unmarked)
  # B+ filter chain (three 16 µF cans, 470 Ω then 22 k droppers)
  - { ref: C8,  a: [0, 6],  b: [1, 6] }    # 16 µF · 450 V, B+1
  - { ref: RD1, a: [1, 8],  b: [1, 10] }   # 470 Ω dropper, B+1 → B+2
  - { ref: C9,  a: [0, 12], b: [1, 12] }   # 16 µF · 450 V, B+2 (6V6 screens)
  - { ref: RD2, a: [1, 14], b: [1, 16] }   # 22k dropper, B+2 → B+3
  - { ref: C10, a: [0, 18], b: [1, 18] }   # 16 µF · 450 V, B+3 (preamp/PI/plate loads)
  # cathodyne phase inverter self-bias stack (its signature, like the 5E3's)
  - { ref: RKA,  a: [0, 20], b: [1, 20], nudge: [2, -26] }   # 1.5k cathode → junction
  - { ref: RKB,  a: [1, 22], b: [1, 24] }   # 56k junction → ground
  # driver stage cathode + speaker negative-feedback (board interleaves this
  # between the cathodyne parts, as the drawing itself does)
  - { ref: RK2,  a: [0, 26], b: [1, 26], nudge: [2, -26] }   # 1.5k driver cathode (unbypassed)
  - { ref: RNFB, a: [0, 28], b: [1, 28] }   # 56k NFB, driver cathode → speaker line
  # back to the cathodyne: grid leak, cathode coupler, and the two 6V6
  # fixed-bias grid leaks that live on the board next to the coupling caps
  - { ref: RGPI, a: [0, 30], b: [1, 30] }   # 1M grid leak, returned to the junction
  - { ref: C7,   a: [0, 32], b: [1, 32] }   # 0.1 µF · 200 V, PI cathode → lower 6V6 grid
  - { ref: RG1,  a: [0, 34], b: [1, 34] }   # 220k, fixed-bias line → upper 6V6 grid
  - { ref: RG2,  a: [0, 36], b: [1, 36] }   # 220k, fixed-bias line → lower 6V6 grid
  - { ref: C6,   a: [0, 38], b: [1, 38] }   # 0.1 µF · 400 V, PI plate → upper 6V6 grid
  - { ref: RL3,  a: [0, 40], b: [1, 40] }   # 56k cathodyne plate load
  # driver plate + coupler to the PI grid
  - { ref: RL2,  a: [0, 42], b: [1, 42] }   # 100k driver plate load
  - { ref: C5,   a: [0, 44], b: [1, 44] }   # 0.02 µF · 400 V, driver plate → PI grid
  # 6AT6 plate load + coupler to the volume control
  - { ref: RL1,  a: [0, 46], b: [1, 46] }   # 100k 6AT6 plate load
  - { ref: C2,   a: [0, 48], b: [1, 48] }   # 0.02 µF · 400 V, 6AT6 plate → volume
  # three input grid stoppers, converging on the 6AT6 grid (right end)
  - { ref: R1s, a: [0, 50], b: [1, 50] }   # 68k, input 1
  - { ref: R2s, a: [0, 52], b: [1, 52] }   # 68k, input 2
  - { ref: R3s, a: [0, 54], b: [1, 54] }   # 68k, input 3
  # 6AT6 cathode bias (far right end)
  - { ref: RK1, a: [0, 56], b: [1, 56] }   # 1.5k 6AT6 cathode
  - { ref: C1,  a: [0, 58], b: [1, 58] }   # 25 µF 6AT6 cathode bypass

offboard:
  - { id: PT,   kind: xfmr,   edge: left,   at: 0.5,  label: "Power trans" }
  - { id: PL1,  kind: part, glyph: lamp, edge: left, at: 1.6, label: "Pilot lamp" }
  - { id: SELRECT, ref: D1, kind: rect, edge: top, at: 2, label: "Selenium rect." }
  - { id: V5,   ref: V5,  kind: tube, edge: bottom, at: 3,   label: "V5 · 5Y3GT" }
  - { id: V3,   ref: V3,  kind: tube, edge: bottom, at: 22,  label: "V3 · 6V6GT" }
  - { id: V4,   ref: V4,  kind: tube, edge: bottom, at: 28,  label: "V4 · 6V6GT" }
  - { id: SPK,  kind: jack,  edge: bottom, at: 35,  label: "Spkr jack" }
  - { id: T1,   kind: xfmr,  edge: right,  at: 0.3, label: "Output trans" }
  - { id: V2,   ref: V2,  kind: tube, edge: bottom, at: 41,  label: "V2 · 12AX7" }
  - { id: V1,   ref: V1,  kind: tube, edge: bottom, at: 53,  label: "V1 · 6AT6" }
  - { id: VR2,  ref: VR2, kind: pot,  edge: top, at: 24,  label: "Tone" }
  - { id: VR1,  ref: VR1, kind: pot,  edge: top, at: 32,  label: "Volume" }
  - { id: JI1,  kind: jack,  edge: top, at: 48,  label: "Input 1" }
  - { id: JI2,  kind: jack,  edge: top, at: 51,  label: "Input 2" }
  - { id: JI3,  kind: jack,  edge: top, at: 54,  label: "Input 3" }

# Ground bus — the bare-wire rail just below the bottom eyelet row; cathode,
# filter, and pot grounds all tie to it.
bus:
  - { from: [1.45, -0.4], to: [1.45, 58.4] }

# Wiring — read lead-by-lead from the published 5F10 layout drawing (F-EF).
# The power-transformer leads carry the colours marked on that drawing;
# every other lead is bare hookup wire in the neutral tone. The 6.3 V heater
# winding is the green pair; it feeds the pilot lamp and then daisy-chains
# socket to socket in physical order (rendered as a green twisted pair,
# style: twisted) — standard tweed practice, since the sheet shows the green
# pair and pilot lamp but not a fully legible socket-to-socket daisy. The
# directly-heated 5Y3GT runs off the 5 V winding and is not on the 6.3 V chain.
# Endpoints reference board eyelets (REF.a/REF.b), tube socket pins (Vn.pinN,
# validated against the reference basing data — heater pins on the twisted
# runs), pot lugs (VRn.lugN), jacks, off-board 2-lead parts (PL1.a/PL1.b), and
# transformer leads.
runs:
  # --- power transformer secondary → 5Y3GT rectifier (marked colours) -------
  - { from: PT.red1, to: V5.pin4, via: [[2.6, 0.5], [3.0, 1.7]] }                    # HT plate 1
  - { from: PT.red2, to: V5.pin6, via: [[2.6, 0.85], [4.2, 2.0]] }                    # HT plate 2
  - { from: PT.red-yellow, to: [1.45, 2], via: [[1.2, 1.15]] }             # HT centre tap → ground bus (drawing labels this lead "yellow-red")
  - { from: PT.yellow1, to: V5.pin2, via: [[1.5, 0.5], [0.6, 2.5], [2.3, 2.75]] }                  # 5 V rectifier filament
  - { from: PT.yellow2, to: V5.pin8, via: [[3.3, 0.55], [3.3, 2.3]] }                  # 5 V rectifier filament / B+ output
  - { from: V5.pin8, to: C8.a, color: red, via: [[5.2, 1.55]] }   # B+ out → first filter

  # --- B+ filter chain (three 16 µF cans, 470 Ω then 22k droppers) ----------
  - { from: C8.a, to: RD1.a }
  - { from: RD1.b, to: C9.a }
  - { from: C9.a, to: RD2.a }
  - { from: RD2.b, to: C10.a }
  - { from: C8.b, to: [1.45, 6] }
  - { from: C9.b, to: [1.45, 12] }
  - { from: C10.b, to: [1.45, 18] }

  # --- bias supply: selenium rectifier, 6.8k/56k, filter can, -21V feed ----
  - { from: PT.white, to: SELRECT, via: [[3.3, -0.55]] }     # bias AC tap
  - { from: PT.green1, to: SELRECT, via: [[0.5, 0.35]] }     # bias AC tap, return
  - { from: SELRECT, to: RB1.a }
  - { from: RB1.b, to: RB2.a }                              # junction: the -21 V node
  - { from: RB2.b, to: [1.45, 0] }
  - { from: RB1.b, to: C11.a }
  - { from: C11.b, to: [1.45, 4] }
  - { from: RB1.b, to: RG1.b, via: [[2.6, 1.95], [34, 1.95]] }    # -21 V line → upper 6V6 grid leak (routed under the board)
  - { from: RB1.b, to: RG2.b, via: [[4.2, 2.35], [36, 2.35]] }      # -21 V line → lower 6V6 grid leak (routed under the board)

  # --- output stage: OT (derived), screens, grids ---------------------------
  - { from: C8.a, to: T1.ct, via: [[6.7, 2.55], [59.2, 2.55], [59.2, 0.11]] }        # B+1 → OT primary centre tap
  - { from: V3.pin3, to: T1.plateA, via: [[19, 2.72], [59.6, 2.72], [59.6, 0.2]] }  # upper 6V6 plate → OT primary (drop left of the V3 label)
  - { from: V4.pin3, to: T1.plateB, via: [[25, 2.9], [60.0, 2.9], [60.0, 0.3]] }  # lower 6V6 plate → OT primary (drop left of the V4 label)
  - { from: T1.sec1, to: SPK.tip, via: [[61.4, 0.42], [61.4, 2.98], [35.2, 2.98]] }
  - { from: T1.sec2, to: SPK.sleeve, via: [[61.8, 0.53], [61.8, 3.42], [36.0, 3.42]] }
  - { from: V3.pin4, to: C9.a, via: [[20.6, 2.4], [11.0, 2.4], [11.0, 0.2]] }       # upper 6V6 screen → B+2 (drop left of the V3 label)
  - { from: V4.pin4, to: C9.a, via: [[26.6, 2.5], [12.9, 2.5], [12.9, 0.2]] }       # lower 6V6 screen → B+2 (drop left of the V4 label)
  - { from: V3.pin8, to: [1.45, 22.7] }                              # upper 6V6 cathode → ground bus
  - { from: V4.pin8, to: [1.45, 27.6] }                              # lower 6V6 cathode → ground bus

  # --- cathodyne phase inverter (V2, unit 2 = pins 1/2/3) -------------------
  - { from: V2.pin1, to: RL3.a, via: [[41.8, 2.4], [39.4, 2.4], [39.4, 0.5]] }      # cathodyne plate → 56k plate load
  - { from: RL3.b, to: C10.a, via: [[40, 0.44], [18.2, 0.44]] }   # plate load → B+3
  - { from: V2.pin1, to: C6.a, via: [[40.8, 2.35], [37.8, 2.35], [37.8, 0.55]] }     # cathodyne plate → plate-side coupler
  - { from: C6.b, to: V3.pin5, via: [[38, 3.12], [24.7, 3.12], [24.7, 1.9]] }   # coupler → upper 6V6 grid (rise right of the V3 label, into pin 5)
  - { from: RG1.a, to: C6.b, via: [[34, 0.93], [37.7, 0.93]] }   # bias grid leak → same grid node
  # These four leads all cross behind the RKA/RK2/RNFB/RGPI resistor row on
  # their way to a row-0 eyelet; each is fanned onto its own distinct row
  # (0.50 / 0.66 / 0.78 / 0.90) so it traces end to end instead of the two
  # near-parallel horizontal runs (was 0.58/0.65, only ~8px apart) reading as
  # one doubled wire in the gaps between resistor bodies.
  - { from: V2.pin3, to: RKA.a, via: [[41.5, 0.50], [20.3, 0.50]] }    # cathodyne cathode → 1.5k
  - { from: RKA.b, to: RKB.a }                          # junction → 56k cathode load
  - { from: RKB.b, to: [1.45, 24] }                     # 56k → ground bus
  - { from: RKA.b, to: C7.a, via: [[20.6, 0.66], [31.7, 0.66]] }   # junction → cathode-side coupler
  - { from: C7.b, to: V4.pin5, via: [[31.6, 3.35], [30, 3.35], [30, 1.95]] }   # coupler → lower 6V6 grid (rise right of the V4 label, into pin 5)
  - { from: RG2.a, to: C7.b, via: [[36, 0.37], [32.3, 0.37]] }   # bias grid leak → same grid node
  - { from: RGPI.a, to: RKA.b }                         # PI grid leak → junction
  - { from: RGPI.b, to: V2.pin2, via: [[30, 1.6]] }     # PI grid leak → cathodyne grid

  # --- driver stage (V2, unit 1 = pins 6/7/8) + NFB -------------------------
  - { from: V2.pin6, to: RL2.a, via: [[41.4, 1.5]] }     # driver plate → 100k plate load
  - { from: RL2.b, to: C10.a, via: [[42, 0.53], [18.9, 0.53]] }   # plate load → B+3
  - { from: V2.pin6, to: C5.a, via: [[42.4, 1.6]] }     # driver plate → coupler
  - { from: C5.b, to: V2.pin2, via: [[44, 1.7], [41.3, 1.65]] }  # coupler → PI grid (same node as RGPI)
  - { from: V2.pin8, to: RK2.a, via: [[41.8, 2.45], [26.3, 2.45], [26.3, 0.78]] }    # driver cathode → 1.5k (unbypassed)
  - { from: V2.pin8, to: RNFB.a, via: [[42.4, 2.62], [28.9, 2.62], [28.9, 0.90]] }    # driver cathode → NFB resistor
  - { from: RK2.b, to: [1.45, 26] }                      # 1.5k → ground bus
  - { from: RNFB.b, to: SPK.tip, via: [[27.7, 3.45], [34.3, 3.45], [34.3, 1.9]] }   # NFB → speaker line (rise left of the Spkr-jack label, into the tip)
  - { from: VR1.lug2, to: V2.pin7, via: [[32, -0.7], [42.2, -0.7], [43.4, 1.5]] }  # volume wiper → driver grid

  # --- 6AT6 input stage: three jacks, volume/tone, plate, cathode ----------
  - { from: JI1, to: R1s.a, via: [[48, -0.45]] }
  - { from: JI2, to: R2s.a, via: [[51, -0.45]] }
  - { from: JI3, to: R3s.a, via: [[54, -0.45]] }
  - { from: R1s.b, to: V1.pin1, via: [[50, 1.6]] }       # grid-stopper junction → 6AT6 grid
  - { from: R2s.b, to: R1s.b }
  - { from: R3s.b, to: R1s.b, via: [[53, 1.24], [51, 1.24]] }
  - { from: V1.pin7, to: RL1.a, via: [[53, 1.6]] }       # 6AT6 plate → 100k load
  - { from: RL1.b, to: C10.a, via: [[46, 0.9], [20.3, 0.9]] }   # plate load → B+3
  - { from: V1.pin7, to: C2.a, via: [[52.4, 1.45]] }     # 6AT6 plate → coupler
  - { from: C2.b, to: VR2.lug3, via: [[47.5, -0.5], [24, -0.5]] }   # coupler → tone (first pot after 6AT6)
  - { from: VR2.lug2, to: VR1.lug3, via: [[24, -0.85], [32, -0.85]] }  # tone wiper → volume input
  - { from: VR2.lug1, to: [1.45, 23.2], via: [[24.8, 0.85], [23.2, 1.35]] }                    # tone ground
  - { from: VR1.lug1, to: [1.45, 33.0], via: [[31.0, 0.8], [33.0, 1.35]] }                    # volume ground
  - { from: V1.pin2, to: RK1.a, via: [[53.4, 1.7]] }     # 6AT6 cathode → 1.5k
  - { from: RK1.b, to: [1.45, 56] }                       # 1.5k → ground bus
  - { from: C1.a, to: RK1.a }                             # cathode bypass
  - { from: C1.b, to: [1.45, 58] }

  # --- 6.3 V heater chain (green twisted pair) ------------------------------
  # PT green pair → pilot lamp → V3 6V6 → V4 6V6 → V2 12AX7 → V1 6AT6, in
  # physical socket order (standard tweed practice). The 5Y3GT rectifier is
  # directly heated off the 5 V winding, so it is not on this chain. Twisted
  # runs land only on heater pins (6V6 octal 2/7, 12AX7 noval 4/5, 6AT6 7-pin
  # 3/4); routed in a deep lane below the output harness.
  - { from: PT.green, to: PL1.a, style: twisted }                                  # 6.3 V → pilot lamp
  - { from: PL1.b, to: V3.pin7, style: twisted, via: [[-1.2, 3.7], [22, 3.7]] }    # lamp → V3 6V6 heater
  - { from: V3.pin2, to: V4.pin7, style: twisted, via: [[22, 3.72], [28, 3.72]] }  # V3 → V4 heater
  - { from: V4.pin2, to: V2.pin4, style: twisted, via: [[28, 3.74], [41, 3.74]] }  # V4 → V2 heater
  - { from: V2.pin5, to: V1.pin3, style: twisted, via: [[41, 3.72], [53, 3.72]] }  # V2 → V1 (6AT6) heater
  - { from: V1.pin3, to: V1.pin4, style: twisted } # close the pair at the last socket

# net_map — the reviewable data layer reconciling the drawn wiring with the
# DC-operating-point netlist (netlist.cir) for pipeline/verify_layout_nets.py.
# See docs/layout-schema.md. Every entry records a documented abstraction the
# netlist makes so the equivalence check never guesses in code.
net_map:
  # Terminals the netlist gives no discrete node to reach on their own — anchored
  # to the netlist node they belong to. Co-anchoring to the SAME node declares a
  # DC bridge the netlist collapses (the output-transformer primary DCR is
  # omitted, so both 6V6 plates and the CT read as B+1; the OT secondary DCR is
  # folded into ground, so the negative-feedback return reads as ground at DC).
  anchors:
    T1.plateA: BP1    # OT primary, upper-6V6 plate lead — netlist omits OT primary DCR (plate node = B+1)
    T1.plateB: BP1    # OT primary, lower-6V6 plate lead
    T1.ct:     BP1    # OT primary centre tap → first filter (B+1)
    SPK.tip:  "0"     # speaker jack tip — netlist folds the OT-secondary DCR (~0 Ω) into ground,
                      #   so the 56 k NFB return (RNFB) from the speaker line reads as ground at DC
  # Netlist elements with no discrete board part — reported in coverage, never a
  # failure (their nodes still have to check out). Both are single-resistor DC
  # abstractions of grid-reference networks realised at a control / at the jacks.
  netlist_unplaced:
    RGAT: "6AT6 grid return — the netlist's 68 k model of the grid reference through the switched input jacks (the three 68 k stoppers R1s/R2s/R3s normalling to ground when unplugged); realised at the jacks, no single board part"
    RGD:  "driver (V2A) grid leak — realised by the 1 M volume pot VR1 (wiper → grid), which the netlist models as a 1 M grid-leak to ground"
