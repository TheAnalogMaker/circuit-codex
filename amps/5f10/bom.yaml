# Parts list — reference designators match schematic.kicad_sch exactly.
notes: "The chassis has three input jacks (1/2/3), each with its own 68 kΩ stopper; the 6AT6 grid returns to ground through the switched jacks. Only the 6AT6 triode section is used (its twin diodes are unwired). Parts drawn only as annotations (power transformer, AC-line caps, fuse, switch, pilot lamp) are listed without designators."
