    key_change: >
      The single-ended 6V6 circuit in a TV-front tweed cabinet, still using an
      octal dual-triode preamp. Two preamp stages plus a simple treble-cut tone
      control distinguish it from the tone-less Champ; the larger output
      transformer is the other difference. Early-tweed dating is approximate.
    circuit_ref: null
    sources:
      - desc: "EL34World schematic archive, Fender Princeton 5B2 sheet (indexed by designation)"
        url: "https://el34world.com/charts/Schematics/files/Fender/Fender_princeton_5b2_schem.pdf"
      - desc: "Wikipedia, Fender Princeton — 5B2/5C2 single-ended output and octal preamp"
        url: "https://en.wikipedia.org/wiki/Fender_Princeton"
  - designation: "5C2"
    name: "Princeton (wide-panel tweed)"
    years: { start: 1953, end: 1955 }
    wattage: 5
    output: "single-ended 6V6"
    tubes: [6SC7, 6V6GT, 5Y3GT]
    key_change: >
      Wide-panel tweed cabinet; the single-ended 6V6 circuit and octal preamp
      carry over from the 5B2 with detail component changes. Still pre-12AX7.
    circuit_ref: null
    sources:
      - desc: "EL34World schematic archive, Fender Princeton 5C2 sheet (indexed by designation)"
        url: "https://el34world.com/charts/Schematics/files/Fender/Fender_princeton_5c2_schem.pdf"
