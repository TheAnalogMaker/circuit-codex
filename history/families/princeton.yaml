    tubes: [12AX7, 6V6GT, 5Y3GT]
    key_change: >
      The preamp switches from the octal dual triode to a 12AX7, mirroring the
      Champ's 5E1 move to the 9-pin front end. Output stays single-ended 6V6.
    circuit_ref: null
    sources:
      - desc: "EL34World schematic archive, Fender Princeton 5D2 sheet (indexed by designation)"
        url: "https://el34world.com/charts/Schematics/files/Fender/Fender_princeton_5d2_schem.pdf"
      - desc: "Wikipedia, Fender Princeton — 12AX7 preamp adopted from the 5D2 through 5F2-A"
