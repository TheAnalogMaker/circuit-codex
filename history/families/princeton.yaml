family: princeton
title: "The Princeton line"
maker_style: "Fender-style"
summary: >
  For its first fifteen years the Princeton was, in Fender's own framing, a Champ
  with a tone control and a slightly larger output transformer: a single-ended
  6V6 student amp that tracked the Champ's revisions from the 1940s Woodie
  through the tweed 5-series to the 5F2-A. The brownface 6G2 broke that lineage
  entirely, replacing the single-ended stage with a fixed-bias push-pull pair of
  6V6s and adding tremolo. Blackface refined that push-pull platform into the
  AA964 and, with reverb, the AA1164 Princeton Reverb — the version that made the
  name famous.
models:
  - designation: "woodie"
    name: "Princeton (Woodie / early)"
    years: { start: 1946, end: 1948 }
    wattage: null
    output: "single-ended 6V6"
    tubes: [6SC7, 6V6, 5Y3]
    key_change: >
      The earliest Princeton: a single-ended 6V6 combo in the uncovered/early
      cabinet style of Fender's first amps, with an octal preamp. Specifications
      varied across these transitional units and no firm catalogued wattage is
      documented; sources place output in the low-single-digit-watt range.
    circuit_ref: null
    sources:
      - desc: "Wikipedia, Fender Princeton — Woody-era origin and single-ended construction"
        url: "https://en.wikipedia.org/wiki/Fender_Princeton"
