  - designation: "5E2"
    name: "Princeton (narrow-panel tweed)"
    years: { start: 1955, end: 1956 }
    wattage: 5
    output: "single-ended 6V6"
    tubes: [12AX7, 6V6GT, 5Y3GT]
    key_change: >
      Narrow-panel tweed cabinet; the 12AX7 / single-ended 6V6 circuit continues
      with revised values. Still the Champ-plus-tone-control architecture.
    circuit_ref: null
    sources:
      - desc: "EL34World schematic archive, Fender Princeton 5E2 sheet (indexed by designation)"
        url: "https://el34world.com/charts/Schematics/files/Fender/Fender_princeton_5e2_schem.pdf"
  - designation: "5F2"
    name: "Princeton (narrow-panel tweed)"
    years: { start: 1956, end: 1957 }
    wattage: 5
    output: "single-ended 6V6"
    tubes: [12AX7, 6V6GT, 5Y3GT]
    key_change: >
      Refinement of the narrow-panel single-ended Princeton with a single tone/
      volume network, directly preceding the widely reproduced 5F2-A.
    circuit_ref: null
    sources:
      - desc: "EL34World schematic archive, Fender Princeton 5F2 sheet (indexed by designation)"
        url: "https://el34world.com/charts/Schematics/files/Fender/Fender_princeton_5f2_schem.pdf"
  - designation: "5F2-A"
    name: "Princeton (narrow-panel tweed)"
    years: { start: 1957, end: 1961 }
    wattage: 5
    output: "single-ended 6V6"
    tubes: [12AX7, 6V6GT, 5Y3GT]
    key_change: >
      The definitive tweed Princeton and the last single-ended one: a 12AX7 into
      a cathode-biased single-ended 6V6, with a capacitor-coupled single-knob
      tone control and 22k feedback around the output triode's driver. This is
      the DC signal path the corpus documents at circuit_ref 5f2a; everything
      after it in the family is push-pull.
    circuit_ref: 5f2a
    sources:
      - desc: "Fender Princeton 5F2-A published drawing, read directly for values (archived at EL34World, indexed by designation)"
        url: "https://el34world.com/charts/Schematics/files/Fender/Fender_princeton_5f2a.pdf"
  - designation: "6G2"
    name: "Princeton (brownface)"
    years: { start: 1961, end: 1963 }
    wattage: 12
    output: "push-pull 2x6V6GT"
    tubes: [7025, 12AX7, 6V6GT, 6V6GT, 5Y3GT]
    key_change: >
      The break in the line. The single-ended cathode-biased 6V6 of the 5F2-A is
      abandoned for a fixed-bias push-pull pair of 6V6GTs — a fundamentally
      different, more powerful power stage — plus a 7025 preamp, a 12AX7 whose
      half runs a tremolo oscillator, and brownface cosmetics. This is the
      push-pull turn the corpus's 5f2a page warns about: do not read 5F2-A
      single-ended values onto anything from the 6G2 forward.
    circuit_ref: null
    sources:
      - desc: "EL34World schematic archive, Fender Princeton 6G2 sheet (indexed by designation)"
        url: "https://el34world.com/charts/Schematics/files/Fender/Fender_princeton_6g2_schem.pdf"
      - desc: "Wikipedia, Fender Princeton — 6G2 fixed-bias push-pull 6V6 output, 7025 preamp, 12AX7 tremolo"
        url: "https://en.wikipedia.org/wiki/Fender_Princeton"
  - designation: "AA964"
    name: "Princeton (blackface)"
    years: { start: 1964, end: 1968 }
    wattage: 12
    output: "push-pull 2x6V6GT"
    tubes: [7025, 12AX7, 6V6GT, 6V6GT, 5Y3GT]
    key_change: >
      The push-pull Princeton in blackface trim, without reverb. Refines the 6G2
      platform — same fixed-bias 6V6 pair and tremolo — under the mid-1960s
      cosmetic and circuit-numbering scheme.
    circuit_ref: null
    sources:
      - desc: "EL34World schematic archive, Fender Princeton AA964 sheet (indexed by designation)"
        url: "https://el34world.com/charts/Schematics/files/Fender/Fender_princeton_AA964_schem.pdf"
  - designation: "AA1164"
    name: "Princeton Reverb (blackface)"
    years: { start: 1964, end: 1968 }
    wattage: 12
    output: "push-pull 2x6V6GT"
    tubes: [7025, 12AX7, 12AX7, 12AT7, 6V6GT, 6V6GT, 5AR4]
    key_change: >
      The Princeton with a tube reverb tank added ahead of the tremolo, on the
      same fixed-bias push-pull 6V6 output — the configuration that made the name
      famous. A 12AT7 drives the reverb and a GZ34/5AR4 replaces the earlier 5Y3.
      The blackface AA1164 later continued under silverface cosmetics; the modern
      reissue rates the same 2x6V6GT stage at 15 W.
    circuit_ref: null
    sources:
      - desc: "EL34World schematic archive, Fender Princeton Reverb AA1164 sheet (indexed by designation)"
        url: "https://el34world.com/charts/Schematics/files/Fender/Fender_princeton_reverb_aa1164_schem.pdf"
      - desc: "Mojotone Fender Field Guide, '65 Princeton Reverb reissue — push-pull 2x6V6GT stage and 5AR4 rectifier"
        url: "https://mojotone.com/blogs/fender-field-guide/fender-65-princeton-reverb"
notes: >
  Two eras with a hard boundary. Everything through the 5F2-A (1946-1961) is a
  single-ended 6V6 "Champ with a tone control"; everything from the 6G2 forward
  (1961+) is fixed-bias push-pull 2x6V6 — a different power stage, not a revision
  of the earlier one. Tweed sub-revision dates (5B2-5F2) are approximate and
  overlap. Push-pull power ratings are commonly cited around 12 W for the
  original blackface amps; the current Princeton Reverb reissue is rated 15 W.
  Preamp tube type 7025 is a low-noise 12AX7 variant. Marketing names are used
  descriptively.
