# Circuit Codex reference library — curated source catalog.
#
# Posture: we LINK to established archives; we rehost only material with a
# documented public-domain basis. Nothing in this catalog is rehosted here —
# every entry points at the holding archive. Extracted data (tube operating
# points, component characteristics) appear elsewhere in the corpus as facts
# with attribution, not as reproductions of the source documents.
#
# pd_basis vocabulary:
#   pd-outright        — published pre-1931; public domain in the US regardless of renewal.
#   pd-mark            — archive carries a CC Public Domain Mark from the uploader (not
#                        independently verified against Copyright Office renewal records).
#   non-renewal        — the work's 28-year renewal window was searched and no renewal found
#                        (real but keyword-based evidence; not a certified negative).
#   renewal-dependent  — 1931-1963 publication whose PD status turns on a renewal check we
#                        have not independently completed; freely hosted, link only.
#   in-copyright       — likely still under copyright; linked for access only, never rehosted.
#
# fields: title, url, kind, publisher, year, covers, pd_basis, confidence, category
# category: tube-manual | era-component   (datasheets live in reference/tubes/<tube>.yaml)

sources:
  # ---------------------------------------------------------------- tube manuals
  - title: The Thermionic Vacuum Tube and Its Applications
