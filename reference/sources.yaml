    kind: article
    publisher: McGraw-Hill (H. J. van der Bijl)
    year: 1920
    covers: >-
      Foundational tube theory — amplification factor, plate resistance, mu, and
      the triode/amplifier math that every later design manual builds on.
    pd_basis: pd-outright (published 1920)
    confidence: high
    category: tube-manual

