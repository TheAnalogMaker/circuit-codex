tube: 5881
name: "5881"
also_known_as: [6L6WGB, "6L6GC (family)"]
role: >-
  Beam-power output tube of the 6L6GC / 5881 family — the higher-power American
  output tube. It drives the tweed 5F6-A Bassman, and its family model stands in
  for the 6L6G in the 5F4 Super. The model is anchored on 6L6GC average
  characteristics.
model:
  file: models/5881.inc
  anchor: "Va=250 V, Vg2=250 V, Vg1=-14 V → Ia=72 mA, Ig2=5 mA, gm=6000 µmho"
  anchor_source: "RCA Receiving Tube Manual RC-19, 1959, average characteristics (6L6GC)"
  note: >-
    5881/6L6WGB is treated as 6L6GC-class at these ratings. µ is the
    grid-No.1-to-grid-No.2 amplification factor (8, RC-19).
basing:
  code: 7AC
  base: octal
  view: bottom
  source: >-
    RCA 6L6GC data sheet ("Basing Designation for Bottom View ... 7AC");
    cross-checked against the Tung-Sol 5881 bottom-view basing diagram (JEDEC 7AC).
