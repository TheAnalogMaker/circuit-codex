tube: kt66
name: KT66
also_known_as: []
role: >-
  British beam-power tetrode from GEC / M-O Valve Co. — the output tube of the
  JTM45, the amplifier that carried the 6L6-class Bassman topology across the
  Atlantic. Its higher plate dissipation and different drive give the JTM45 its
  louder, firmer character.
