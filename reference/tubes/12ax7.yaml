tube: 12ax7
name: 12AX7
also_known_as: [ECC83, "7025", 12AX7A]
role: >-
  High-mu (µ=100) dual triode — the universal gain stage, cathode follower, and
  phase inverter of guitar amplification. It appears in nearly every circuit in
  this archive.
model:
  file: models/12ax7.inc
  anchor: "Va=250 V, Vg=-2 V → Ia=1.2 mA, gm=1600 µmho, µ=100"
  anchor_source: "RCA Receiving Tube Manual RC-19, 1959, average characteristics"
  note: >-
    Two-point fit (adopted 2026-07-18 from the calibration study below): the plate-current curve is held at both tabulated operating points — 250 V/−2 V and 100 V/−1 V — which all four manufacturers print identically. The low-plate-voltage behaviour of this tube was the
    subject of the 12AX7 calibration study.
study: 12ax7-calibration
