tube: 5y3gt
name: 5Y3GT
also_known_as: []
role: >-
  Directly-heated full-wave rectifier — the low-current rectifier of the small
  tweed amps. Its comparatively high forward drop is part of the sag and
  compression those circuits are prized for.
model:
  file: models/5y3gt.inc
  anchor: "tube voltage drop ~60 V at Ia=125 mA per plate"
  anchor_source: "RCA Receiving Tube Manual RC-19, 1959, average characteristics"
  note: "Child's-law diode (I = PERV·V^1.5); one plate unit, instantiate twice."
basing:
  code: 5T
  base: octal
  view: bottom
  source: >-
    RCA 5Y3GT data sheet — "Basing Designation for Bottom View ... 5T".
    Directly heated: the filament is the cathode, so both filament pins float
    at B+ along with the two plates.
  pins:
    1: { element: nc }
    2: { element: filament, hv: true, note: "also the cathode — B+ output" }
    3: { element: nc }
    4: { element: diode-plate, unit: 2, hv: true }
    5: { element: nc }
    6: { element: diode-plate, unit: 1, hv: true }
    7: { element: nc }
    8: { element: filament, hv: true, note: "also the cathode — B+ output" }
used_in: ["5e1", "5e3", "5f1", "5f10", "5f2a"]
