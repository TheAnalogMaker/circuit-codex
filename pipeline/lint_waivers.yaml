# Collision-lint waivers — a permanent, documented mechanism (like the disputed
# nodes on a chart). check_layouts.py runs the wiring collision lint on every
# amp with a wiring layer; an amp listed here has its lint failures downgraded
# from blocking to WAIVED, and CI prints the active waivers loudly so a waiver
# is never silent. An amp with zero lint failures needs no entry.
#
# Format:  <amp_id>: "<reason>"
#
# The pilot fixed 5f1 and 5e3 to zero lint (lane/via adjustments preserving the
# published routing and era wire colours). 5e1, 5f2a and 5f10 have since been
# brought to zero lint the same way. The one below carries the remaining
# legibility debt and is queued for the same remediation; its wiring is
# already electrically verified (wiring_claim: verified) — only the collision
# lint is outstanding.
#
# 5f4 was brought to zero lint 2026-07-19 (80 -> 0) by via/lane re-routing that
# preserved every endpoint (wiring re-verified equivalent); its waiver is gone.
# 5f6a followed the same day (139 -> 0: 58 near-parallel + 81 terminal-ambiguity
# both to zero), endpoints preserved; its waiver is gone too.
waivers:
  jtm45: "pending legibility remediation 2026-07-19 (wiring verified under hardened gate; ECC83 sockets corrected 8->9 pin, via re-tuning outstanding)"
