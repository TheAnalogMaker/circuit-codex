# Collision-lint waivers — a permanent, documented mechanism (like the disputed
# nodes on a chart). check_layouts.py runs the wiring collision lint on every
# amp with a wiring layer; an amp listed here has its lint failures downgraded
# from blocking to WAIVED, and CI prints the active waivers loudly so a waiver
# is never silent. An amp with zero lint failures needs no entry.
#
# Format:  <amp_id>: "<reason>"
#
# As of 2026-07-19 the list is EMPTY: every amp with a wiring layer passes the
# collision lint with zero failures. ab763 (the largest board in the corpus —
# blackface Deluxe Reverb, 9 tubes on a 62-column board) was brought 72→0 the
# same way as the rest: ≥18° bearing fan-out at every shared node, deep-lane
# separation, far-side pin approaches and off-column ground drops — every
# endpoint preserved, the wiring re-verified electrically equivalent to the
# netlist (wiring_claim: verified). No board was routed by inventing a wire.
# Keep this mechanism in place: any future amp that lands with lint debt gets a
# documented entry here rather than a silent downgrade.
waivers: {}
